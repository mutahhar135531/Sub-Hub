  <style>
    /* ===== RED/BLACK NEON THEME ===== */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0a; color:#e0e0e0; font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; scroll-behavior:smooth; overflow-x:hidden; }

    .btn-neon { background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff; border:none; padding:10px 28px; border-radius:40px; font-weight:600; letter-spacing:.3px; transition:all .3s ease; box-shadow:0 0 25px rgba(239,68,68,0.25); cursor:pointer; }

    .btn-warning { background:rgba(251,191,36,0.15); color:#fbbf24; border:1px solid rgba(251,191,36,0.25); padding:6px 16px; border-radius:30px; font-size:.8rem; transition:all .3s ease; cursor:pointer; }
    .btn-warning:hover { background:rgba(251,191,36,0.25); border-color:#fbbf24; }
    .btn-red { background:rgba(239,68,68,0.15); color:#fca5a5; border:1px solid rgba(239,68,68,0.25); padding:4px 12px; border-radius:20px; font-size:.75rem; transition:all .3s ease; cursor:pointer; }
    .btn-red:hover { background:rgba(239,68,68,0.25); border-color:#ef4444; }
    .btn-success { background:rgba(52,211,153,0.15); color:#34d399; border:1px solid rgba(52,211,153,0.25); padding:6px 16px; border-radius:30px; font-size:.8rem; transition:all .3s ease; cursor:pointer; }
    .btn-success:hover { background:rgba(52,211,153,0.25); border-color:#34d399; }

    .input-neon { background:rgba(255,255,255,0.04); border:1px solid rgba(239,68,68,0.25); border-radius:14px; padding:12px 18px; color:#e0e0e0; width:100%; transition:all .3s ease; outline:none; font-size:.95rem; }
    .input-neon:focus { border-color:#ef4444; box-shadow:0 0 30px rgba(239,68,68,0.08),inset 0 0 30px rgba(239,68,68,0.03); background:rgba(255,255,255,0.06); }

    .deal-title { font-size:.9rem; font-weight:700; }
    .deal-desc { font-size:.65rem; color:rgba(255,255,255,0.4); }
    .btn-neon-sm { font-size:.75rem; padding:6px 12px; border-radius:30px; background:linear-gradient(135deg,#ef4444,#dc2626); color:#fff; border:none; font-weight:600; transition:all .3s ease; cursor:pointer; }
    .btn-neon-sm:hover { transform:scale(1.02); box-shadow:0 0 20px rgba(239,68,68,0.3); }

    .sub-carousel-card { background:rgba(20,20,20,0.85); backdrop-filter:blur(8px); border:1px solid rgba(239,68,68,0.15); border-radius:16px; padding:16px 12px; text-align:center; transition:all .3s ease; cursor:pointer; height:100%; min-height:160px; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; }
    .sub-carousel-card:hover { border-color:#ef4444; transform:translateY(-4px); box-shadow:0 8px 30px rgba(239,68,68,0.10); }
    .sub-carousel-card .brand-corner { position:absolute; top:6px; right:10px; font-size:.7rem; color:rgba(255,255,255,0.06); font-weight:900; font-family:Georgia,serif; }
    .sub-carousel-card .card-icon { font-size:2.6rem; margin-bottom:8px; }

    .sub-carousel-card .card-detail { font-size:.6rem; color:rgba(255,255,255,0.2); margin-top:2px; }
    .sub-carousel-card .card-price { font-size:.85rem; font-weight:600; color:#34d399; margin-top:6px; }

    .carousel-container { position:relative; overflow:hidden; border-radius:16px; user-select:none; }
    .carousel-track { display:flex; will-change:transform; }
    .carousel-slide { flex:0 0 auto; padding:0 4px; }
    .carousel-dots { display:flex; justify-content:center; gap:8px; margin-top:10px; }
    .carousel-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.12); border:none; cursor:pointer; transition:all .3s ease; }
    .carousel-dot.active { background:#ef4444; box-shadow:0 0 16px rgba(239,68,68,0.4); width:24px; border-radius:20px; }
    .carousel-dot:hover { background:rgba(239,68,68,0.5); }
    .carousel-btn { position:absolute; top:50%; transform:translateY(-50%); z-index:10; background:rgba(10,10,10,0.8); backdrop-filter:blur(6px); border:1px solid rgba(239,68,68,0.2); color:white; width:36px; height:36px; border-radius:50%; cursor:pointer; transition:all .3s ease; display:flex; align-items:center; justify-content:center; font-size:.9rem; }
    .carousel-btn:hover { background:rgba(239,68,68,0.25); border-color:#ef4444; box-shadow:0 0 20px rgba(239,68,68,0.15); }
    .carousel-btn.prev { left:-4px; }
    .carousel-btn.next { right:-4px; }

    .whatsapp-float { position:fixed; bottom:24px; right:24px; z-index:100; background:#25D366; color:#fff; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; box-shadow:0 4px 30px rgba(37,211,102,0.4); transition:all .3s ease; text-decoration:none; }
    .whatsapp-float:hover { transform:scale(1.08); box-shadow:0 6px 40px rgba(37,211,102,0.5); }

    .hero-bg { position:relative; overflow:hidden; background:radial-gradient(ellipse at 30% 20%, rgba(239,68,68,0.06) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(239,68,68,0.04) 0%, transparent 50%); }
    .glow-orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.3; pointer-events:none; }
    .glow-orb.orb1 { width:400px; height:400px; background:rgba(239,68,68,0.15); top:-100px; left:-100px; }
    .glow-orb.orb2 { width:300px; height:300px; background:rgba(239,68,68,0.10); bottom:-50px; right:-50px; }

    .trending-wrapper { position:relative; overflow:hidden; padding:20px 0 40px; background:radial-gradient(ellipse at 50% 50%, rgba(239,68,68,0.03) 0%, transparent 60%); }
    .trending-section { position:relative; }
    .trending-bg-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; overflow:hidden; opacity:0.03; }
    .trending-bg-text h2 { font-size:6rem; font-weight:900; white-space:nowrap; color:#fff; letter-spacing:8px; }

    .admin-table { width:100%; border-collapse:collapse; font-size:.9rem; }
    .admin-table th { text-align:left; padding:14px 16px; color:#fca5a5; font-weight:600; border-bottom:1px solid rgba(239,68,68,0.15); background:rgba(239,68,68,0.04); }
    .admin-table td { padding:12px 16px; border-bottom:1px solid rgba(239,68,68,0.06); color:#d4d4d0; }
    .admin-table tr:hover td { background:rgba(239,68,68,0.04); }

    .badge { display:inline-block; padding:4px 14px; border-radius:40px; font-size:.75rem; font-weight:600; letter-spacing:.3px; }
    .badge-green { background:rgba(52,211,153,0.15); color:#34d399; }
    .badge-red { background:rgba(248,113,113,0.15); color:#f87171; }
    .badge-yellow { background:rgba(251,191,36,0.15); color:#fbbf24; }
    .badge-red-light { background:rgba(239,68,68,0.15); color:#fca5a5; }
    .badge-gray { background:rgba(255,255,255,0.05); color:#9ca3af; }

    .tab-btn { padding:8px 22px; border-radius:40px; font-weight:500; transition:all .3s ease; cursor:pointer; background:transparent; color:rgba(255,255,255,0.50); border:1px solid transparent; }
    .tab-btn.active { background:rgba(239,68,68,0.12); color:#fca5a5; border-color:rgba(239,68,68,0.20); }
    .tab-btn:hover { color:#e0e0e0; background:rgba(239,68,68,0.06); }

    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; }

    .copy-btn { background:rgba(239,68,68,0.10); border:1px solid rgba(239,68,68,0.15); color:#fca5a5; padding:2px 10px; border-radius:12px; font-size:.7rem; cursor:pointer; transition:all .2s ease; margin-left:8px; }
    .copy-btn:hover { background:rgba(239,68,68,0.20); border-color:#ef4444; }

    .detail-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
    .detail-row .label { color:rgba(255,255,255,0.30); font-size:.8rem; }
    .detail-row .value { color:#e0e0e0; font-weight:500; font-size:.9rem; display:flex; align-items:center; gap:6px; }

    .otp-input { width:52px; height:60px; text-align:center; font-size:1.6rem; font-weight:600; background:rgba(255,255,255,0.04); border:2px solid rgba(239,68,68,0.25); border-radius:14px; color:#e0e0e0; transition:all .3s ease; outline:none; }
    .otp-input:focus { border-color:#ef4444; box-shadow:0 0 30px rgba(239,68,68,0.10); }

    .toast-container { position:fixed; bottom:30px; right:30px; z-index:9999; display:flex; flex-direction:column; gap:12px; max-width:380px; width:100%; }
    .toast { background:rgba(20,20,20,0.95); backdrop-filter:blur(16px); border:1px solid rgba(239,68,68,0.25); border-radius:16px; padding:16px 22px; color:#e0e0e0; box-shadow:0 8px 40px rgba(0,0,0,0.5); animation:slideIn .4s ease; display:flex; align-items:center; gap:12px; }
    .toast.success { border-left:4px solid #34d399; }
    .toast.error { border-left:4px solid #f87171; }
    .toast.warning { border-left:4px solid #fbbf24; }
    @keyframes slideIn { from { opacity:0; transform:translateX(60px); } to { opacity:1; transform:translateX(0); } }

    .spinner { width:24px; height:24px; border:3px solid rgba(239,68,68,0.15); border-top-color:#ef4444; border-radius:50%; animation:spin .8s linear infinite; display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .fade-up { opacity:0; transform:translateY(30px); transition:all .6s ease; }
    .fade-up.visible { opacity:1; transform:translateY(0); }
    ::selection { background:rgba(239,68,68,0.30); color:#fff; }

    .footer { border-top:1px solid rgba(239,68,68,0.08); padding:40px 0 20px; margin-top:40px; background:rgba(10,10,10,0.5); }

    .footer-social a:hover { background:rgba(239,68,68,0.15); color:#ef4444; border-color:rgba(239,68,68,0.2); }
    .footer-heading { color:#fff; font-size:.9rem; font-weight:600; margin-bottom:12px; }
    .footer-link { color:rgba(255,255,255,0.25); text-decoration:none; font-size:.85rem; transition:color .3s ease; }
    .footer-link:hover { color:#fca5a5; }
    .footer-bottom { border-top:1px solid rgba(255,255,255,0.04); margin-top:30px; padding-top:20px; text-align:center; color:rgba(255,255,255,0.15); font-size:.8rem; }

    .contact-icon-box { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.04); border-radius:16px; padding:20px; text-align:center; transition:all .3s ease; }
    .contact-icon-box:hover { background:rgba(239,68,68,0.04); border-color:rgba(239,68,68,0.15); transform:translateY(-2px); }

    .social-link-card:hover .social-arrow { color:#fca5a5; transform:translateX(4px); }

    .card-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(12px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; }
    .card-modal-content { max-width:360px; width:100%; background:rgba(20,20,20,0.95); border:1px solid rgba(239,68,68,0.15); border-radius:24px; padding:32px 28px; text-align:center; position:relative; }

    .promo-upload-preview { width:120px; height:120px; object-fit:cover; border-radius:12px; border:1px solid rgba(239,68,68,0.15); }

    .promo-carousel-container {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: rgba(20,20,20,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(239,68,68,0.10);
      min-height: 180px;
    }
    .promo-track {
      display: flex;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);

      flex: 0 0 100%;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 180px;
    }

      max-height: 160px;
      width: auto;
      object-fit: contain;
      border-radius: 12px;
      margin-top: 10px;
      background: rgba(255,255,255,0.03);
      padding: 8px;
      max-width: 90%;

      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 20px rgba(239,68,68,0.2);
    }
    .promo-dots {

    // ─── CONTEXT ──────────────────────────────────────────────
    const AppContext = createContext();

    function AppProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const [loading, setLoading] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false);
      const [adminPassword, setAdminPassword] = useState(() => {

        return saved || 'admin123';
      });

      const addToast = (message, type = 'info') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 5000);
      };
      const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

      useEffect(() => { localStorage.setItem('adminPassword', adminPassword); }, [adminPassword]);

      return (
        <AppContext.Provider value={{ toasts, addToast, removeToast, loading, setLoading, isAdmin, setIsAdmin, adminPassword, setAdminPassword }}>
          {children}
        </AppContext.Provider>
      );
    }

    function UserProvider({ children }) {
      const [user, setUser] = useState(null);
      const [userData, setUserData] = useState(null);

        if (!user) return;

          const res = await fetch(`${API_BASE}/api/users/${user.username}`);
          const data = await res.json();
          if (data && data.username) {
            setUserData(data);

        } catch (err) { /* ignore */ }
      };

      return (
        <UserContext.Provider value={{ user, setUser, userData, refreshUser }}>
          {children}
        </UserContext.Provider>
      );

    // ─── TOAST CONTAINER ──────────────────────────────────────

              <span style={{ flex: 1 }}>{t.message}</span>
              <button onClick={() => removeToast(t.id)} style={{ background: 'transparent', border: 'none', color: 'rgba(255,255,255,0.3)', cursor: 'pointer', fontSize: '1.1rem' }}>
                <i className="fas fa-times"></i>

    // ─── DEALS CAROUSEL ──────────────────────────────────────
    function DealsCarousel({ deals, subscriptions, onPurchaseClick }) {
      if (!deals || deals.length === 0) return null;
      const [currentIndex, setCurrentIndex] = useState(0);
      const total = deals.length;
      const slideWidth = 100 / Math.min(total, 4);

      const goTo = (idx) => setCurrentIndex((idx + total) % total);
      const next = () => goTo(currentIndex + 1);
      const prev = () => goTo(currentIndex - 1);

      useEffect(() => {
        const timer = setInterval(next, 5000);
        return () => clearInterval(timer);
      }, [currentIndex]);

      return (
        <div className="relative">
          <h3 className="text-lg font-semibold text-white mb-3 flex items-center gap-2">
            <i className="fas fa-bolt text-red-500"></i> Deals
          </h3>
          <div className="relative">
            <div className="overflow-hidden rounded-xl">
              <div className="flex transition-transform duration-500 ease-in-out" style={{ transform: `translateX(-${currentIndex * slideWidth}%)`, width: `${total * 100}%` }}>
                {deals.map((deal, idx) => (
                  <div key={deal.id} className="px-2" style={{ width: `${100 / total}%` }}>
                    <div className="deal-card">
                      <span className="discount-badge">-{Math.round((1 - deal.discountPrice / deal.actualPrice) * 100)}%</span>
                      <div className="flex items-center gap-2">
                        {deal.subscriptions.map(sub => (
                          <span key={sub.id} className="deal-sub-badge">
                            <i className={`fas fa-${sub.type === 'netflix' ? 'netflix' : sub.type === 'amazon' ? 'amazon' : sub.type === 'youtube' ? 'youtube' : sub.type === 'spotify' ? 'spotify' : sub.type === 'chatgpt' ? 'robot' : 'crown'}`}></i>
                            {sub.name}

                        ))}
                      </div>
                      <h4 className="deal-title text-white">{deal.title}</h4>
                      <p className="deal-desc">{deal.description}</p>
                      <div className="flex items-end justify-between mt-auto pt-2">
                        <div>
                          <span className="deal-price-original">RS {deal.actualPrice}</span>
                          <span className="deal-price-discount">RS {deal.discountPrice}</span>
                        </div>
                        <button className="btn-neon-sm" onClick={() => onPurchaseClick(deal)}>Buy Now</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            {total > 1 && (
              <>
                <button className="carousel-btn prev" onClick={prev}><i className="fas fa-chevron-left"></i></button>
                <button className="carousel-btn next" onClick={next}><i className="fas fa-chevron-right"></i></button>
              </>
            )}
          </div>
        </div>
      );
    }

    // ─── PROMOTIONS CAROUSEL (FIXED) ──────────────────────────
    function PromotionsCarousel({ promotions }) {
      const activePromos = promotions.filter(p => p.active);
      if (activePromos.length === 0) return null;

      const [currentIndex, setCurrentIndex] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const intervalRef = useRef(null);
      const total = activePromos.length;

      const goTo = (index) => {
        setCurrentIndex((index + total) % total);
      };

      const next = () => goTo(currentIndex + 1);
      const prev = () => goTo(currentIndex - 1);

      useEffect(() => {
        if (isPaused || total <= 1) {
          if (intervalRef.current) clearInterval(intervalRef.current);
          return;
        }
        intervalRef.current = setInterval(next, 4000);
        return () => clearInterval(intervalRef.current);
      }, [isPaused, total, currentIndex]);

      const handleMouseEnter = () => setIsPaused(true);
      const handleMouseLeave = () => setIsPaused(false);

      if (total === 1) {
        const promo = activePromos[0];
        return (
          <div className="promo-carousel-container">
            <div className="promo-slide">
              <h3>{promo.heading}</h3>
              {promo.image && <img src={promo.image} alt={promo.heading} />}
            </div>
          </div>
        );
      }

      return (
        <div
          className="promo-carousel-container"
          onMouseEnter={handleMouseEnter}
          onMouseLeave={handleMouseLeave}
        >
          <div
            className="promo-track"
            style={{ transform: `translateX(-${currentIndex * 100}%)` }}
          >
            {activePromos.map((promo) => (
              <div key={promo.id} className="promo-slide">
                <h3>{promo.heading}</h3>
                {promo.image && <img src={promo.image} alt={promo.heading} />}
              </div>
            ))}

          <button className="promo-arrow prev" onClick={prev} aria-label="Previous">
            <i className="fas fa-chevron-left"></i>
          </button>
          <button className="promo-arrow next" onClick={next} aria-label="Next">
            <i className="fas fa-chevron-right"></i>
          </button>

          <div className="promo-dots">
            {activePromos.map((_, idx) => (
              <button
                key={idx}
                className={`promo-dot ${idx === currentIndex ? 'active' : ''}`}
                onClick={() => goTo(idx)}
                aria-label={`Slide ${idx + 1}`}
              />
            ))}
          </div>
        </div>
      );
    }

    // ─── OTP HELPER ────────────────────────────────────────────
    const useOTPFlow = (setStep, setOtpTimer, addToast, userIdentifier) => {

        try {

    // ─── ALLOCATION ALGORITHMS ──────────────────────────────
    const allocateScreens = (availableSlots, count, username, whatsapp, requestedScreenId = null) => {
      const notUsedByUser = availableSlots.filter(slot => {
        const customers = slot.screen.customers || [];
        if (customers.some(c => c.username === username)) return false;
        if (customers.some(c => c.whatsapp === whatsapp)) return false;
        return true;
      });

      if (requestedScreenId) {
        const target = notUsedByUser.find(slot => slot.screen.id === requestedScreenId);
        if (!target) {
          const autoResult = allocateBestSlots(notUsedByUser, count);
          if (autoResult) return autoResult;
          return { error: 'not_enough' };
        }
        const currentCount = target.screen.customers ? target.screen.customers.length : 0;
        if (currentCount >= 3) {
          const autoResult = allocateBestSlots(notUsedByUser, count);
          if (autoResult) return autoResult;
          return { error: 'full' };
        }
        const allocated = [target];
        const remaining = count - 1;
        if (remaining > 0) {
          const remainingSlots = notUsedByUser.filter(slot => slot.screen.id !== requestedScreenId);
          const otherAllocated = allocateBestSlots(remainingSlots, remaining);
          if (!otherAllocated) return { error: 'not_enough' };
          allocated.push(...otherAllocated);
        }
        return allocated;
      }

      const result = allocateBestSlots(notUsedByUser, count);
      if (result) return result;
      return { error: 'not_enough' };
    };

    const allocateBestSlots = (slots, count) => {
      const accountMap = {};
      slots.forEach(slot => {
        const accId = slot.account.id;
        if (!accountMap[accId]) {
          accountMap[accId] = { account: slot.account, slots: [], totalFree: 0 };
        }
        const currentCount = slot.screen.customers ? slot.screen.customers.length : 0;
        const free = 3 - currentCount;
        if (free > 0) {
          accountMap[accId].slots.push({ ...slot, free });
          accountMap[accId].totalFree += free;
        }
      });
      const sortedAccounts = Object.values(accountMap).sort((a, b) => b.totalFree - a.totalFree);
      let allocated = [];
      let remaining = count;
      for (const acc of sortedAccounts) {
        if (remaining === 0) break;
        const sortedSlots = acc.slots.sort((a, b) => b.free - a.free);
        for (const slot of sortedSlots) {
          if (remaining === 0) break;
          allocated.push(slot);
          remaining--;
        }
      }
      if (remaining > 0) return null;
      return allocated;
    };

    const allocateAmazonScreens = (availableSlots, username, whatsapp) => {
      const notUsedByUser = availableSlots.filter(slot => {
        const customers = slot.screen.customers || [];
        if (customers.some(c => c.username === username)) return false;
        if (customers.some(c => c.whatsapp === whatsapp)) return false;
        return true;
      });
      if (notUsedByUser.length === 0) return { error: 'no_available_slots' };
      const sortedSlots = notUsedByUser.sort((a, b) => {
        const aNum = parseInt(a.screen.name.split(' ')[1]) || 0;
        const bNum = parseInt(b.screen.name.split(' ')[1]) || 0;
        return aNum - bNum;
      });
      return sortedSlots[0];
    };

        try {
          const updated = { ...promo, active: !promo.active };
          const result = await updatePromotion(promo.id, updated);
          setPromotions(prev => prev.map(p => p.id === promo.id ? result : p));
          addToast(`Promotion ${result.active ? 'activated' : 'deactivated'}`, 'success');
        } catch (err) {
          addToast('Failed to update promotion', 'error');
        }
      };

      // ─── User credit management ──────────────────────────────
      const handleAddCredits = async (username) => {
        if (!addCreditsAmount || addCreditsAmount <= 0) {
          addToast('Enter a valid amount', 'error');
          return;
        }
        try {
          const updated = await addCredits(username, addCreditsAmount);
          setUsersList(prev => prev.map(u => u.username === username ? updated : u));
          addToast(`Added ${addCreditsAmount} credits to ${username}`, 'success');
          setAddCreditsAmount(0);
        } catch (err) {
          addToast('Failed to add credits', 'error');
        }
      };

      const handleDeductCredits = async (username) => {
        if (!deductCreditsAmount || deductCreditsAmount <= 0) {
          addToast('Enter a valid amount', 'error');
          return;
        }
        try {
          const updated = await deductCredits(username, deductCreditsAmount);
          setUsersList(prev => prev.map(u => u.username === username ? updated : u));
          addToast(`Deducted ${deductCreditsAmount} credits from ${username}`, 'success');
          setDeductCreditsAmount(0);
        } catch (err) {
          addToast('Failed to deduct credits', 'error');
        }
      };

      // ─── Render ──────────────────────────────────────────────
      const getTotalCustomers = (sub) => {
        let count = 0;
        sub.accounts.forEach(acc => {
          acc.screens.forEach(screen => {
            count += (screen.customers?.length || 0);
          });
        });
        return count;
      };

      const getTotalSlots = (sub) => {
        let count = 0;
        sub.accounts.forEach(acc => {
          count += (acc.screens?.length || 0);
        });
        return count;
      };

      const getCustomerRecords = (sub) => {
        const records = [];
        sub.accounts.forEach(acc => {
          acc.screens.forEach(screen => {
            if (screen.customers && screen.customers.length > 0) {
              screen.customers.forEach((c, idx) => {
                records.push({
                  accountEmail: acc.email,
                  screenName: screen.name,
                  customerName: c.name || c.username,
                  whatsapp: c.whatsapp || '',
                  expiryDate: c.expiryDate,
                  accountId: acc.id,
                  screenId: screen.id,
                  customerIdx: idx
                });
              });
            }
          });
        });
        return records;
      };

      const getExpiringSoon = (subs) => {
        const today = new Date();
        today.setHours(0,0,0,0);
        const results = [];
        subs.forEach(sub => {
          sub.accounts.forEach(acc => {
            acc.screens.forEach(screen => {
              if (screen.customers) {
                screen.customers.forEach(c => {
                  if (c.expiryDate) {
                    const exp = new Date(c.expiryDate);
                    exp.setHours(0,0,0,0);
                    const diff = Math.ceil((exp - today) / (1000*60*60*24));
                    if (diff >=0 && diff <=7) {
                      results.push({ name: c.name || c.username, expiry: c.expiryDate, diff });
                    }
                  }
                });
              }
            });
          });
        });
        return results;
      };

      const generatePassword = () => {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&';
        let pass = '';
        for (let i = 0; i < 12; i++) {
          pass += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return pass;
      };
      const generatePin = () => String(Math.floor(1000 + Math.random() * 9000));

      return (
        <div className="space-y-6">
          <div className="flex flex-wrap justify-between items-center gap-4">
            <div>
              <h2 className="text-2xl font-bold text-white"><span className="brand-z brand-z-sm">Z</span> Admin Dashboard</h2>
              <p className="text-white/30 text-sm">Manage everything.</p>
            </div>
            <div className="flex flex-wrap gap-2">
              <button onClick={refreshData} className="btn-red text-sm"><i className="fas fa-sync mr-1"></i> Refresh</button>
              <button onClick={() => setShowAdminSettings(!showAdminSettings)} className="btn-warning text-sm"><i className="fas fa-cog mr-1"></i> Settings</button>
              <button onClick={() => { setShowEditSub(null); resetAddForm(); setShowAddSub(true); }} className="btn-neon text-sm"><i className="fas fa-plus mr-2"></i> Add Subscription</button>
              <button onClick={onLogout} className="btn-neon-outline text-sm"><i className="fas fa-sign-out-alt mr-2"></i> Logout</button>
            </div>
          </div>

          {showAdminSettings && (
            <div className="glass-panel">
              <h3 className="text-white font-semibold">Admin Settings</h3>
              <div className="mt-2 flex gap-4 items-end">
                <div>
                  <label className="text-white/50 text-sm">New Admin Password</label>
                  <input type="password" value={newAdminPassword} onChange={(e) => setNewAdminPassword(e.target.value)} className="input-neon mt-1" />
                </div>
                <div>
                  <label className="text-white/50 text-sm">Confirm</label>
                  <input type="password" value={confirmAdminPassword} onChange={(e) => setConfirmAdminPassword(e.target.value)} className="input-neon mt-1" />
                </div>
                <button onClick={() => {
                  if (newAdminPassword === confirmAdminPassword && newAdminPassword.length > 0) {
                    setAdminPassword(newAdminPassword);
                    addToast('Admin password updated', 'success');
                  } else {
                    addToast('Passwords do not match or empty', 'error');
                  }
                }} className="btn-neon-sm">Update Password</button>
              </div>
            </div>
          )}

          {showAddSub && (
            <div className="glass-panel">
              <h3 className="text-lg font-semibold text-white mb-4">
                {showEditSub ? <><i className="fas fa-edit text-red-400 mr-2"></i> Edit Subscription</> : <><i className="fas fa-plus-circle text-red-400 mr-2"></i> New Subscription</>}
              </h3>
              <div className="grid sm:grid-cols-2 gap-4">
                <div><label className="text-white/50 text-sm">Name</label>
                  <input type="text" value={newSubName} onChange={(e) => setNewSubName(e.target.value)} className="input-neon mt-1" placeholder="e.g. Disney+" />
                </div>
                <div><label className="text-white/50 text-sm">Type</label>
                  <select value={newSubType} onChange={(e) => setNewSubType(e.target.value)} className="input-neon mt-1">
                    <option value="netflix">Netflix</option>
                    <option value="amazon">Amazon Prime</option>
                    <option value="youtube">YouTube Premium</option>
                    <option value="spotify">Spotify Premium</option>
                    <option value="chatgpt">ChatGPT</option>
                    <option value="canva">Canva Pro</option>
                    <option value="capcut">Capcut Pro</option>
                    <option value="hbomax">HBO Max</option>
                    <option value="crunchyroll">Crunchyroll</option>
                    <option value="chaupal">Chaupal</option>
                    <option value="custom">Custom</option>
                  </select>
                </div>
              </div>
              <div className="grid sm:grid-cols-2 gap-4">
                <div><label className="text-white/50 text-sm">Cost Price (RS / mo)</label>
                  <input type="number" value={newSubCost} onChange={(e) => setNewSubCost(Number(e.target.value))} className="input-neon mt-1" placeholder="0" />
                </div>
                <div><label className="text-white/50 text-sm">Selling Price (RS / mo)</label>
                  <input type="number" value={newSubSelling} onChange={(e) => setNewSubSelling(Number(e.target.value))} className="input-neon mt-1" placeholder="0" />
                </div>
              </div>
              <div>
                <label className="text-white/50 text-sm">Slots (Total capacity)</label>
                <input type="number" value={newSubSlots} onChange={(e) => setNewSubSlots(Number(e.target.value))} className="input-neon mt-1" min="1" placeholder="1" />
              </div>
              <div>
                <label className="text-white/50 text-sm">Description</label>
                <textarea value={newSubDescription} onChange={(e) => setNewSubDescription(e.target.value)} className="input-neon mt-1" rows="2" placeholder="What does this subscription offer?"></textarea>
              </div>
              <div>
                <label className="text-white/50 text-sm">Important Note (for customers)</label>
                <textarea value={newSubImportantNote} onChange={(e) => setNewSubImportantNote(e.target.value)} className="input-neon mt-1" rows="2" placeholder="e.g. Shared account, 5 screens available"></textarea>
              </div>
              <div>
                <label className="text-white/50 text-sm">Logo</label>
                <input type="file" accept="image/*" onChange={handleLogoUpload} className="input-neon mt-1 p-2" />
                {newSubLogo && (
                  <div className="mt-2 flex items-center gap-3">
                    <img src={newSubLogo} alt="Logo preview" className="w-16 h-16 object-contain rounded-lg border border-white/10" />
                    <button onClick={() => setNewSubLogo('')} className="btn-red text-xs"><i className="fas fa-times"></i> Remove</button>
                  </div>
                )}
              </div>
              <div>
                <label className="text-white/50 text-sm block mb-2">Ask from Customer:</label>
                <div className="flex flex-wrap gap-4">
                  <label className="flex items-center gap-2 text-white/70 text-sm cursor-pointer">
                    <input type="checkbox" checked={newSubAskFor.includes('name')} onChange={() => setNewSubAskFor(prev => prev.includes('name') ? prev.filter(f => f !== 'name') : [...prev, 'name'])} className="w-4 h-4 accent-red-500" />
                    Name
                  </label>
                  <label className="flex items-center gap-2 text-white/70 text-sm cursor-pointer">
                    <input type="checkbox" checked={newSubAskFor.includes('number')} onChange={() => setNewSubAskFor(prev => prev.includes('number') ? prev.filter(f => f !== 'number') : [...prev, 'number'])} className="w-4 h-4 accent-red-500" />
                    WhatsApp Number
                  </label>
                  <label className="flex items-center gap-2 text-white/70 text-sm cursor-pointer">
                    <input type="checkbox" checked={newSubAskFor.includes('email')} onChange={() => setNewSubAskFor(prev => prev.includes('email') ? prev.filter(f => f !== 'email') : [...prev, 'email'])} className="w-4 h-4 accent-red-500" />
                    Email
                  </label>
                </div>
              </div>
              <div className="flex gap-3 mt-4">
                {showEditSub ? (
                  <button onClick={handleUpdateSubscription} className="btn-neon"><i className="fas fa-save mr-2"></i> Update</button>
                ) : (
                  <button onClick={handleAddSubscription} className="btn-neon"><i className="fas fa-check mr-2"></i> Create</button>
                )}
                <button onClick={resetAddForm} className="btn-neon-outline">Cancel</button>
              </div>
            </div>
          )}

          {/* Tabs */}
          <div className="flex flex-wrap gap-2 border-b border-white/5 pb-3">
            {['overview', 'subscriptions', 'customers', 'income', 'users', 'deals', 'promotions', 'otp'].map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)} className={`tab-btn ${activeTab === tab ? 'active' : ''}`}>
                {tab === 'overview' && <><i className="fas fa-chart-pie mr-2"></i> Overview</>}
                {tab === 'subscriptions' && <><i className="fas fa-crown mr-2"></i> Subscriptions</>}
                {tab === 'customers' && <><i className="fas fa-users mr-2"></i> Customers</>}
                {tab === 'income' && <><i className="fas fa-coins mr-2"></i> Income</>}
                {tab === 'users' && <><i className="fas fa-user-friends mr-2"></i> Users</>}
                {tab === 'deals' && <><i className="fas fa-fire mr-2"></i> Deals</>}
                {tab === 'promotions' && <><i className="fas fa-film mr-2"></i> Promotions</>}
                {tab === 'otp' && <><i className="fas fa-key mr-2"></i> OTP Logs</>}
              </button>
            ))}
          </div>

          {/* Overview */}
          {activeTab === 'overview' && (
            <div className="glass-panel">
              <h3 className="text-white font-semibold">Dashboard Overview</h3>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mt-4">
                <div className="bg-white/5 p-4 rounded-xl">
                  <p className="text-white/30 text-xs">Subscriptions</p>
                  <p className="text-2xl font-bold text-white">{subscriptions.length}</p>
                </div>
                <div className="bg-white/5 p-4 rounded-xl">
                  <p className="text-white/30 text-xs">Total Customers</p>
                  <p className="text-2xl font-bold text-white">
                    {subscriptions.reduce((acc, sub) => acc + getTotalCustomers(sub), 0)}
                  </p>
                </div>
                <div className="bg-white/5 p-4 rounded-xl">
                  <p className="text-white/30 text-xs">Expiring Soon (7 days)</p>
                  <p className="text-2xl font-bold text-yellow-400">{getExpiringSoon(subscriptions).length}</p>
                </div>
                <div className="bg-white/5 p-4 rounded-xl">
                  <p className="text-white/30 text-xs">Total Income (all)</p>
                  <p className="text-2xl font-bold text-green-400">
                    RS {incomeData ? incomeData.totalIncome : '...'}
                  </p>
                </div>
              </div>
              <button onClick={() => loadIncome(incomePeriod)} className="btn-neon-sm mt-4">
                <i className="fas fa-sync mr-1"></i> Refresh Income
              </button>
            </div>
          )}

          {/* Subscriptions */}
          {activeTab === 'subscriptions' && (
            <div className="space-y-6">
              {subscriptions.map(sub => {
                const records = getCustomerRecords(sub);
                const totalCust = getTotalCustomers(sub);
                const totalSlots = getTotalSlots(sub);
                return (
                  <div key={sub.id} className="glass-panel">
                    <div className="flex flex-wrap justify-between items-start gap-4">
                      <div>
                        <div className="flex items-center gap-3">
                          {sub.logo ? (
                            <img src={sub.logo} alt={sub.name} className="w-12 h-12 object-contain rounded-lg border border-white/10" />
                          ) : sub.type === 'netflix' ? (
                            <span className="netflix-logo" style={{ fontSize: '1.2rem' }}>
                              <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style={{ width: '1.4rem', height: '1.4rem' }}>
                                <path d="M5.5 2.5v19.5l5-2.5V5l-5 2.5zM12 2.5v19.5l5-2.5V5L12 2.5z" />
                                <path d="M18.5 2.5v19.5l5-2.5V5l-5 2.5z" />
                              </svg>
                            </span>
                          ) : (
                            <i className={`fas fa-${sub.type === 'amazon' ? 'amazon' : sub.type === 'youtube' ? 'youtube' : sub.type === 'spotify' ? 'spotify' : sub.type === 'chatgpt' ? 'robot' : sub.type === 'canva' ? 'paint-brush' : sub.type === 'capcut' ? 'video' : sub.type === 'hbomax' ? 'tv' : sub.type === 'crunchyroll' ? 'play' : sub.type === 'chaupal' ? 'film' : 'crown'} text-2xl`} style={{ color: sub.type === 'amazon' ? '#ff9900' : sub.type === 'youtube' ? '#ff0000' : sub.type === 'spotify' ? '#1db954' : sub.type === 'chatgpt' ? '#10a37f' : sub.type === 'canva' ? '#00c4cc' : sub.type === 'capcut' ? '#00d4ff' : sub.type === 'hbomax' ? '#5822b4' : sub.type === 'crunchyroll' ? '#f47521' : sub.type === 'chaupal' ? '#e74c3c' : '#ef4444' }}></i>
                          )}
                          <div>
                            <h3 className="text-lg font-semibold text-white">{sub.name}</h3>
                            <p className="text-white/30 text-xs">{sub.description || ''}</p>
                            {sub.importantNote && <p className="text-yellow-400 text-xs mt-1"><i className="fas fa-info-circle mr-1"></i> {sub.importantNote}</p>}
                          </div>
                        </div>
                        <div className="mt-1 text-xs text-white/30">
                          Cost: RS {sub.costPerMonth || 0} / mo | Selling: RS {sub.sellingPrice || sub.costPerMonth || 0} / mo | Slots: {sub.slots || 'N/A'}
                        </div>
                        <p className="text-white/30 text-xs">{sub.accounts.length} accounts • {totalSlots} slots • {totalCust} customers</p>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => openEditSub(sub)} className="btn-warning text-sm"><i className="fas fa-edit"></i> Edit</button>
                        <button onClick={() => { setNewAccount({ ...newAccount, subscriptionId: sub.id }); setShowAddAccount(sub.id); }} className="btn-neon text-sm"><i className="fas fa-plus mr-2"></i> Add Account</button>
                        <button onClick={() => deleteSubscription(sub.id)} className="btn-danger text-sm"><i className="fas fa-trash mr-1"></i> Delete</button>
                      </div>
                    </div>
                    <div className="mt-4 overflow-x-auto">
                      <table className="admin-table">
                        <thead>
                          <tr>
                            <th>Account</th>
                            <th>Screen</th>
                            <th>Customers</th>
                            <th>Actions</th>
                          </tr>
                        </thead>
                        <tbody>
                          {sub.accounts.map(acc => (
                            acc.screens.map(screen => (
                              <tr key={screen.id}>
                                <td>
                                  <span className="font-mono text-xs">{acc.email}</span>
                                  <br />
                                  <span className="text-white/30 text-xs">Pass: {acc.password}</span>
                                  <button className="copy-btn" onClick={() => { navigator.clipboard.writeText(acc.password); addToast('Password copied!', 'success'); }}>Copy</button>
                                </td>
                                <td>{screen.name} {screen.pin && `(PIN: ${screen.pin})`}</td>
                                <td>
                                  {screen.customers && screen.customers.length > 0 ? (
                                    screen.customers.map((c, i) => (
                                      <span key={i} className="inline-block bg-white/5 px-2 py-1 rounded text-xs mr-1 mb-1">
                                        {c.name || c.username}
                                        <button className="text-red-400 ml-1" onClick={() => handleRemoveCustomer(sub.id, acc.id, screen.id, i)}><i className="fas fa-times"></i></button>
                                      </span>
                                    ))
                                  ) : 'Empty'}
                                </td>
                                <td>
                                  <button className="btn-red text-xs" onClick={() => handleEditScreen(sub.id, acc.id, screen.id)}><i className="fas fa-edit"></i></button>
                                  <button className="btn-warning text-xs ml-1" onClick={() => handleEditAccount(sub.id, acc.id)}><i className="fas fa-user-cog"></i></button>
                                  <button className="btn-danger text-xs ml-1" onClick={() => handleDeleteAccount(sub.id, acc.id)}><i className="fas fa-trash"></i></button>
                                  <button className="btn-red text-xs ml-1" onClick={() => { const newPin = generatePin(); handleEditScreen(sub.id, acc.id, screen.id); setEditScreenForm({ name: screen.name, pin: newPin }); saveEditScreen(); }}><i className="fas fa-shield-alt"></i> Gen PIN</button>
                                </td>
                              </tr>
                            ))
                          ))}
                        </tbody>
                      </table>
                    </div>
                    {showAddAccount === sub.id && (
                      <div className="modal-overlay" onClick={() => setShowAddAccount(null)}>
                        <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                          <h3 className="text-xl font-bold text-white">Add Account</h3>
                          <div className="mt-4 space-y-3">
                            <input type="text" placeholder="Email" value={newAccount.email} onChange={(e) => setNewAccount({...newAccount, email: e.target.value})} className="input-neon" />
                            <div className="flex gap-2">
                              <input type="text" placeholder="Password" value={newAccount.password} onChange={(e) => setNewAccount({...newAccount, password: e.target.value})} className="input-neon flex-1" />
                              <button className="btn-red" onClick={() => setNewAccount({...newAccount, password: generatePassword()})}>Generate</button>
                            </div>
                            <div>
                              <label className="text-white/50 text-sm">Screens</label>
                              {newAccount.screens.map((s, idx) => (
                                <div key={idx} className="flex gap-2 mt-1">
                                  <input type="text" placeholder="Screen name" value={s.name} onChange={(e) => {
                                    const newScreens = [...newAccount.screens];
                                    newScreens[idx].name = e.target.value;
                                    setNewAccount({...newAccount, screens: newScreens});
                                  }} className="input-neon flex-1" />
                                  <input type="text" placeholder="PIN" value={s.pin} onChange={(e) => {
                                    const newScreens = [...newAccount.screens];
                                    newScreens[idx].pin = e.target.value;
                                    setNewAccount({...newAccount, screens: newScreens});
                                  }} className="input-neon w-20" />
                                  <button className="btn-red text-xs" onClick={() => {
                                    if (newAccount.screens.length > 1) {
                                      const newScreens = newAccount.screens.filter((_, i) => i !== idx);
                                      setNewAccount({...newAccount, screens: newScreens});
                                    }
                                  }}><i className="fas fa-times"></i></button>
                                  <button className="btn-red text-xs" onClick={() => {
                                    const newScreens = [...newAccount.screens];
                                    newScreens[idx].pin = generatePin();
                                    setNewAccount({...newAccount, screens: newScreens});
                                  }}>Gen PIN</button>
                                </div>
                              ))}
                              <button className="btn-neon-sm mt-2" onClick={() => setNewAccount({...newAccount, screens: [...newAccount.screens, { name: `Screen ${newAccount.screens.length+1}`, pin: '' }]})}>Add Screen</button>
                            </div>
                            <div className="flex gap-3">
                              <button onClick={() => handleAddAccount(sub.id)} className="btn-neon">Save</button>
                              <button onClick={() => setShowAddAccount(null)} className="btn-neon-outline">Cancel</button>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* Edit Account Modal */}
          {editingAccount && (
            <div className="modal-overlay" onClick={() => setEditingAccount(null)}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <h3 className="text-xl font-bold text-white">Edit Account</h3>
                <div className="mt-4 space-y-3">
                  <input type="text" placeholder="Email" value={editAccountForm.email} onChange={(e) => setEditAccountForm({...editAccountForm, email: e.target.value})} className="input-neon" />

                    <input type="text" placeholder="Password" value={editAccountForm.password} onChange={(e) => setEditAccountForm({...editAccountForm, password: e.target.value})} className="input-neon flex-1" />
                    <button className="btn-red" onClick={() => setEditAccountForm({...editAccountForm, password: generatePassword()})}>Generate</button>
                  </div>
                  <div className="flex gap-3">
                    <button onClick={saveEditAccount} className="btn-neon">Update</button>
                    <button onClick={() => setEditingAccount(null)} className="btn-neon-outline">Cancel</button>
                  </div>
                </div>
              </div>
            </div>

            <div className="modal-overlay" onClick={() => setEditingScreen(null)}>

                  <div className="flex gap-2">
                    <input type="text" placeholder="PIN" value={editScreenForm.pin} onChange={(e) => setEditScreenForm({...editScreenForm, pin: e.target.value})} className="input-neon flex-1" />

                  <div className="flex gap-3">
                    <button onClick={saveEditScreen} className="btn-neon">Update</button>
                    <button onClick={() => setEditingScreen(null)} className="btn-neon-outline">Cancel</button>
                  </div>
                </div>
              </div>
            </div>

                <button onClick={() => setIncomePeriod('30')} className={`tab-btn ${incomePeriod === '30' ? 'active' : ''}`}>Last 30 Days</button>
                <button onClick={() => setIncomePeriod('90')} className={`tab-btn ${incomePeriod === '90' ? 'active' : ''}`}>Last 90 Days</button>

                <div className="mt-4">
                  <p className="text-2xl font-bold text-green-400">Total: RS {incomeData.totalIncome}</p>

                      <div key={type} className="bg-white/5 p-2 rounded">
                        <span className="capitalize text-white/50">{type}</span>
                        <span className="float-right text-white">RS {amount}</span>

                  </div>
                </div>

          {/* Users tab */}
          {activeTab === 'users' && (
            <div className="glass-panel">
              <h3 className="text-white font-semibold">Registered Users</h3>
              <div className="overflow-x-auto mt-4">
                <table className="admin-table">
                  <thead><tr><th>Username</th><th>WhatsApp</th><th>Credits</th><th>Purchases</th><th>Actions</th></tr></thead>
                  <tbody>
                    {usersList.map(u => (
                      <tr key={u.username}>
                        <td>{u.username}</td>
                        <td>{u.whatsapp}</td>
                        <td>{u.credits}</td>
                        <td>{u.purchaseCount}</td>
                        <td>
                          <div className="flex gap-1 items-center">
                            <input type="number" placeholder="Add" className="input-neon w-16" value={addCreditsAmount} onChange={(e) => setAddCreditsAmount(Number(e.target.value))} />
                            <button className="btn-success text-xs" onClick={() => handleAddCredits(u.username)}>+</button>
                            <input type="number" placeholder="Deduct" className="input-neon w-16" value={deductCreditsAmount} onChange={(e) => setDeductCreditsAmount(Number(e.target.value))} />
                            <button className="btn-danger text-xs" onClick={() => handleDeductCredits(u.username)}>-</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Deals tab */}
          {activeTab === 'deals' && (
            <div className="glass-panel">
              <div className="flex justify-between items-center">
                <h3 className="text-white font-semibold">Deals</h3>
                <button onClick={() => openDealModal()} className="btn-neon-sm">+ New Deal</button>
              </div>
              <div className="mt-4 space-y-2">
                {deals.map(deal => (
                  <div key={deal.id} className="bg-white/5 p-4 rounded flex justify-between items-center">
                    <div>
                      <h4 className="text-white font-medium">{deal.title}</h4>
                      <p className="text-white/30 text-sm">{deal.description}</p>
                      <p className="text-white/30 text-sm">RS {deal.actualPrice} → RS {deal.discountPrice}  |  Active: {deal.active ? '✅' : '❌'}</p>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={() => openDealModal(deal)} className="btn-warning text-sm">Edit</button>
                      <button onClick={() => toggleDealStatus(deal)} className="btn-red text-sm">{deal.active ? 'Deactivate' : 'Activate'}</button>
                      <button onClick={() => deleteDealHandler(deal.id)} className="btn-danger text-sm">Delete</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>

          {/* Promotions tab */}
          {activeTab === 'promotions' && (
            <div className="glass-panel">
              <div className="flex justify-between items-center">
                <h3 className="text-white font-semibold">Promotions</h3>
                <button onClick={() => openPromoModal()} className="btn-neon-sm">+ New Promotion</button>
              </div>
              <div className="mt-4 grid grid-cols-2 sm:grid-cols-3 gap-4">
                {promotions.map(promo => (
                  <div key={promo.id} className="bg-white/5 p-4 rounded relative">
                    {promo.image && <img src={promo.image} alt={promo.heading} className="w-full h-24 object-cover rounded mb-2" />}
                    <p className="text-white font-medium">{promo.heading}</p>
                    <p className="text-white/30 text-sm">Active: {promo.active ? '✅' : '❌'}</p>
                    <div className="flex gap-1 mt-2">
                      <button onClick={() => openPromoModal(promo)} className="btn-warning text-xs">Edit</button>
                      <button onClick={() => togglePromotionStatus(promo)} className="btn-red text-xs">{promo.active ? 'Deactivate' : 'Activate'}</button>
                      <button onClick={() => deletePromotionHandler(promo.id)} className="btn-danger text-xs">Delete</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* OTP tab */}
          {activeTab === 'otp' && (
            <div className="glass-panel">
              <h3 className="text-white font-semibold">OTP Logs</h3>
              <div className="overflow-x-auto mt-4">
                <table className="admin-table">
                  <thead><tr><th>OTP</th><th>User</th><th>Description</th><th>Created</th><th>Expires</th><th>Verified</th></tr></thead>
                  <tbody>
                    {otpList.map(otp => (
                      <tr key={otp.id}>
                        <td className="font-mono text-red-400">{otp.otp}</td>
                        <td>{otp.userIdentifier}</td>
                        <td>{otp.description}</td>
                        <td>{new Date(otp.createdAt).toLocaleString()}</td>
                        <td>{new Date(otp.expiresAt).toLocaleString()}</td>
                        <td>{otp.verified ? '✅' : '⏳'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Deal Modal */}
          {showDealModal && (
            <div className="modal-overlay" onClick={() => setShowDealModal(false)}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <h3 className="text-xl font-bold text-white">{editingDeal ? 'Edit Deal' : 'New Deal'}</h3>
                <div className="mt-4 space-y-3">
                  <input type="text" placeholder="Title" value={dealForm.title} onChange={(e) => setDealForm({...dealForm, title: e.target.value})} className="input-neon" />
                  <input type="text" placeholder="Description" value={dealForm.description} onChange={(e) => setDealForm({...dealForm, description: e.target.value})} className="input-neon" />
                  <input type="number" placeholder="Actual Price" value={dealForm.actualPrice} onChange={(e) => setDealForm({...dealForm, actualPrice: e.target.value})} className="input-neon" />
                  <input type="number" placeholder="Discount Price" value={dealForm.discountPrice} onChange={(e) => setDealForm({...dealForm, discountPrice: e.target.value})} className="input-neon" />
                  <div>
                    <p className="text-white/50 text-sm">Select Subscriptions:</p>
                    <div className="flex flex-wrap gap-2 mt-1">
                      {subscriptions.map(sub => (
                        <label key={sub.id} className="flex items-center gap-1 text-white/70 text-sm cursor-pointer">
                          <input type="checkbox" checked={dealForm.subscriptionIds.includes(sub.id)} onChange={() => toggleSubscriptionInDeal(sub.id)} className="accent-red-500" />
                          {sub.name}
                        </label>
                      ))}
                    </div>
                  </div>
                  <div className="flex gap-3">
                    <button onClick={saveDeal} className="btn-neon">Save</button>
                    <button onClick={() => setShowDealModal(false)} className="btn-neon-outline">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Promotion Modal */}
          {showPromoModal && (
            <div className="modal-overlay" onClick={() => setShowPromoModal(false)}>
              <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                <h3 className="text-xl font-bold text-white">{editingPromo ? 'Edit Promotion' : 'New Promotion'}</h3>
                <div className="mt-4 space-y-3">
                  <input type="text" placeholder="Heading" value={promoForm.heading} onChange={(e) => setPromoForm({...promoForm, heading: e.target.value})} className="input-neon" />
                  <input type="file" accept="image/*" onChange={handlePromoImageChange} className="input-neon p-2" />
                  {promoImagePreview && <img src={promoImagePreview} alt="Preview" className="promo-upload-preview" />}
                  <div className="flex gap-3">
                    <button onClick={savePromotion} className="btn-neon">Save</button>
                    <button onClick={() => setShowPromoModal(false)} className="btn-neon-outline">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── MAIN APP ──────────────────────────────────────────────
    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [showSubscriptions, setShowSubscriptions] = useState(false);
      const [selectedSubscription, setSelectedSubscription] = useState(null);
      const [subscriptions, setSubscriptions] = useState([]);
      const [deals, setDeals] = useState([]);
      const [promotions, setPromotions] = useState([]);
      const [isAdmin, setIsAdmin] = useState(false);
      const [customerData, setCustomerData] = useState(null);
      const [flowStep, setFlowStep] = useState('welcome');
      const [flowType, setFlowType] = useState(null);
      const [showAuth, setShowAuth] = useState(false);
      const [selectedDeal, setSelectedDeal] = useState(null);
      const [loadingData, setLoadingData] = useState(true);
      const { addToast } = useContext(AppContext);
      const { user, setUser, refreshUser } = useContext(UserContext);

      useEffect(() => {
        const loadData = async () => {
          try {
            const [subs, dealsData, promos] = await Promise.all([fetchSubscriptions(), fetchDeals(), fetchPromotions()]);
            setSubscriptions(subs);
            setDeals(dealsData);
            setPromotions(promos);
          } catch (err) {
            console.error('Failed to load data', err);
            addToast('Could not load data. Is the backend running?', 'error');
          } finally {
            setLoadingData(false);
          }
        };
        loadData();
      }, []);

      const resetFlow = () => {
        setFlowStep('welcome');
        setFlowType(null);
        setSelectedSubscription(null);
        setCustomerData(null);
        setShowAuth(false);
        setSelectedDeal(null);
      };

      const handleSubSelect = (sub) => {
        setSelectedSubscription(sub);
        setFlowStep('flow');
      };

      const findCustomers = (username) => {
        const allRecords = [];
        subscriptions.forEach(sub => {
          if (sub.accounts) {
            sub.accounts.forEach(acc => {
              if (acc.screens) {
                acc.screens.forEach(screen => {
                  if (screen.customers) {
                    screen.customers.forEach(c => {
                      if (c.username === username) {
                        allRecords.push({
                          subscriptionName: sub.name,
                          screenName: screen.name,
                          expiryDate: c.expiryDate,
                          months: c.months || 1,
                          purchasedAt: c.purchasedAt
                        });
                      }
                    });
                  }
                });
              }
            });
          }
        });
        return allRecords;
      };

      const handleSubComplete = async (data) => {
        if (data.success) {
          addToast(data.message, 'success');
          await refreshUser();
          resetFlow();
        } else {
          addToast(data.message || 'Purchase failed', 'error');
        }
      };

      const handleLogin = async (userData) => {
        setUser(userData);
        setShowAuth(false);
        await refreshUser();
        setFlowStep('select');
        setActiveTab('subscriptions');
        setShowSubscriptions(true);
      };

      const handleLogout = () => {
        setUser(null);
        setCustomerData(null);
        resetFlow();
        setActiveTab('home');
        setShowSubscriptions(false);
        addToast('Logged out.', 'info');
      };

      const renderFlow = () => {
        if (!user) {
          return <AuthPage onLogin={handleLogin} onSignup={handleLogin} />;
        }
        if (flowStep === 'select') {
          return (
            <div className="glass-panel">
              <h3 className="text-xl font-bold text-white">Select a Subscription</h3>
              <SubscriptionSelection subscriptions={subscriptions} selected={selectedSubscription} onSelect={handleSubSelect} />
            </div>
          );
        }
        if (flowStep === 'flow' && selectedSubscription) {
          const sub = selectedSubscription;
          if (sub.type === 'netflix') {
            return <NetflixFlow subscription={sub} onComplete={handleSubComplete} onCancel={resetFlow} user={user} />;
          } else if (sub.type === 'amazon') {
            return <AmazonFlow subscription={sub} onComplete={handleSubComplete} onCancel={resetFlow} user={user} />;
          } else {
            return <SimpleSubscriptionFlow subscription={sub} onComplete={handleSubComplete} onCancel={resetFlow} user={user} />;
          }
        }
        if (flowStep === 'deal-purchase' && selectedDeal) {
          return <DealPurchaseFlow deal={selectedDeal} onComplete={handleSubComplete} onCancel={resetFlow} user={user} subscriptions={subscriptions} />;
        }
        if (flowStep === 'customer-dash') {
          const records = findCustomers(user.username);
          return <CustomerDashboard customerData={records} onLogout={handleLogout} deals={deals} onDealPurchase={() => {}} subscriptions={subscriptions} />;
        }
        return null;
      };

      const handleGetStarted = () => {
        if (user) {
          setFlowStep('select');
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
        } else {
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
          setFlowStep('auth');
        }
      };

      const handleCustomerPortal = async () => {
        if (user) {
          await refreshUser();
          const found = findCustomers(user.username);
          setCustomerData(found);
          setFlowStep('customer-dash');
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
        } else {
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
          setFlowStep('auth');
        }
      };

      const handleDealPurchase = (deal) => {
        if (!user) {
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
          setFlowStep('auth');
          addToast('Please login first to purchase this deal.', 'info');
          return;
        }
        setSelectedDeal(deal);
        setFlowStep('deal-purchase');
        setActiveTab('subscriptions');
        setShowSubscriptions(true);
      };

      const dealsWithSub = deals.filter(d => d.active).map(deal => {
        const subs = (deal.subscriptionIds || []).map(id => subscriptions.find(s => s.id === id)).filter(Boolean);
        return { ...deal, subscriptions: subs };
      }).filter(d => d.subscriptions.length > 0);

      function Footer() {
        return (
          <footer className="footer">
            <div className="max-w-7xl mx-auto px-4">
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 lg:gap-12">
                <div>
                  <div className="footer-brand"><span>Zetlify</span></div>
                  <p className="footer-desc mt-3">Your one-stop destination for premium subscriptions from the world's best platforms.</p>
                  <div className="footer-social mt-4 flex gap-2">
                    <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><i className="fab fa-facebook-f"></i></a>
                    <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i className="fab fa-instagram"></i></a>
                    <a href="https://youtube.com" target="_blank" rel="noopener noreferrer" aria-label="YouTube"><i className="fab fa-youtube"></i></a>
                    <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" aria-label="Twitter"><i className="fab fa-twitter"></i></a>
                    <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i className="fab fa-linkedin-in"></i></a>
                  </div>
                </div>
                <div>
                  <h4 className="footer-heading">Quick Links</h4>
                  <div className="flex flex-col gap-1">
                    <a href="#" className="footer-link">Home</a>
                    <a href="#" className="footer-link">Subscriptions</a>
                    <a href="#" className="footer-link">Contact Us</a>
                    <a href="#" className="footer-link">About Us</a>
                    <a href="#" className="footer-link">Support</a>
                  </div>
                </div>
                <div>
                  <h4 className="footer-heading">Contact Info</h4>
                  <div className="flex flex-col gap-2">
                    <div className="flex items-start gap-3 text-white/30 text-sm"><i className="fas fa-map-marker-alt text-red-400 mt-1"></i><span>Lahore, Pakistan</span></div>
                    <div className="flex items-center gap-3 text-white/30 text-sm"><i className="fas fa-phone text-red-400"></i><a href="tel:+923079163485" className="footer-link">+92 307 9163485</a></div>
                    <div className="flex items-center gap-3 text-white/30 text-sm"><i className="fab fa-whatsapp text-green-400"></i><a href="https://wa.me/923079163485" target="_blank" rel="noopener noreferrer" className="footer-link">WhatsApp</a></div>
                    <div className="flex items-center gap-3 text-white/30 text-sm"><i className="fas fa-envelope text-red-400"></i><a href="mailto:support@zetlify.com" className="footer-link">support@zetlify.com</a></div>
                  </div>
                </div>
                <div>
                  <h4 className="footer-heading">Newsletter</h4>
                  <p className="text-white/30 text-sm mb-3">Stay updated with the latest deals and subscriptions.</p>
                  <div className="flex gap-2">
                    <input type="email" placeholder="Your email" className="input-neon flex-1 text-sm" />
                    <button className="btn-neon text-sm px-4 py-2 whitespace-nowrap">Subscribe</button>
                  </div>
                </div>
              </div>
              <div className="footer-bottom">
                <p>© 2026 Zetlify. All rights reserved. Built with <i className="fas fa-heart text-red-400"></i> for premium entertainment.</p>
              </div>
            </div>
          </footer>
        );
      }

      if (loadingData) {
        return (
          <div className="min-h-screen pt-16 flex items-center justify-center">
            <div className="glass-panel text-center">
              <div className="spinner mx-auto mb-4"></div>
              <p className="text-white/40">Loading deals & subscriptions...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen pt-16">
          <Navbar activeTab={activeTab} setActiveTab={setActiveTab} showSubscriptions={showSubscriptions} setShowSubscriptions={setShowSubscriptions} onCustomerPortal={handleCustomerPortal} onLogout={handleLogout} />
          <ToastContainer />

          {activeTab === 'home' && !showSubscriptions && (
            <>
              {dealsWithSub.length > 0 && (
                <div className="max-w-7xl mx-auto px-4 pt-4 pb-2">
                  <DealsCarousel deals={dealsWithSub} subscriptions={subscriptions} onPurchaseClick={handleDealPurchase} />
                </div>
              )}
              <Hero onGetStarted={handleGetStarted} />
              <TrendingSubscriptions />
              {promotions.length > 0 && (
                <div className="max-w-7xl mx-auto px-4 pt-4 pb-2">
                  <PromotionsCarousel promotions={promotions} />
                </div>
              )}
              <WhatsAppButton />
              <Footer />
            </>
          )}

          {(activeTab === 'subscriptions' || showSubscriptions) && (
            <section id="subscription-section" className="px-4 max-w-7xl mx-auto pb-20">
              {flowStep === 'auth' && !user && (
                <AuthPage onLogin={handleLogin} onSignup={handleLogin} />
              )}
              {user && flowStep === 'welcome' && (
                <div className="glass-panel text-center">
                  <h2 className="text-2xl font-bold text-white">Welcome back, {user.username}!</h2>
                  <p className="text-white/30">You have RS {user.credits} credits.</p>
                  <button onClick={() => setFlowStep('select')} className="btn-neon mt-4">Browse Subscriptions</button>
                </div>
              )}
              {flowStep !== 'auth' && renderFlow()}
              {flowStep === 'welcome' && !user && (
                <div className="glass-panel text-center">
                  <h2 className="text-2xl font-bold text-white">Get Started</h2>
                  <p className="text-white/30">Login or sign up to start enjoying premium subscriptions.</p>
                  <button onClick={() => setFlowStep('auth')} className="btn-neon mt-4">Login / Sign Up</button>
                </div>
              )}
            </section>
          )}

          {activeTab === 'admin' && (
            <section id="admin-section" className="px-4 max-w-7xl mx-auto pb-20">
              {!isAdmin ? (
                <AdminLogin onLogin={() => setIsAdmin(true)} />
              ) : (
                <AdminDashboard subscriptions={subscriptions} setSubscriptions={setSubscriptions} onLogout={() => setIsAdmin(false)} deals={deals} setDeals={setDeals} promotions={promotions} setPromotions={setPromotions} />
              )}
            </section>
          )}

          {activeTab === 'contact' && (
            <section id="contact-section" className="px-4 max-w-7xl mx-auto pb-20">
              <div className="glass-panel">
                <h2 className="text-2xl font-bold text-white">Contact Us</h2>
                <p className="text-white/30">Reach out to us via any of the channels below.</p>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
                  <div className="contact-icon-box">
                    <span className="icon">📞</span>
                    <p className="label">Phone</p>
                    <p className="value"><a href="tel:+923079163485">+92 307 9163485</a></p>
                  </div>
                  <div className="contact-icon-box">
                    <span className="icon">💬</span>
                    <p className="label">WhatsApp</p>
                    <p className="value"><a href="https://wa.me/923079163485" target="_blank">Chat Now</a></p>
                  </div>
                  <div className="contact-icon-box">
                    <span className="icon">✉️</span>
                    <p className="label">Email</p>
                    <p className="value"><a href="mailto:support@zetlify.com">support@zetlify.com</a></p>
                  </div>
                </div>
              </div>
            </section>
          )}

          {activeTab === 'social' && (
            <section id="social-section" className="px-4 max-w-7xl mx-auto pb-20">
              <div className="glass-panel">
                <h2 className="text-2xl font-bold text-white">Follow Us</h2>
                <p className="text-white/30">Connect with us on social media.</p>
                <div className="space-y-3 mt-4">
                  <a href="#" className="social-link-card"><span className="social-icon"><i className="fab fa-facebook-f" style={{ color: '#1877F2' }}></i></span><span className="social-name">Facebook</span><span className="social-handle">@zetlify</span><span className="social-arrow">→</span></a>
                  <a href="#" className="social-link-card"><span className="social-icon"><i className="fab fa-instagram" style={{ color: '#E4405F' }}></i></span><span className="social-name">Instagram</span><span className="social-handle">@zetlify</span><span className="social-arrow">→</span></a>

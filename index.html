          if (!acc) return;
          const screen = acc.screens.find(s => s.id === screenId);
          if (!screen || !screen.customers) return;
          screen.customers.splice(customerIdx, 1);
          setSubscriptions(prev => prev.map(s => s.id === subId ? updatedSub : s));
          await updateSubscription(subId, updatedSub);
          await refreshData();
          addToast('Customer deleted.', 'warning');
        }
      };

      // ─── Edit customer ──────────────────────────────────
      const openEditModal = (subId, accId, screenId, customerIdx, customer) => {
        setEditingCustomer({ subId, accId, screenId, customerIdx });
        setEditForm({
          name: customer.name || '',
          username: customer.username || '',
          password: customer.password || '',
          whatsapp: customer.whatsapp || '',
          expiryDate: customer.expiryDate || ''
        });
      };
      const closeEditModal = () => {
        setEditingCustomer(null);
        setEditForm({ name: '', username: '', password: '', whatsapp: '', expiryDate: '' });
      };
      const saveEdit = async () => {
        if (!editingCustomer) return;
        const { subId, accId, screenId, customerIdx } = editingCustomer;
        const sub = subscriptions.find(s => s.id === subId);
        if (!sub) { addToast('Subscription not found', 'error'); return; }
        const updatedSub = JSON.parse(JSON.stringify(sub));
        const acc = updatedSub.accounts.find(a => a.id === accId);
        if (!acc) { addToast('Account not found', 'error'); return; }
        const screen = acc.screens.find(s => s.id === screenId);
        if (!screen || !screen.customers || screen.customers.length <= customerIdx) {
          addToast('Customer not found', 'error');
          return;
        }
        screen.customers[customerIdx] = {
          ...screen.customers[customerIdx],
          name: editForm.name,
          username: editForm.username,
          password: editForm.password,
          whatsapp: editForm.whatsapp,
          expiryDate: editForm.expiryDate
        };
        setSubscriptions(prev => prev.map(s => s.id === subId ? updatedSub : s));
        try {
          await updateSubscription(subId, updatedSub);
          await refreshData();
          addToast('Customer updated.', 'success');
          closeEditModal();
        } catch (err) {
          console.error('Update error:', err);
          addToast('Failed to update customer.', 'error');
          await refreshData();
        }
      };

      // ─── Add subscription ──────────────────────────────
      const handleAddSubscription = async () => {
        if (!newSubName.trim()) {
          addToast('Enter subscription name', 'error');
          return;
        }
        const newSub = {
          id: Date.now().toString(),
          name: newSubName.trim(),
          type: newSubType,
          accounts: [],
          createdAt: new Date().toISOString()
        };
        const result = await createSubscription(newSub);
        setSubscriptions(prev => [...prev, result]);
        setNewSubName('');
        setShowAddSub(false);
        await refreshData();
        addToast(`Added ${newSub.name}!`, 'success');
      };

      // ─── Add account ────────────────────────────────────
      const handleAddAccount = async (subId) => {
        if (!newAccount.email.trim() || !newAccount.password.trim()) {
          addToast('Email and password required', 'error');
          return;
        }
        const sub = subscriptions.find(s => s.id === subId);
        if (!sub) { addToast('Subscription not found', 'error'); return; }
        const updatedSub = JSON.parse(JSON.stringify(sub));
        const account = {
          id: Date.now().toString(),
          email: newAccount.email.trim(),
          password: newAccount.password.trim(),
          screens: newAccount.screens.map(s => ({
            ...s,
            id: Date.now().toString() + Math.random().toString(36).slice(2, 6),
            customers: []
          })),
          createdAt: new Date().toISOString()
        };
        updatedSub.accounts.push(account);
        setSubscriptions(prev => prev.map(s => s.id === subId ? updatedSub : s));
        await updateSubscription(subId, updatedSub);
        setNewAccount({ email: '', password: '', screens: [{ name: 'Screen 1', pin: '' }], subscriptionId: '' });
        setShowAddAccount(null);
        await refreshData();
        addToast('Account added!', 'success');
      };

      // ─── UI rendering ──────────────────────────────────────
      const getCustomerRecords = (sub) => {
        const records = [];
        sub.accounts.forEach(acc => {
          acc.screens.forEach(screen => {
            if (screen.customers && screen.customers.length > 0) {
              screen.customers.forEach((c, idx) => {
                records.push({
                  accountEmail: acc.email,
                  screenName: screen.name,
                  customer: c,
                  expiry: c.expiryDate || 'N/A',
                  accountId: acc.id,
                  screenId: screen.id,
                  customerIdx: idx
                });
              });
            }
          });
        });
        return records;
      };
      const getTotalCustomers = (sub) => {
        let count = 0;
        sub.accounts.forEach(acc => {
          acc.screens.forEach(screen => {
            count += (screen.customers?.length || 0);
          });
        });
        return count;
      };
      const getTotalSlots = (sub) => {
        let count = 0;
        sub.accounts.forEach(acc => {
          count += (acc.screens?.length || 0);
        });
        return count;
      };
      const checkExpiry = (dateStr) => {
        if (!dateStr) return 'unknown';
        const now = new Date();
        const expiry = new Date(dateStr);
        const diff = Math.ceil((expiry - now) / (1000 * 60 * 60 * 24));
        if (diff < 0) return 'expired';
        if (diff === 0) return 'today';
        if (diff === 1) return 'tomorrow';
        if (diff <= 3) return 'soon';
        return 'active';
      };
      const getExpiringSoon = () => {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const results = [];
        subscriptions.forEach(sub => {
          sub.accounts.forEach(acc => {
            acc.screens.forEach(screen => {
              if (screen.customers) {
                screen.customers.forEach(c => {
                  if (c.expiryDate) {
                    const exp = new Date(c.expiryDate);
                    exp.setHours(0, 0, 0, 0);
                    const diff = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
                    if (diff === 0 || diff === 1) {
                      results.push({
                        name: c.name || c.username,
                        username: c.username,
                        whatsapp: c.whatsapp,
                        expiryDate: c.expiryDate,
                        subscriptionName: sub.name,
                        screenName: screen.name,
                        diff
                      });
                    }
                  }
                });
              }
            });
          });
        });
        return results;
      };

      const addScreenToAccount = () => {
        setNewAccount(prev => ({
          ...prev,
          screens: [...prev.screens, { name: `Screen ${prev.screens.length + 1}`, pin: '' }]
        }));
      };
      const updateScreen = (idx, field, value) => {
        const updated = [...newAccount.screens];
        updated[idx][field] = value;
        setNewAccount(prev => ({ ...prev, screens: updated }));
      };

      const openEditAccount = (subId, accId, email, password) => {
        setEditingAccount({ subId, accId });
        setEditAccountForm({ email, password });
      };
      const openEditScreen = (subId, accId, screenId, name, pin) => {
        setEditingScreen({ subId, accId, screenId });
        setEditScreenForm({ name, pin });
      };

      const saveAccountEdit = async () => {
        const { subId, accId } = editingAccount;
        const { email, password } = editAccountForm;
        const sub = subscriptions.find(s => s.id === subId);
        if (!sub) return;
        const updatedSub = JSON.parse(JSON.stringify(sub));
        const acc = updatedSub.accounts.find(a => a.id === accId);
        if (!acc) return;
        acc.email = email;
        acc.password = password;
        setSubscriptions(prev => prev.map(s => s.id === subId ? updatedSub : s));
        await updateSubscription(subId, updatedSub);
        await refreshData();
        setEditingAccount(null);
        addToast('Account updated!', 'success');
      };

      const saveScreenEdit = async () => {
        const { subId, accId, screenId } = editingScreen;
        const { name, pin } = editScreenForm;
        const sub = subscriptions.find(s => s.id === subId);
        if (!sub) return;
        const updatedSub = JSON.parse(JSON.stringify(sub));
        const acc = updatedSub.accounts.find(a => a.id === accId);
        if (!acc) return;
        const screen = acc.screens.find(s => s.id === screenId);
        if (!screen) return;
        screen.name = name;
        screen.pin = pin;
        setSubscriptions(prev => prev.map(s => s.id === subId ? updatedSub : s));
        await updateSubscription(subId, updatedSub);
        await refreshData();
        setEditingScreen(null);
        addToast('Screen updated!', 'success');
      };

      const handleGeneratePassword = async (subId, accId) => {
        const newPass = generatePassword();
        const sub = subscriptions.find(s => s.id === subId);
        if (!sub) return;
        const updatedSub = JSON.parse(JSON.stringify(sub));
        const acc = updatedSub.accounts.find(a => a.id === accId);
        if (!acc) return;
        acc.password = newPass;
        setSubscriptions(prev => prev.map(s => s.id === subId ? updatedSub : s));
        await updateSubscription(subId, updatedSub);
        addToast('New password generated!', 'success');
      };

      const handleGeneratePin = async (subId, accId, screenId) => {
        const newPin = generatePin();
        const sub = subscriptions.find(s => s.id === subId);
        if (!sub) return;
        const updatedSub = JSON.parse(JSON.stringify(sub));
        const acc = updatedSub.accounts.find(a => a.id === accId);
        if (!acc) return;
        const screen = acc.screens.find(s => s.id === screenId);
        if (!screen) return;
        screen.pin = newPin;
        setSubscriptions(prev => prev.map(s => s.id === subId ? updatedSub : s));
        await updateSubscription(subId, updatedSub);
        addToast('New PIN generated!', 'success');
      };

      const generatePassword = () => {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&';
        let pass = '';
        for (let i = 0; i < 12; i++) {
          pass += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return pass;
      };
      const generatePin = () => String(Math.floor(1000 + Math.random() * 9000));

      // ---- Render ----
      return (
        <div className="space-y-6">
          <div className="flex flex-wrap justify-between items-center gap-4">
            <div>
              <h2 className="text-2xl font-bold text-white"><i className="fas fa-user-shield text-purple-400 mr-3"></i> Admin Dashboard</h2>
              <p className="text-white/30 text-sm">Manage everything.</p>
            </div>
            <div className="flex flex-wrap gap-2">
              <button onClick={refreshData} className="btn-purple text-sm">
                <i className="fas fa-sync mr-1"></i> Refresh
              </button>
              <button onClick={() => setShowAdminSettings(!showAdminSettings)} className="btn-warning text-sm">
                <i className="fas fa-cog mr-1"></i> Settings
              </button>
              <button onClick={() => setShowAddSub(!showAddSub)} className="btn-neon text-sm">
                <i className="fas fa-plus mr-2"></i> Add Subscription
              </button>
              <button onClick={onLogout} className="btn-neon-outline text-sm">
                <i className="fas fa-sign-out-alt mr-2"></i> Logout
              </button>
            </div>
          </div>

          {showAdminSettings && (
            <div className="glass-panel">
              <h3 className="text-lg font-semibold text-white mb-4"><i className="fas fa-lock text-purple-400 mr-2"></i> Change Admin Password</h3>
              <div className="space-y-3">
                <div>
                  <label className="text-white/50 text-sm">New Password</label>
                  <input type="password" value={newAdminPassword} onChange={(e) => setNewAdminPassword(e.target.value)} className="input-neon mt-1" placeholder="Enter new password" />
                </div>
                <div>
                  <label className="text-white/50 text-sm">Confirm Password</label>
                  <input type="password" value={confirmAdminPassword} onChange={(e) => setConfirmAdminPassword(e.target.value)} className="input-neon mt-1" placeholder="Confirm new password" />
                </div>
                <div className="flex gap-3 mt-2">
                  <button onClick={handleChangeAdminPassword} className="btn-neon"><i className="fas fa-save mr-2"></i> Update Password</button>
                  <button onClick={() => { setShowAdminSettings(false); setNewAdminPassword(''); setConfirmAdminPassword(''); }} className="btn-neon-outline">Cancel</button>
                </div>
              </div>
            </div>
          )}

          {showAddSub && (
            <div className="glass-panel">
              <h3 className="text-lg font-semibold text-white mb-4"><i className="fas fa-plus-circle text-purple-400 mr-2"></i> New Subscription</h3>
              <div className="grid sm:grid-cols-2 gap-4">
                <div>
                  <label className="text-white/50 text-sm">Name</label>
                  <input type="text" value={newSubName} onChange={(e) => setNewSubName(e.target.value)} className="input-neon mt-1" placeholder="e.g. Disney+" />
                </div>
                <div>
                  <label className="text-white/50 text-sm">Type</label>
                  <select value={newSubType} onChange={(e) => setNewSubType(e.target.value)} className="input-neon mt-1">
                    <option value="netflix">Netflix</option>
                    <option value="amazon">Amazon Prime</option>
                    <option value="youtube">YouTube Premium</option>
                    <option value="spotify">Spotify Premium</option>
                    <option value="chatgpt">ChatGPT</option>
                    <option value="custom">Custom</option>
                  </select>
                </div>
              </div>
              <div className="flex gap-3 mt-4">
                <button onClick={handleAddSubscription} className="btn-neon"><i className="fas fa-check mr-2"></i> Create</button>
                <button onClick={() => setShowAddSub(false)} className="btn-neon-outline">Cancel</button>
              </div>
            </div>
          )}

          <div className="flex flex-wrap gap-2 border-b border-white/5 pb-3">
            {['overview', 'subscriptions', 'customers', 'users', 'deals', 'otp'].map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)} className={`tab-btn ${activeTab === tab ? 'active' : ''}`}>
                {tab === 'overview' && <><i className="fas fa-chart-pie mr-2"></i> Overview</>}
                {tab === 'subscriptions' && <><i className="fas fa-crown mr-2"></i> Subscriptions</>}
                {tab === 'customers' && <><i className="fas fa-users mr-2"></i> Customers</>}
                {tab === 'users' && <><i className="fas fa-user-friends mr-2"></i> Users</>}
                {tab === 'deals' && <><i className="fas fa-fire mr-2"></i> Deals</>}
                {tab === 'otp' && <><i className="fas fa-key mr-2"></i> OTP Logs</>}
              </button>
            ))}
          </div>

          {activeTab === 'overview' && (
            <div className="space-y-4">
              <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div className="glass-panel text-center">
                  <p className="text-white/30 text-xs">Total Subscriptions</p>
                  <p className="text-3xl font-bold text-white">{subscriptions.length}</p>
                </div>
                <div className="glass-panel text-center">
                  <p className="text-white/30 text-xs">Total Accounts</p>
                  <p className="text-3xl font-bold text-white">{subscriptions.reduce((acc, s) => acc + s.accounts.length, 0)}</p>
                </div>
                <div className="glass-panel text-center">
                  <p className="text-white/30 text-xs">Total Customers</p>
                  <p className="text-3xl font-bold text-white">{subscriptions.reduce((acc, s) => acc + getTotalCustomers(s), 0)}</p>
                </div>
                <div className="glass-panel text-center">
                  <p className="text-white/30 text-xs">Total Slots</p>
                  <p className="text-3xl font-bold text-white">{subscriptions.reduce((acc, s) => acc + getTotalSlots(s), 0)}</p>
                </div>
              </div>

              {(() => {
                const expiring = getExpiringSoon();
                if (expiring.length > 0) {
                  return (
                    <div className="glass-panel border-yellow-500/30">
                      <h3 className="text-lg font-semibold text-yellow-400 mb-3"><i className="fas fa-clock mr-2"></i> Expiring Soon (Next 24h)</h3>
                      <div className="overflow-x-auto">
                        <table className="admin-table text-sm">
                          <thead>
                            <tr><th>Customer</th><th>WhatsApp</th><th>Subscription</th><th>Screen</th><th>Expiry</th><th>Status</th></tr>
                          </thead>
                          <tbody>
                            {expiring.map((item, idx) => (
                              <tr key={idx}>
                                <td>{item.name}</td>
                                <td>{item.whatsapp}</td>
                                <td>{item.subscriptionName}</td>
                                <td>{item.screenName}</td>
                                <td>{item.expiryDate}</td>
                                <td><span className="badge badge-yellow">{item.diff === 0 ? 'Today' : 'Tomorrow'}</span></td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  );
                }
                return null;
              })()}
            </div>
          )}

          {activeTab === 'subscriptions' && (
            <div className="space-y-6">
              {subscriptions.map(sub => {
                const records = getCustomerRecords(sub);
                const totalCust = getTotalCustomers(sub);
                const totalSlots = getTotalSlots(sub);
                return (
                  <div key={sub.id} className="glass-panel">
                    <div className="flex flex-wrap justify-between items-start gap-4">
                      <div>
                        <h3 className="text-lg font-semibold text-white">
                          <i className={`fas fa-${sub.type === 'netflix' ? 'netflix' : sub.type === 'amazon' ? 'amazon' : sub.type === 'youtube' ? 'youtube' : sub.type === 'spotify' ? 'spotify' : sub.type === 'chatgpt' ? 'robot' : 'crown'} mr-2`} style={{ color: sub.type === 'netflix' ? '#e50914' : sub.type === 'amazon' ? '#ff9900' : sub.type === 'youtube' ? '#ff0000' : sub.type === 'spotify' ? '#1db954' : sub.type === 'chatgpt' ? '#10a37f' : '#7c3aed' }}></i>
                          {sub.name}
                        </h3>
                        <p className="text-white/30 text-xs">{sub.accounts.length} accounts • {totalSlots} slots • {totalCust} customers</p>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={() => { setNewAccount({ ...newAccount, subscriptionId: sub.id }); setShowAddAccount(sub.id); }} className="btn-neon text-sm">
                          <i className="fas fa-plus mr-2"></i> Add Account
                        </button>
                        <button onClick={() => deleteSubscription(sub.id)} className="btn-danger text-sm">
                          <i className="fas fa-trash mr-1"></i> Delete
                        </button>
                      </div>
                    </div>

                    {sub.accounts.length > 0 && (
                      <div className="mt-4 overflow-x-auto">
                        <table className="admin-table">
                          <thead>
                            <tr><th>Email</th><th>Screens</th><th>Customers</th><th>Status</th><th>Actions</th></tr>
                          </thead>
                          <tbody>
                            {sub.accounts.map(acc => {
                              const custCount = acc.screens.reduce((a, s) => a + (s.customers?.length || 0), 0);
                              return (
                                <React.Fragment key={acc.id}>
                                  <tr>
                                    <td className="text-sm">{acc.email}</td>
                                    <td className="text-sm">{acc.screens.length}</td>
                                    <td className="text-sm"><span className={`badge ${custCount > 0 ? 'badge-green' : 'badge-yellow'}`}>{custCount} active</span></td>
                                    <td className="text-sm"><span className="badge badge-purple"><i className="fas fa-circle text-[6px] mr-1 align-middle"></i> Active</span></td>
                                    <td>
                                      <div className="flex gap-1 flex-wrap">
                                        <button onClick={() => openEditAccount(sub.id, acc.id, acc.email, acc.password)} className="btn-warning text-xs">
                                          <i className="fas fa-edit"></i>
                                        </button>
                                        <button onClick={() => handleGeneratePassword(sub.id, acc.id)} className="btn-purple text-xs">
                                          <i className="fas fa-key"></i> Gen Pass
                                        </button>
                                        <button onClick={() => deleteAccount(sub.id, acc.id)} className="btn-danger text-xs">
                                          <i className="fas fa-trash"></i>
                                        </button>
                                      </div>
                                    </td>
                                  </tr>
                                  <tr>
                                    <td colSpan="5">
                                      <div className="p-2 bg-white/5 rounded-lg mt-1">
                                        <p className="text-xs text-white/40 mb-1">Screens:</p>
                                        <div className="flex flex-wrap gap-2">
                                          {acc.screens.map(screen => (
                                            <div key={screen.id} className="flex items-center gap-2 bg-purple-500/10 px-3 py-1 rounded-full text-xs">
                                              <span className="text-white/70">{screen.name}</span>
                                              <span className="text-white/30">PIN: {screen.pin || 'N/A'}</span>
                                              <button onClick={() => openEditScreen(sub.id, acc.id, screen.id, screen.name, screen.pin)} className="btn-warning text-xs">
                                                <i className="fas fa-edit"></i>
                                              </button>
                                              <button onClick={() => handleGeneratePin(sub.id, acc.id, screen.id)} className="btn-purple text-xs">
                                                <i className="fas fa-shield-alt"></i> Gen PIN
                                              </button>
                                            </div>
                                          ))}
                                        </div>
                                      </div>
                                    </td>
                                  </tr>
                                </React.Fragment>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    )}

                    {showAddAccount === sub.id && (
                      <div className="mt-4 p-4 bg-purple-500/5 rounded-xl border border-purple-500/10">
                        <h4 className="text-white font-medium mb-3"><i className="fas fa-user-plus text-purple-400 mr-2"></i> Add Account to {sub.name}</h4>
                        <div className="grid sm:grid-cols-2 gap-4">
                          <div>
                            <label className="text-white/40 text-xs">Email</label>
                            <input type="email" value={newAccount.email} onChange={(e) => setNewAccount({ ...newAccount, email: e.target.value })} className="input-neon mt-1" placeholder="account@email.com" />
                          </div>
                          <div>
                            <label className="text-white/40 text-xs">Password</label>
                            <input type="text" value={newAccount.password} onChange={(e) => setNewAccount({ ...newAccount, password: e.target.value })} className="input-neon mt-1" placeholder="••••••••" />
                          </div>
                        </div>
                        <div className="mt-3">
                          <p className="text-white/40 text-xs mb-2">Screens (Slots)</p>
                          <div className="space-y-2">
                            {newAccount.screens.map((s, idx) => (
                              <div key={idx} className="flex gap-3 items-center">
                                <input type="text" value={s.name} onChange={(e) => updateScreen(idx, 'name', e.target.value)} className="input-neon flex-1" placeholder="Screen name" />
                                <input type="text" value={s.pin} onChange={(e) => updateScreen(idx, 'pin', e.target.value)} className="input-neon w-24" placeholder="PIN" />
                              </div>
                            ))}
                            <button onClick={addScreenToAccount} className="text-purple-400 hover:text-purple-300 text-sm"><i className="fas fa-plus mr-1"></i> Add Screen</button>
                          </div>
                        </div>
                        <div className="flex gap-3 mt-4">
                          <button onClick={() => handleAddAccount(sub.id)} className="btn-neon text-sm"><i className="fas fa-check mr-2"></i> Save</button>
                          <button onClick={() => { setShowAddAccount(null); setNewAccount({ email: '', password: '', screens: [{ name: 'Screen 1', pin: '' }], subscriptionId: '' }); }} className="btn-neon-outline text-sm">Cancel</button>
                        </div>
                      </div>
                    )}

                    {records.length > 0 && (
                      <div className="mt-4">
                        <p className="text-white/40 text-xs mb-2"><i className="fas fa-users mr-1"></i> {records.length} customer(s)</p>
                        <div className="overflow-x-auto">
                          <table className="admin-table text-sm">
                            <thead>
                              <tr><th>Name</th><th>Username</th><th>WhatsApp</th><th>Screen</th><th>Account</th><th>Expiry</th><th>Status</th><th>Actions</th></tr>
                            </thead>
                            <tbody>
                              {records.map((r, idx) => {
                                const status = checkExpiry(r.expiry);
                                const statusColors = { expired: 'badge-red', today: 'badge-yellow', tomorrow: 'badge-yellow', soon: 'badge-yellow', active: 'badge-green', unknown: 'badge-purple' };

    // ─── MAIN APP ──────────────────────────────────────────────
    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [showSubscriptions, setShowSubscriptions] = useState(false);
      const [selectedSubscription, setSelectedSubscription] = useState(null);
      const [subscriptions, setSubscriptions] = useState([]);
      const [deals, setDeals] = useState([]);
      const [isAdmin, setIsAdmin] = useState(false);
      const [customerData, setCustomerData] = useState(null);
      const [flowStep, setFlowStep] = useState('welcome');
      const [flowType, setFlowType] = useState(null);
      const [showAuth, setShowAuth] = useState(false);
      const [selectedDeal, setSelectedDeal] = useState(null);
      const { addToast } = useContext(AppContext);
      const { user, setUser, refreshUser } = useContext(UserContext);

      useEffect(() => {
        const loadData = async () => {
          try {
            const subs = await fetchSubscriptions();
            setSubscriptions(subs);
            const dealsData = await fetchDeals();
            setDeals(dealsData);
          } catch (err) {
            console.error('Failed to load data', err);
            addToast('Could not load data. Is the backend running?', 'error');
          }
        };
        loadData();
      }, []);

      const resetFlow = () => {
        setFlowStep('welcome');
        setFlowType(null);
        setSelectedSubscription(null);
        setCustomerData(null);
        setShowAuth(false);
        setSelectedDeal(null);
      };

      const handleSubSelect = (sub) => {
        setSelectedSubscription(sub);
        setFlowStep('flow');
      };

      const findCustomers = (username) => {
        const results = [];
        for (let sub of subscriptions) {
          for (let acc of sub.accounts) {
            for (let screen of acc.screens) {
              if (screen.customers) {
                for (let c of screen.customers) {
                  if (c.username === username) {
                    results.push({
                      name: c.name || '',
                      username: c.username,
                      password: c.password,
                      whatsapp: c.whatsapp,
                      expiryDate: c.expiryDate,
                      screens: c.screens || 1,
                      months: c.months || 0,
                      days: c.days || 0,
                      subscriptionName: sub.name,
                      accountEmail: acc.email,
                      accountPassword: acc.password || '••••••••',
                      screenName: screen.name,
                      screenPin: screen.pin || 'N/A',
                      subscriptionId: sub.id,
                      accountId: acc.id,
                      screenId: screen.id
                    });
                  }
                }
              }
            }
          }
        }
        return results;
      };

      const handleSubComplete = async (data) => {
        addToast('Subscription activated! 🎉', 'success');
        console.log('Subscription data:', data);
        let updatedSubs = subscriptions.map(sub => {
          if (sub.id === data.subscriptionId) {
            const updated = { ...sub };
            if (data.allocated && data.allocated.length > 0) {
              data.allocated.forEach(allot => {
                updated.accounts = updated.accounts.map(acc => {
                  if (acc.id === allot.accountId) {
                    acc.screens = acc.screens.map(screen => {
                      if (screen.id === allot.screenId) {
                        if (!screen.customers) screen.customers = [];
                        screen.customers.push({
                          name: data.name || '',
                          username: data.username,
                          password: data.password,
                          whatsapp: data.whatsapp,
                          expiryDate: data.expiryDate,
                          months: data.months || 0,
                          days: data.days || 0,
                          screens: data.screens
                        });
                      }
                      return screen;
                    });
                  }
                  return acc;
                });
              });
            } else {
              if (updated.accounts.length > 0) {
                const firstAcc = updated.accounts[0];
                if (firstAcc.screens && firstAcc.screens.length > 0) {
                  const screen = firstAcc.screens[0];
                  if (!screen.customers) screen.customers = [];
                  screen.customers.push({
                    name: data.name || '',
                    username: data.username,
                    password: data.password,
                    whatsapp: data.whatsapp,
                    expiryDate: data.expiryDate,
                    months: data.months || 0,
                    days: data.days || 0,
                    screens: data.screens || 1
                  });
                } else {
                  firstAcc.screens = [{
                    id: 'default',
                    name: 'Default',
                    pin: '',
                    customers: [{
                      name: data.name || '',
                      username: data.username,
                      password: data.password,
                      whatsapp: data.whatsapp,
                      expiryDate: data.expiryDate,
                      months: data.months || 0,
                      days: data.days || 0,
                      screens: data.screens || 1
                    }]
                  }];
                }
              } else {
                updated.accounts = [{
                  id: 'default',
                  email: 'default@example.com',
                  password: 'default',
                  screens: [{
                    id: 'default',
                    name: 'Default',
                    pin: '',
                    customers: [{
                      name: data.name || '',
                      username: data.username,
                      password: data.password,
                      whatsapp: data.whatsapp,
                      expiryDate: data.expiryDate,
                      months: data.months || 0,
                      days: data.days || 0,
                      screens: data.screens || 1
                    }]
                  }]
                }];
              }
            }
            return updated;
          }
          return sub;
        });
        setSubscriptions(updatedSubs);
        const updatedSub = updatedSubs.find(s => s.id === data.subscriptionId);
        if (updatedSub) {
          await updateSubscription(data.subscriptionId, updatedSub);
        }
        const fresh = await fetchSubscriptions();
        setSubscriptions(fresh);
        const dealsData = await fetchDeals();
        setDeals(dealsData);
        resetFlow();
        setActiveTab('home');
        setShowSubscriptions(false);
        addToast('🎉 Subscription confirmed! Check your details.', 'success');
        // Redirect to customer portal
        if (user) {
          const found = findCustomers(user.username);
          setCustomerData(found);
          setFlowStep('customer-dash');
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
        }
      };

      const handleLogin = async (userData) => {
        setUser(userData);
        setShowAuth(false);
        // Refresh user to get latest credits
        await refreshUser();
        setFlowStep('select');
        setActiveTab('subscriptions');
        setShowSubscriptions(true);
      };

      const handleLogout = () => {
        setUser(null);
        setCustomerData(null);
        resetFlow();
        setActiveTab('home');
        setShowSubscriptions(false);
        addToast('Logged out.', 'info');
      };

      const renderFlow = () => {
        if (selectedDeal && flowStep === 'deal-purchase') {
          const dealSub = subscriptions.find(s => s.id === selectedDeal.subscriptionId);
          return (
            <DealPurchaseFlow
              deal={selectedDeal}
              subscription={dealSub}
              onBack={() => { setFlowStep('select'); setSelectedDeal(null); }}
              onComplete={handleSubComplete}
              user={user}
            />
          );
        }
        if (!selectedSubscription) return null;
        const type = selectedSubscription.type;
        const commonProps = {
          subscription: selectedSubscription,
          onBack: () => { setFlowStep('select'); setSelectedSubscription(null); },
          onComplete: handleSubComplete,
          user: user
        };
        switch (type) {
          case 'netflix': return <NetflixFlow {...commonProps} />;
          case 'amazon': return <AmazonFlow {...commonProps} />;
          default: return <CustomFlow {...commonProps} />;
        }
      };

      // Placeholder custom flow
      function CustomFlow({ subscription, onBack, onComplete, user }) {
        return (
          <div className="space-y-6">
            <button onClick={onBack} className="text-purple-400 hover:text-purple-300 text-sm"><i className="fas fa-arrow-left mr-2"></i> Back</button>
            <h2 className="text-2xl font-bold text-white"><i className="fas fa-plus-circle text-purple-400 mr-3"></i> {subscription.name}</h2>
            <p className="text-white/40">This subscription is not fully implemented yet.</p>
            <button onClick={() => onComplete({ subscriptionId: subscription.id, screens: 1, months: 1, days: 30, name: 'Test', username: user.username, password: user.password, whatsapp: user.whatsapp, allocated: [], expiryDate: new Date().toISOString().split('T')[0] })} className="btn-neon w-full">Complete</button>
          </div>
        );
      }

      const handleGetStarted = () => {
        if (user) {
          setFlowStep('select');
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
        } else {
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
          setFlowStep('auth');
        }
      };

      const handleCustomerPortal = async () => {
        if (user) {
          // Refresh user data first
          await refreshUser();
          const found = findCustomers(user.username);
          setCustomerData(found);
          setFlowStep('customer-dash');
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
        } else {
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
          setFlowStep('auth');
        }
      };

      const handleDealPurchase = (deal) => {
        if (!user) {
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
          setFlowStep('auth');
          addToast('Please login first to purchase this deal.', 'info');
          return;
        }
        setSelectedDeal(deal);
        setFlowStep('deal-purchase');
        setActiveTab('subscriptions');
        setShowSubscriptions(true);
      };

      // Build deals with subscription data
      const dealsWithSub = deals.map(deal => {
        const sub = subscriptions.find(s => s.id === deal.subscriptionId);
        return { ...deal, subscription: sub };
      }).filter(d => d.subscription && d.active);

      return (
        <div className="min-h-screen pt-16">
          <Navbar 
            activeTab={activeTab} 
            setActiveTab={setActiveTab} 
            showSubscriptions={showSubscriptions} 
            setShowSubscriptions={setShowSubscriptions}
            onCustomerPortal={handleCustomerPortal}
            onLogout={handleLogout}
          />
          <ToastContainer />
          {activeTab === 'home' && !showSubscriptions && (
            <>
              {/* Deals section on home page */}
              {dealsWithSub.length > 0 && (
                <div className="pt-6">
                  <DealsSection deals={dealsWithSub} subscriptions={subscriptions} onPurchaseClick={handleDealPurchase} />
                </div>
              )}
              <Hero setActiveTab={setActiveTab} setShowSubscriptions={setShowSubscriptions} onGetStarted={handleGetStarted} />
            </>
          )}
          {(activeTab === 'subscriptions' || showSubscriptions) && (
            <section id="subscription-section" className="px-4 max-w-7xl mx-auto pb-20">
              <div className="pt-6">
                {flowStep === 'welcome' && (
                  <div className="text-center">
                    <h2 className="text-3xl font-bold text-white mb-4"><i className="fas fa-gem text-purple-400 mr-3"></i> Get Subscription</h2>
                    <p className="text-white/40 mb-8">Choose an option to continue.</p>
                    <div className="flex flex-wrap justify-center gap-4">
                      <button onClick={handleGetStarted} className="btn-neon px-10 py-4 text-lg">
                        <i className="fas fa-plus-circle mr-3"></i> New Subscription
                      </button>
                      {user ? (
                        <button onClick={() => { const found = findCustomers(user.username); setCustomerData(found); setFlowStep('customer-dash'); }} className="btn-neon-outline px-10 py-4 text-lg">
                          <i className="fas fa-user-circle mr-3"></i> My Dashboard
                        </button>
                      ) : (
                        <button onClick={() => { setShowAuth(true); setFlowStep('auth'); }} className="btn-neon-outline px-10 py-4 text-lg">
                          <i className="fas fa-sign-in-alt mr-3"></i> Customer Portal
                        </button>
                      )}
                    </div>
                  </div>
                )}
                {flowStep === 'auth' && (
                  <AuthPage onLogin={handleLogin} onSignup={handleLogin} />
                )}
                {flowStep === 'select' && (
                  <div>
                    <button onClick={() => { setFlowStep('welcome'); setFlowType(null); }} className="text-purple-400 hover:text-purple-300 text-sm mb-6 inline-flex items-center">
                      <i className="fas fa-arrow-left mr-2"></i> Back
                    </button>
                    <h2 className="text-2xl font-bold text-white mb-6"><i className="fas fa-crown text-purple-400 mr-3"></i> Choose Subscription</h2>
                    <SubscriptionSelection subscriptions={subscriptions} onSelect={handleSubSelect} selected={selectedSubscription} />
                    {dealsWithSub.length > 0 && (
                      <div className="mt-8">
                        <h3 className="text-xl font-bold text-white mb-4"><i className="fas fa-fire text-orange-400 mr-2"></i> 🔥 Hot Deals</h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                          {dealsWithSub.map(deal => {
                            const icon = deal.subscription?.type === 'netflix' ? 'fa-netflix' : deal.subscription?.type === 'amazon' ? 'fa-amazon' : deal.subscription?.type === 'youtube' ? 'fa-youtube' : deal.subscription?.type === 'spotify' ? 'fa-spotify' : deal.subscription?.type === 'chatgpt' ? 'fa-robot' : 'fa-crown';
                            const color = deal.subscription?.type === 'netflix' ? '#e50914' : deal.subscription?.type === 'amazon' ? '#ff9900' : deal.subscription?.type === 'youtube' ? '#ff0000' : deal.subscription?.type === 'spotify' ? '#1db954' : deal.subscription?.type === 'chatgpt' ? '#10a37f' : '#7c3aed';
                            const discount = Math.round((1 - deal.discountPrice / deal.actualPrice) * 100);
                            return (
                              <div key={deal.id} className="deal-card">
                                <div className="discount-badge">-{discount}% OFF</div>
                                <div className="flex items-center gap-3 mb-2">
                                  <i className={`fab ${icon} text-2xl`} style={{ color }}></i>
                                  <h4 className="text-white font-bold">{deal.title}</h4>
                                </div>
                                <div className="flex items-center gap-2">
                                  <span className="text-white/30 text-sm line-through">${deal.actualPrice}</span>
                                  <span className="text-xl font-bold text-green-400">${deal.discountPrice}</span>
                                </div>
                                <button onClick={() => handleDealPurchase(deal)} className="btn-neon w-full mt-3 py-2 text-sm">
                                  <i className="fas fa-shopping-cart mr-2"></i> Purchase
                                </button>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                )}
                {flowStep === 'flow' && <div className="max-w-lg mx-auto">{renderFlow()}</div>}
                {flowStep === 'deal-purchase' && <div className="max-w-lg mx-auto">{renderFlow()}</div>}
                {flowStep === 'customer-dash' && customerData !== null && (
                  <CustomerDashboard 
                    customerData={customerData} 
                    onLogout={() => { resetFlow(); setActiveTab('home'); setShowSubscriptions(false); }}
                    deals={dealsWithSub}
                    onDealPurchase={handleDealPurchase}
                  />
                )}
              </div>
            </section>
          )}
          {activeTab === 'contact' && (
            <section id="contact-section" className="px-4 max-w-3xl mx-auto py-20">
              <div className="glass-panel">
                <h2 className="text-3xl font-bold text-white mb-2"><i className="fas fa-envelope text-purple-400 mr-3"></i> Contact Us</h2>
                <p className="text-white/40 mb-6">Have questions? Reach out.</p>
                <div className="space-y-4">
                  <div className="flex items-center gap-4 p-3 rounded-xl bg-white/5"><i className="fas fa-envelope text-purple-400 w-6"></i> <span className="text-white/60">support@subscriptionhub.com</span></div>
                  <div className="flex items-center gap-4 p-3 rounded-xl bg-white/5"><i className="fab fa-whatsapp text-green-400 w-6"></i> <span className="text-white/60">+92 300 1234567</span></div>
                  <div className="flex items-center gap-4 p-3 rounded-xl bg-white/5"><i className="fas fa-phone text-purple-400 w-6"></i> <span className="text-white/60">+1 (555) 123-4567</span></div>
                </div>
              </div>
            </section>
          )}
          {activeTab === 'social' && (
            <section id="social-section" className="px-4 max-w-3xl mx-auto py-20">
              <div className="glass-panel">
                <h2 className="text-3xl font-bold text-white mb-2"><i className="fas fa-share-alt text-purple-400 mr-3"></i> Social Media</h2>
                <p className="text-white/40 mb-6">Follow us.</p>
                <div className="flex flex-wrap gap-4">
                  <a href="#" className="flex items-center gap-3 px-6 py-3 rounded-xl bg-white/5 hover:bg-white/10 transition border border-white/5"><i className="fab fa-facebook text-blue-400 text-xl"></i> <span className="text-white/60">Facebook</span></a>
                  <a href="#" className="flex items-center gap-3 px-6 py-3 rounded-xl bg-white/5 hover:bg-white/10 transition border border-white/5"><i className="fab fa-instagram text-pink-400 text-xl"></i> <span className="text-white/60">Instagram</span></a>
                  <a href="#" className="flex items-center gap-3 px-6 py-3 rounded-xl bg-white/5 hover:bg-white/10 transition border border-white/5"><i className="fab fa-youtube text-red-400 text-xl"></i> <span className="text-white/60">YouTube</span></a>
                  <a href="#" className="flex items-center gap-3 px-6 py-3 rounded-xl bg-white/5 hover:bg-white/10 transition border border-white/5"><i className="fab fa-twitter text-blue-300 text-xl"></i> <span className="text-white/60">Twitter</span></a>
                  <a href="#" className="flex items-center gap-3 px-6 py-3 rounded-xl bg-white/5 hover:bg-white/10 transition border border-white/5"><i className="fab fa-linkedin text-blue-400 text-xl"></i> <span className="text-white/60">LinkedIn</span></a>
                </div>
              </div>
            </section>
          )}
          {activeTab === 'admin' && (
            <section id="admin-section" className="px-4 max-w-7xl mx-auto py-12">
              {!isAdmin ? <AdminLogin onLogin={() => setIsAdmin(true)} /> : <AdminDashboard subscriptions={subscriptions} setSubscriptions={setSubscriptions} onLogout={() => setIsAdmin(false)} deals={deals} setDeals={setDeals} />}
            </section>
          )}
          <footer className="border-t border-white/5 py-8 px-4 mt-8">
            <div className="max-w-7xl mx-auto text-center text-white/20 text-sm">
              <p>© 2026 Subscription Hub. All rights reserved.</p>
              <p className="mt-1">Built with <i className="fas fa-heart text-purple-400"></i> for premium entertainment.</p>
            </div>
          </footer>
        </div>
      );
    }

    // ─── RENDER ────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AppProvider>
        <App />
      </AppProvider>
    );
  </script>
</body>
</html>

    // ─── SUBSCRIPTION CAROUSEL ──────────────────────────
    function SubscriptionCarousel({ subscriptions: rawSubscriptions, onGetStarted }) {
      const [itemsPerView, setItemsPerView] = useState(4);
      const [offset, setOffset] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const [containerWidth, setContainerWidth] = useState(0);
      const containerRef = useRef(null);
      const trackRef = useRef(null);
      const animationRef = useRef(null);
      const speed = 30;

      const [isDragging, setIsDragging] = useState(false);
      const [dragStartX, setDragStartX] = useState(0);
      const [dragOffsetStart, setDragOffsetStart] = useState(0);
      const [dragVelocity, setDragVelocity] = useState(0);
      const lastMoveTime = useRef(0);
      const lastMoveX = useRef(0);
      const momentumId = useRef(null);
      // Tracks the very first touch point and, once enough movement has
      // happened, whether the gesture is a horizontal carousel swipe or a
      // vertical page scroll — so a swipe that starts on the carousel but
      // moves mostly up/down is handed straight to the browser instead of
      // being swallowed by the drag handler.
      const touchStartX = useRef(0);
      const touchStartY = useRef(0);
      const touchIntent = useRef(null); // null | 'horizontal' | 'vertical'

      // Fallback icon/color for subscription types that don't have a custom
      // uploaded logo. Mirrors the maps used on the purchase page
      // (SubscriptionSelection) so a card always has something to show even
      // if the admin didn't upload a logo image.
      const iconMap = { netflix: 'fa-netflix', amazon: 'fa-amazon', youtube: 'fa-youtube', spotify: 'fa-spotify',
        chatgpt: 'fa-robot', canva: 'fa-paint-brush', capcut: 'fa-video', hbomax: 'fa-tv', crunchyroll: 'fa-play',
        chaupal: 'fa-film', custom: 'fa-crown' };
      const colorMap = { netflix: '#e50914', amazon: '#ff9900', youtube: '#ff0000', spotify: '#1db954', chatgpt: '#10a37f',
        canva: '#00c4cc', capcut: '#00d4ff', hbomax: '#5822b4', crunchyroll: '#f47521', chaupal: '#e74c3c',
        custom: 'var(--t-primary-hex)' };

      // Build carousel cards directly from the real, admin-managed
      // subscriptions (the same data the purchase page and deals use). Any
      // subscription you add/edit/delete in the admin panel now shows up
      // here automatically — nothing is hardcoded anymore.
      const subscriptions = useMemo(() => {
        return (rawSubscriptions || []).map(s => {
          const color = colorMap[s.type] || 'var(--t-primary-hex)';
          const icon = iconMap[s.type] || 'fa-crown';
          const price = s.sellingPrice || 0;
          return {
            id: s.id,
            raw: s,
            name: s.name,
            color,
            desc: s.description || '',
            detail: s.importantNote || '',
            price: price > 0 ? `From RS ${price}` : '',
            logo: s.logo ? (
              <img src={s.logo} alt={s.name} style={{ width: '2.6rem', height: '2.6rem', objectFit: 'contain', margin: '0 auto' }} />
            ) : (
              <i className={`fas ${icon} text-3xl`} style={{ color }}></i>
            )
          };
        });
      }, [rawSubscriptions]);

      const [selectedCard, setSelectedCard] = useState(null);

      const totalItems = subscriptions.length;
      const repeatedItems = useMemo(() => {
        if (totalItems === 0) return [];
        const reps = 3;
        const arr = [];
        for (let i = 0; i < reps; i++) arr.push(...subscriptions);
        return arr;
      }, [subscriptions, totalItems]);

      const getItemsPerView = () => {
        if (typeof window === 'undefined') return 4;
        const w = window.innerWidth;
        if (w >= 1200) return 4;
        if (w >= 992) return 3;
        if (w >= 640) return 2;
        return 1;
      };

      useEffect(() => {
        const handleResize = () => { setItemsPerView(getItemsPerView()); };
        window.addEventListener('resize', handleResize);
        handleResize();
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        if (!containerRef.current) return;
        const measure = () => {
          const width = containerRef.current.getBoundingClientRect().width;
          setContainerWidth(width);
        };
        measure();
        const ro = new ResizeObserver(measure);
        ro.observe(containerRef.current);
        return () => ro.disconnect();
      }, [itemsPerView]);

      const gap = 8;
      const slideWidth = containerWidth > 0 ? (containerWidth / itemsPerView) - gap : 0;
      const oneSetWidth = slideWidth * totalItems + gap * (totalItems - 1);

      useEffect(() => {
        if (isPaused || totalItems === 0 || oneSetWidth === 0 || slideWidth === 0 || isDragging) {
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
            animationRef.current = null;
          }
          return;
        }
        let lastTimestamp = performance.now();
        const animate = (timestamp) => {
          const delta = (timestamp - lastTimestamp) / 1000;
          lastTimestamp = timestamp;
          setOffset(prev => {
            let newOffset = prev + speed * delta;
            if (newOffset >= oneSetWidth) {
              newOffset = newOffset - oneSetWidth;
            }
            return newOffset;
          });
          animationRef.current = requestAnimationFrame(animate);
        };
        animationRef.current = requestAnimationFrame(animate);
        return () => {
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
            animationRef.current = null;
          }
        };
      }, [isPaused, totalItems, oneSetWidth, slideWidth, speed, isDragging]);

      const handleDragStart = (clientX) => {
        setIsDragging(true);
        setIsPaused(true);
        setDragStartX(clientX);
        setDragOffsetStart(offset);
        setDragVelocity(0);
        lastMoveTime.current = Date.now();
        lastMoveX.current = clientX;
        if (momentumId.current) {
          cancelAnimationFrame(momentumId.current);
          momentumId.current = null;
        }
        if (animationRef.current) {
          cancelAnimationFrame(animationRef.current);
          animationRef.current = null;
        }
      };

      const handleDragMove = (clientX) => {
        if (!isDragging) return;
        const diff = clientX - dragStartX;
        let newOffset = dragOffsetStart - diff;
        if (newOffset < 0) newOffset = 0;
        if (newOffset > oneSetWidth) newOffset = oneSetWidth;
        setOffset(newOffset);
        const now = Date.now();
        const dt = now - lastMoveTime.current;
        if (dt > 0) {
          const dx = clientX - lastMoveX.current;
          const vel = dx / dt;
          setDragVelocity(vel);
        }
        lastMoveTime.current = now;
        lastMoveX.current = clientX;
      };

      const handleDragEnd = () => {
        if (!isDragging) return;
        setIsDragging(false);
        const vel = dragVelocity;
        if (Math.abs(vel) > 0.2) {
          let momentumOffset = offset;
          const momentumStep = () => {
            const dt = 16;
            const decay = 0.97;
            let velDecay = vel * decay;
            momentumOffset = momentumOffset - velDecay * dt;
            if (momentumOffset < 0) {
              momentumOffset = 0;
              velDecay = 0;
            } else if (momentumOffset > oneSetWidth) {
              momentumOffset = oneSetWidth;
              velDecay = 0;
            }
            setOffset(momentumOffset);
            if (Math.abs(velDecay) > 0.1 && momentumOffset > 0 && momentumOffset < oneSetWidth) {
              momentumId.current = requestAnimationFrame(momentumStep);
            } else {
              setTimeout(() => { setIsPaused(false); }, 2000);
            }
          };
          momentumId.current = requestAnimationFrame(momentumStep);
        } else {
          setTimeout(() => { setIsPaused(false); }, 2000);
        }
        setDragVelocity(0);
      };

      const onTouchStart = (e) => {
        const touch = e.touches[0];
        touchStartX.current = touch.clientX;
        touchStartY.current = touch.clientY;
        touchIntent.current = null;
      };
      const onTouchMove = (e) => {
        const touch = e.touches[0];
        if (touchIntent.current === null) {
          const dx = touch.clientX - touchStartX.current;
          const dy = touch.clientY - touchStartY.current;
          if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return; // too small to tell yet
          if (Math.abs(dy) > Math.abs(dx)) {
            // Mostly vertical — this is a page scroll, not a carousel swipe.
            // Leave it alone (no preventDefault, no drag) so the browser's
            // native vertical scroll takes over immediately, first try.
            touchIntent.current = 'vertical';
            return;
          }
          // Mostly horizontal — this is a carousel swipe, start dragging from
          // the original touch point (not the current one) so there's no jump.
          touchIntent.current = 'horizontal';
          handleDragStart(touchStartX.current);
        }
        if (touchIntent.current !== 'horizontal') return;
        e.preventDefault();
        handleDragMove(touch.clientX);
      };
      const onTouchEnd = () => {
        if (touchIntent.current === 'horizontal') handleDragEnd();
        touchIntent.current = null;
      };

      const onMouseDown = (e) => {
        if (e.button !== 0) return;
        handleDragStart(e.clientX);
        const onMouseMove = (ev) => handleDragMove(ev.clientX);
        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          handleDragEnd();
        };
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      };

      const handlePause = () => { setIsPaused(true); };
      const handleResume = () => {
        if (!isDragging) {
          setTimeout(() => setIsPaused(false), 3000);
        }
      };

      const goToPrev = () => {
        if (slideWidth === 0) return;
        setIsPaused(true);
        setOffset(prev => Math.max(prev - slideWidth, 0));
        setTimeout(() => setIsPaused(false), 3000);
      };
      const goToNext = () => {
        if (slideWidth === 0) return;
        setIsPaused(true);
        setOffset(prev => {
          let newOffset = prev + slideWidth;
          if (newOffset >= oneSetWidth) newOffset = newOffset - oneSetWidth;
          return newOffset;
        });
        setTimeout(() => setIsPaused(false), 3000);
      };

      const handleCardClick = (sub) => { setSelectedCard(sub); };
      const closeCardModal = () => { setSelectedCard(null); };

      return (
        <>
          <div className="max-w-7xl mx-auto px-4 py-4 relative">
            <div className="flex items-center gap-3 mb-4">
              <span className="brand-z brand-z-sm">Z</span>
              <h2 className="text-xl font-bold text-white">What We Provide</h2>
              <span className="text-white/30 text-xs ml-2">Premium services</span>
            </div>
            <div className={`carousel-container ${isPaused ? 'paused' : ''}`} ref={containerRef} onMouseEnter={handlePause} onMouseLeave={handleResume} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} onMouseDown={onMouseDown} style={{ touchAction: 'pan-y' }}>
              <div className="carousel-track" ref={trackRef} style={{ transform: `translateX(-${offset}px)`, transition: isDragging ? 'none' : 'none', gap: `${gap}px` }}>
                {repeatedItems.map((sub, idx) => (
                  <div key={idx} className="carousel-slide" style={{ width: slideWidth }}>
                    <div className="sub-carousel-card relative" onClick={() => handleCardClick(sub)}>
                      <div className="brand-corner">Z</div>
                      <div className="card-icon">{sub.logo}</div>
                      <div className="card-name">{sub.name}</div>
                      <div className="card-desc">{sub.desc}</div>
                      <div className="card-detail">{sub.detail}</div>
                      <div className="card-price">{sub.price}</div>
                    </div>
                  </div>
                ))}
              </div>
              {totalItems > itemsPerView && (
                <>
                  <button className="carousel-btn prev" onClick={goToPrev}><i className="fas fa-chevron-left"></i></button>
                  <button className="carousel-btn next" onClick={goToNext}><i className="fas fa-chevron-right"></i></button>
                  <div className="carousel-dots">
                    {Array.from({ length: Math.ceil(totalItems / itemsPerView) }).map((_, idx) => (
                      <button key={idx} className={`carousel-dot ${idx === Math.floor(offset / slideWidth) ? 'active' : ''}`} onClick={() => {
                        setIsPaused(true);
                        setOffset(idx * slideWidth);
                        setTimeout(() => setIsPaused(false), 3000);
                      }} />
                    ))}
                  </div>
                </>
              )}
            </div>
          </div>
          {selectedCard && (
            <div className="card-modal-overlay" onClick={closeCardModal}>
              <div className="card-modal-content" onClick={(e) => e.stopPropagation()}>
                <button className="close-btn" onClick={closeCardModal}>✕</button>
                <div className="modal-icon">{selectedCard.logo}</div>
                <div className="modal-name" style={{ color: selectedCard.color }}>{selectedCard.name}</div>
                <div className="modal-desc">{selectedCard.desc}</div>
                <div className="modal-detail">{selectedCard.detail}</div>
                <div className="modal-price">{selectedCard.price}</div>
                {onGetStarted && (
                  <button
                    className="btn-neon px-6 py-2 text-sm mt-4"
                    onClick={() => { closeCardModal(); onGetStarted(); }}
                  >
                    <i className="fas fa-shopping-cart mr-2"></i> Get This Subscription
                  </button>
                )}
                <div className="mt-3 text-white/20 text-xs">Click outside to close</div>
              </div>
            </div>
          )}
        </>

    // ─── WHATSAPP FLOATING BUTTON ─────────────────────────────

    // The complaint form. Everything we already know about the customer
    // (username, WhatsApp number, and — if it's about a subscription they
    // already have — which one, and which account/screen) is filled in
    // automatically. The customer only has to pick/confirm a few things,
    // type the complaint, and hit Submit. Submitting opens a WhatsApp chat
    // with the admin with the whole message already typed out — the
    // customer just has to tap Send.
    function ComplaintModal({ open, onClose, user, subscriptions }) {
      const { addToast } = useContext(AppContext);
      const [complaintType, setComplaintType] = useState('subscription'); // 'subscription' | 'other'
      const [selectedSubId, setSelectedSubId] = useState('');
      const [selectedEntryKey, setSelectedEntryKey] = useState('');
      const [customType, setCustomType] = useState('');
      const [details, setDetails] = useState('');
      const [guestName, setGuestName] = useState('');
      const [guestWhatsapp, setGuestWhatsapp] = useState('');

      // Every subscription entry this logged-in customer actually owns,
      // gathered straight from the live subscriptions data (name, whatsapp,
      // account, and screen are all already on record — no need to ask again).
      const myRecords = useMemo(() => {
        if (!user) return [];
        const list = [];
        (subscriptions || []).forEach(sub => (sub.accounts || []).forEach(acc => (acc.screens || []).forEach(scr => (scr.customers || []).forEach(c => {
          if (c.username === user.username) {
            list.push({
              subscriptionId: sub.id,
              subscriptionName: sub.name,
              accountId: acc.id,
              accountEmail: acc.email || '',
              screenId: scr.id,
              screenName: scr.name || ''
            });
          }
        }))));
        return list;
      }, [subscriptions, user]);

      // Grouped by subscription, so a customer with e.g. two Netflix screens
      // picks "Netflix" once, then (only if there's more than one) picks
      // which specific account/screen the complaint is about.
      const myGroupedSubs = useMemo(() => {
        const map = {};
        myRecords.forEach(r => {
          if (!map[r.subscriptionId]) map[r.subscriptionId] = { subscriptionId: r.subscriptionId, subscriptionName: r.subscriptionName, entries: [] };
          map[r.subscriptionId].entries.push(r);
        });
        return Object.values(map);
      }, [myRecords]);

      const selectedGroup = myGroupedSubs.find(g => g.subscriptionId === selectedSubId) || null;

      // Reset the sub-fields whenever the modal is (re)opened or the
      // selected subscription changes, and auto-select the account/screen
      // when there's only one so the customer doesn't have to.

    // ─── SMART ALLOCATION ALGORITHM ──────────────────────────
    // ─── Smart screen allocation ────────────────────────────────
    // Always hands the customer the account/screen with the MOST room left
    // (fewest people already on it) — so load spreads out evenly instead of
    // stacking everyone onto screen 1 first. When two or more options are
    // exactly tied for "most room", ties are broken randomly — EXCEPT for
    // the very first customer(s) ever on a completely empty subscription,
    // where it just fills in plain, predictable order (account 1's screen
    // 1, then screen 2, and so on) so the initial layout is easy to follow.
    // `maxPerScreen` is 3 for Netflix, Infinity for Amazon (unlimited people
    // per screen, but never the same customer twice on one screen).
    const pickAccountThenScreen = (availableSlots, username, whatsapp, maxPerScreen, excludeScreenIds = []) => {
      const eligible = availableSlots.filter(slot => {
        if (excludeScreenIds.includes(slot.screen.id)) return false;
        const customers = slot.screen.customers || [];
        if (customers.some(c => c.username === username)) return false;
        if (customers.some(c => c.whatsapp === whatsapp)) return false;
        const count = customers.length;
        if (maxPerScreen !== Infinity && count >= maxPerScreen) return false;
        return true;
      });
      if (eligible.length === 0) return null;

      // Nobody has ever been placed anywhere in this subscription yet?
      // Then we're filling from scratch — keep it simple and predictable.
      const totalCustomersEverywhere = availableSlots.reduce((sum, slot) => sum + (slot.screen.customers ? slot.screen.customers.length : 0), 0);
      const isVirgin = totalCustomersEverywhere === 0;

      // Higher = more room. For unlimited-capacity screens (Amazon) there's
      // no true "empty slots" number, so we use "fewer people on it" as the
      // equivalent — same idea, same comparison, just no hard ceiling.
      const roomLeft = (slot) => {
        const count = slot.screen.customers ? slot.screen.customers.length : 0;
        return maxPerScreen === Infinity ? -count : (maxPerScreen - count);
      };

      const pickMostRoom = (list, valueFn) => {
        const best = Math.max(...list.map(valueFn));
        const tied = list.filter(item => valueFn(item) === best);
        if (tied.length === 1) return tied[0];
        // Tie: plain order while the subscription is still brand new,
        // otherwise spread the load fairly with a random pick.
        return isVirgin ? tied[0] : tied[Math.floor(Math.random() * tied.length)];
      };

      const byAccount = {};
      eligible.forEach(slot => {
        const accId = slot.account.id;
        if (!byAccount[accId]) byAccount[accId] = [];
        byAccount[accId].push(slot);
      });
      const accountGroups = Object.values(byAccount);
      const accountRoomLeft = (group) => group.reduce((sum, slot) => sum + roomLeft(slot), 0);
      const chosenAccountSlots = pickMostRoom(accountGroups, accountRoomLeft);

      return pickMostRoom(chosenAccountSlots, roomLeft);
    };

    const allocateScreens = (availableSlots, count, username, whatsapp, requestedScreenId = null, sameAccount = false) => {
      const notUsedByUser = availableSlots.filter(slot => {
        const customers = slot.screen.customers || [];
        if (customers.some(c => c.username === username)) return false;
        if (customers.some(c => c.whatsapp === whatsapp)) return false;
        return true;
      });

      // "Same account" mode: every screen must come from one single
      // account (e.g. someone buying 5 screens who wants them all under
      // the one account rather than spread across several). If no single
      // account has enough room for all of them, this fails outright
      // rather than silently spreading across accounts — the caller
      // decides whether to offer "Separate Accounts" as a fallback.
      if (sameAccount && count > 1) {
        const byAccount = {};
        notUsedByUser.forEach(slot => {
          const free = 3 - (slot.screen.customers ? slot.screen.customers.length : 0);
          if (free <= 0) return;
          const accId = slot.account.id;
          if (!byAccount[accId]) byAccount[accId] = [];
          byAccount[accId].push(slot);
        });
        const qualifying = Object.values(byAccount).filter(group => group.length >= count);
        if (qualifying.length === 0) return { error: 'no_single_account' };

        const totalCustomersEverywhere = availableSlots.reduce((sum, slot) => sum + (slot.screen.customers ? slot.screen.customers.length : 0), 0);
        const isVirgin = totalCustomersEverywhere === 0;
        const roomLeft = (slot) => 3 - (slot.screen.customers ? slot.screen.customers.length : 0);
        const groupRoomLeft = (group) => group.reduce((sum, slot) => sum + roomLeft(slot), 0);
        const bestRoom = Math.max(...qualifying.map(groupRoomLeft));
        const tiedGroups = qualifying.filter(group => groupRoomLeft(group) === bestRoom);
        const chosenGroup = isVirgin ? tiedGroups[0] : tiedGroups[Math.floor(Math.random() * tiedGroups.length)];

        const sortedByRoom = [...chosenGroup].sort((a, b) => roomLeft(b) - roomLeft(a));
        return sortedByRoom.slice(0, count);
      }

      let allocated = [];
      const excludeIds = [];

      // A customer asking for one specific screen still gets it, as long as
      // it actually has room — the smart picker only kicks in for any
      // additional screens beyond that one (when count > 1) and as the
      // automatic fallback if the requested screen isn't usable.
      if (requestedScreenId) {
        const target = notUsedByUser.find(slot => slot.screen.id === requestedScreenId);
        const currentCount = target && target.screen.customers ? target.screen.customers.length : 0;
        if (target && currentCount < 3) {
          allocated.push(target);
          excludeIds.push(target.screen.id);
        } else {
          return { error: target ? 'full' : 'not_found' };
        }
      }

      while (allocated.length < count) {
        const pick = pickAccountThenScreen(availableSlots, username, whatsapp, 3, excludeIds);
        if (!pick) break;
        allocated.push(pick);
        excludeIds.push(pick.screen.id);
      }

      if (allocated.length < count) return { error: 'not_enough' };
      return allocated;
    };

    const allocateAmazonScreen = (availableSlots, username, whatsapp) => {
      // Unlimited people per screen, but never the same customer twice on
      // the same screen — the load-balancer naturally spreads people across

      return pickAccountThenScreen(availableSlots, username, whatsapp, Infinity);

    const allocateSimpleScreen = (subscription, username, whatsapp) => {

    // A full click-blocking overlay shown over the purchase card while a

    // ─── NETFLIX FLOW ────────────────────────────────────────
    function NetflixFlow({ subscription, onBack, onComplete, user }) {
      const [screens, setScreens] = useState(1);
      const [durationType, setDurationType] = useState('months');
      const [months, setMonths] = useState(1);
      const [days, setDays] = useState(30);
      const [step, setStep] = useState('plan');
      const [whatsapp, setWhatsapp] = useState(user?.whatsapp || '');
      const [loading, setLoading] = useState(false);
      const [specificScreen, setSpecificScreen] = useState(false);
      const [selectedScreenId, setSelectedScreenId] = useState('');
      const [sameAccount, setSameAccount] = useState(false);
      const { addToast } = useContext(AppContext);
      const { user: currentUser, setUser } = useContext(UserContext);
      // Guards against double-purchase from a double-click/double-tap on the
      // purchase button. This is a ref (not state) checked synchronously at
      // the very top of completePurchase, so it blocks a second click even
      // in the brief window before React re-renders the disabled button.
      const isSubmittingRef = useRef(false);

      const allAvailableSlots = useMemo(() => {
        if (!subscription?.accounts) return [];
        const allSlots = [];
        subscription.accounts.forEach(acc => {
          if (acc.screens) {
            acc.screens.forEach(screen => {
              const customerCount = screen.customers?.length || 0;
              if (customerCount < 3) {
                allSlots.push({ account: acc, screen, used: customerCount });
              }
            });
          }
        });
        return allSlots;
      }, [subscription]);

      const availableForDisplay = useMemo(() => {
        return allAvailableSlots.map(slot => ({
          id: slot.screen.id,
          label: `${slot.account.email} - ${slot.screen.name}`
        }));
      }, [allAvailableSlots]);

      const canAllocate = useMemo(() => {
        const totalFree = allAvailableSlots.reduce((sum, s) => sum + (3 - s.used), 0);
        return totalFree >= screens;
      }, [allAvailableSlots, screens]);

      const creditsNeeded = useMemo(() => {
        const totalMonths = durationType === 'months' ? months : Math.ceil(days / 30);
        return getSubscriptionPrice(subscription, totalMonths);
      }, [subscription, durationType, months, days]);

      const canUseCredits = useMemo(() => {
        return (currentUser?.credits || 0) >= creditsNeeded && creditsNeeded > 0;
      }, [currentUser, creditsNeeded]);


      const completePurchase = async (useCreditsFlag = false) => {
        // Block re-entrant calls: if a purchase is already in flight (from
        // an earlier click that hasn't finished yet), ignore this one.
        if (isSubmittingRef.current) return;
        isSubmittingRef.current = true;
        const purchaseId = genPurchaseId();

        if (!whatsapp.trim()) {
          addToast('Please fill all details', 'error');
          isSubmittingRef.current = false;
          return;
        }
        if (whatsapp.trim() !== user?.whatsapp) {
          addToast('WhatsApp number must match your sign-up number', 'error');
          isSubmittingRef.current = false;
          return;
        }

        // No account/screen exists for this subscription yet (or every
        // existing one is full). We don't block the purchase for this —
        // it goes through and lands in the admin's Waiting Customers list
        // instead of getting real account credentials right away.
        let allocatedData = [];
        let isWaiting = !canAllocate;

        if (canAllocate) {
          let requestedId = specificScreen ? selectedScreenId : null;
          let allocationResult = allocateScreens(allAvailableSlots, screens, user.username, whatsapp.trim(), requestedId, sameAccount);
          let allocated = null;
          if (allocationResult.error) {
            if (specificScreen) {
              const autoResult = allocateScreens(allAvailableSlots, screens, user.username, whatsapp.trim(), null, sameAccount);
              if (autoResult.error) {
                isWaiting = true;
              } else {
                allocated = autoResult;
                addToast('The requested screen is not available. We\'ve assigned you another screen.', 'warning');
              }
            } else if (sameAccount && allocationResult.error === 'no_single_account') {
              // No single account currently has room for all of them —
              // fall back to spreading across accounts rather than
              // silently failing or queuing the whole purchase.
              const spreadResult = allocateScreens(allAvailableSlots, screens, user.username, whatsapp.trim(), null, false);

                isWaiting = true;

            isWaiting,
            purchaseId,
            purchasedAt: now.toISOString()

          isSubmittingRef.current = false;

    // ─── AMAZON FLOW ──────────────────────────────────────────
    function AmazonFlow({ subscription, onBack, onComplete, user }) {
      const [durationType, setDurationType] = useState('months');
      const [months, setMonths] = useState(1);
      const [days, setDays] = useState(30);
      const [step, setStep] = useState('plan');
      const [whatsapp, setWhatsapp] = useState(user?.whatsapp || '');
      const [loading, setLoading] = useState(false);
      const { addToast } = useContext(AppContext);
      const { user: currentUser, setUser } = useContext(UserContext);
      const isSubmittingRef = useRef(false);

      const availableSlots = useMemo(() => {
        if (!subscription?.accounts) return [];
        const allSlots = [];
        subscription.accounts.forEach(acc => {
          if (acc.screens) {
            acc.screens.forEach(screen => {
              allSlots.push({ account: acc, screen, used: 0 });
            });
          }
        });
        return allSlots;
      }, [subscription]);

      const canAllocate = useMemo(() => availableSlots.length >= 1, [availableSlots]);
      const totalMonths = durationType === 'months' ? months : Math.ceil(days / 30);
      const creditsNeeded = getSubscriptionPrice(subscription, totalMonths);
      const canUseCredits = useMemo(() => {
        return (currentUser?.credits || 0) >= creditsNeeded && creditsNeeded > 0;
      }, [currentUser, creditsNeeded]);

      const completePurchase = async (useCreditsFlag = false) => {
        if (isSubmittingRef.current) return;
        isSubmittingRef.current = true;
        const purchaseId = genPurchaseId();

        if (!whatsapp.trim()) {
          addToast('Please fill all details', 'error');
          isSubmittingRef.current = false;
          return;
        }
        if (whatsapp.trim() !== user?.whatsapp) {
          addToast('WhatsApp number must match your sign-up number', 'error');
          isSubmittingRef.current = false;
          return;
        }

        // No account/screen exists yet (or all full) — purchase still goes
        // ahead and lands in the admin's Waiting Customers list.
        let allocatedData = [];
        let isWaiting = !canAllocate;
        if (canAllocate) {
          const purchaseCount = user.purchaseCount || 0;
          const slot = allocateAmazonScreen(availableSlots, user.username, whatsapp.trim(), purchaseCount);
          if (!slot) {
            isWaiting = true;
          } else {
            allocatedData = [{
              accountId: slot.account.id,
              screenId: slot.screen.id,
              screenName: slot.screen.name,
              accountEmail: slot.account.email,
              accountPassword: slot.account.password || '••••••••',
              screenPin: slot.screen.pin || 'N/A'
            }];
          }
        }

        setLoading(true);
        const now = new Date();
        let totalDays = durationType === 'months' ? months * 30 : days;
        const expiry = new Date(now);
        expiry.setDate(expiry.getDate() + totalDays);

        if (useCreditsFlag) {
          try {
            const updatedUser = await deductCredits(user.username, creditsNeeded, purchaseId, `Purchased ${subscription.name}`, { subscriptionId: subscription.id, months: totalMonths });
            setUser(updatedUser);
            addToast(`✅ ${creditsNeeded} credits deducted.`, 'success');
          } catch (err) {
            addToast('Failed to deduct credits: ' + (err?.error || 'unknown error'), 'error');
            setLoading(false);
            isSubmittingRef.current = false;
            return;
          }
        }

        try {
          const updatedUser = await incrementPurchase(user.username);
          setUser(updatedUser);
        } catch (err) {
          console.error('Failed to increment purchase count', err);
        }

          onComplete({
            subscriptionId: subscription.id,
            subscriptionName: subscription.name,
            screens: 1,
            months: durationType === 'months' ? months : 0,
            days: totalDays,
            name: user?.name || '',
            username: user.username,
            password: '', // never store the user's login password in purchase records
            whatsapp: whatsapp.trim(),
            allocated: allocatedData,
            expiryDate: expiry.toISOString().split('T')[0],
            paidWithCredits: useCreditsFlag,
            isWaiting,
            purchaseId,
            purchasedAt: now.toISOString()
          });
          setLoading(false);
          isSubmittingRef.current = false;
      };

      const handlePayWithCredits = async () => {
        if (isSubmittingRef.current) {
          addToast('Please wait, your purchase is already processing…', 'info');
          return;
        }
        if (!canUseCredits) {
          addToast('Insufficient credits', 'error');
          return;
        }
        await completePurchase(true);
      };

      if (step === 'plan') {
        return (
          <div className="space-y-6 relative">
            <ProcessingOverlay show={loading} />
            <button onClick={onBack} className="text-red-400 hover:text-red-300 text-sm"><i className="fas fa-arrow-left mr-2"></i> Back</button>
            <h2 className="text-2xl font-bold text-white"><i className="fab fa-amazon text-yellow-400 mr-3"></i> Amazon Prime</h2>
            <div><label className="text-white/50 text-sm font-medium">Duration</label>
              <select value={durationType} onChange={(e) => setDurationType(e.target.value)} className="input-neon mt-1">
                <option value="months">Months</option><option value="days">Custom Days</option>
              </select>
            </div>
            {durationType === 'months' ? (
              <div><label className="text-white/50 text-sm font-medium">Months</label>
                <select value={months} onChange={(e) => setMonths(Number(e.target.value))} className="input-neon mt-1">
                  {[1,2,3,6,12].map(n => <option key={n} value={n}>{n} {n === 1 ? 'month' : 'months'}</option>)}
                </select>
              </div>
            ) : (
              <div><label className="text-white/50 text-sm font-medium">Days</label>
                <input type="number" value={days} onChange={(e) => setDays(Math.max(1, Number(e.target.value)))} className="input-neon mt-1" min="1" />
              </div>
            )}
            {!canAllocate && (
              <div className="bg-yellow-500/10 rounded-xl p-4 border border-yellow-500/20">
                <p className="text-yellow-400 text-sm"><i className="fas fa-info-circle mr-2"></i> This subscription is currently out of stock. You can still purchase — your account will be added to your portal soon and admin will be notified.</p>
              </div>
            )}
            <div className="space-y-3">
              <div><label className="text-white/50 text-sm font-medium">WhatsApp Number</label>
                <input type="tel" value={whatsapp} onChange={(e) => setWhatsapp(e.target.value)} className="input-neon mt-1" placeholder="+92 300 1234567" readOnly={!!user?.whatsapp} />
                {user?.whatsapp && <p className="text-xs text-white/30 mt-1">(locked to your sign‑up number)</p>}
              </div>
            </div>
            {currentUser ? (
              canUseCredits ? (
                <div className="bg-green-500/10 rounded-xl p-4 border border-green-500/20">
                  <p className="text-white/70 text-sm"><i className="fas fa-coins mr-2 text-green-400"></i> This will cost <span className="text-green-400 font-semibold">{creditsNeeded} credits</span>. You have {currentUser.credits || 0}.</p>
                </div>
              ) : (
                <div className="bg-yellow-500/10 rounded-xl p-4 border border-yellow-500/20">
                  <p className="text-yellow-400 text-sm"><i className="fas fa-exclamation-circle mr-2"></i> You need {creditsNeeded} credits for this purchase but only have {currentUser.credits || 0}. Please top up your credits to continue.</p>
                </div>
              )
            ) : (
              <div className="bg-yellow-500/10 rounded-xl p-4 border border-yellow-500/20">
                <p className="text-yellow-400 text-sm"><i className="fas fa-exclamation-circle mr-2"></i> Please log in to purchase with credits.</p>
              </div>
            )}
            <button onClick={handlePayWithCredits} disabled={loading || !canUseCredits} className="btn-neon w-full py-3 bg-green-600 hover:bg-green-700 disabled:opacity-40 disabled:cursor-not-allowed">
              {loading ? <span className="spinner"></span> : <><i className="fas fa-coins mr-2"></i> Pay with Credits</>}
            </button>
          </div>
        );
      }
      return null;
    }

              </div>
            </div>
            {!isCanva && !isCustom && creditsNeeded > 0 && (
              <div className="bg-yellow-500/10 rounded-xl p-3 border border-yellow-500/20">
                <p className="text-yellow-400 text-sm">
                  <i className="fas fa-info-circle mr-2"></i> Price: {creditsNeeded} credits for {months} month{months > 1 ? 's' : ''}
                </p>
              </div>
            )}
            {isCanva && creditsNeeded > 0 && (
              <div className="bg-yellow-500/10 rounded-xl p-3 border border-yellow-500/20">
                <p className="text-yellow-400 text-sm">
                  <i className="fas fa-info-circle mr-2"></i> Canva Pro: {creditsNeeded} credits for 1 year
                </p>
              </div>
            )}
            {creditsNeeded > 0 && (
              currentUser ? (
                canUseCredits ? (
                  <div className="bg-green-500/10 rounded-xl p-4 border border-green-500/20">
                    <p className="text-white/70 text-sm"><i className="fas fa-coins mr-2 text-green-400"></i> This will cost <span className="text-green-400 font-semibold">{creditsNeeded} credits</span>. You have {currentUser.credits || 0}.</p>
                  </div>
                ) : (
                  <div className="bg-yellow-500/10 rounded-xl p-4 border border-yellow-500/20">
                    <p className="text-yellow-400 text-sm"><i className="fas fa-exclamation-circle mr-2"></i> You need {creditsNeeded} credits for this purchase but only have {currentUser.credits || 0}. Please top up your credits to continue.</p>
                  </div>
                )
              ) : (
                <div className="bg-yellow-500/10 rounded-xl p-4 border border-yellow-500/20">
                  <p className="text-yellow-400 text-sm"><i className="fas fa-exclamation-circle mr-2"></i> Please log in to purchase with credits.</p>
                </div>
              )
            )}
            <button
              onClick={() => {
                if (creditsNeeded > 0) { handlePayWithCredits(); return; }
                if (isSubmittingRef.current) { addToast('Please wait, your purchase is already processing…', 'info'); return; }
                completePurchase(false);
              }}
              disabled={loading || (creditsNeeded > 0 && !canUseCredits)}
              className="btn-neon w-full py-3 bg-green-600 hover:bg-green-700 disabled:opacity-40 disabled:cursor-not-allowed"
            >
              {loading ? <span className="spinner"></span> : creditsNeeded > 0 ? <><i className="fas fa-coins mr-2"></i> Pay with Credits</> : <><i className="fas fa-check-circle mr-2"></i> Complete Purchase</>}
            </button>
          </div>
        );
      }
      return null;
    }

    // ─── DEAL PURCHASE FLOW ──────────────────────────────────
    function DealPurchaseFlow({ deal, subscriptions, onBack, onComplete, user }) {
      const [step, setStep] = useState('plan');
      const [whatsapp, setWhatsapp] = useState(user?.whatsapp || '');
      const [loading, setLoading] = useState(false);
      const { addToast } = useContext(AppContext);
      const { user: currentUser, setUser } = useContext(UserContext);
      const isSubmittingRef = useRef(false);

      const dealSubs = useMemo(() => {
        if (!deal.subscriptionIds) return [];
        return subscriptions.filter(s => deal.subscriptionIds.includes(s.id));
      }, [deal, subscriptions]);

      const creditsNeeded = deal.discountPrice;
      const canUseCredits = (currentUser?.credits || 0) >= creditsNeeded && creditsNeeded > 0;

      const completePurchase = async (useCreditsFlag = false) => {
        if (isSubmittingRef.current) return;
        isSubmittingRef.current = true;
        const purchaseId = genPurchaseId();

        if (!whatsapp.trim()) {
          addToast('Please fill all details', 'error');
          isSubmittingRef.current = false;
          return;
        }

        setLoading(true);
        const now = new Date();
        const totalDays = 30;
        const expiry = new Date(now);
        expiry.setDate(expiry.getDate() + totalDays);

        if (useCreditsFlag) {
          try {
            const updatedUser = await deductCredits(user.username, creditsNeeded, purchaseId, `Purchased ${deal.title}`, { dealId: deal.id });
            setUser(updatedUser);
            addToast(`✅ ${creditsNeeded} credits deducted.`, 'success');
          } catch (err) {
            addToast('Failed to deduct credits: ' + (err?.error || 'unknown error'), 'error');
            setLoading(false);
            isSubmittingRef.current = false;
            return;
          }
        }

        let allAllocated = [];
        let allSubscriptions = [];
        let waitingSubs = [];

        for (const sub of dealSubs) {
          const subType = sub.type;
          let allocatedForSub = [];

          if (subType === 'netflix') {
            const availableSlots = [];
            sub.accounts.forEach(acc => {
              if (acc.screens) {
                acc.screens.forEach(screen => {
                  const customerCount = screen.customers?.length || 0;
                  if (customerCount < 3) {
                    availableSlots.push({ account: acc, screen, used: customerCount });
                  }
                });
              }
            });
            const result = allocateScreens(availableSlots, 1, user.username, whatsapp.trim(), null);
            if (result && !result.error) {
              allocatedForSub = result.map(slot => ({
                accountId: slot.account.id,
                screenId: slot.screen.id,
                screenName: slot.screen.name,
                accountEmail: slot.account.email,
                accountPassword: slot.account.password || '••••••••',
                screenPin: slot.screen.pin || 'N/A',
                subscriptionId: sub.id,
                subscriptionName: sub.name
              }));
            }
          } else if (subType === 'amazon') {
            const availableSlots = [];
            sub.accounts.forEach(acc => {
              if (acc.screens) {
                acc.screens.forEach(screen => {
                  availableSlots.push({ account: acc, screen, used: 0 });
                });
              }
            });
            const purchaseCount = user.purchaseCount || 0;
            const slot = allocateAmazonScreen(availableSlots, user.username, whatsapp.trim(), purchaseCount);
            if (slot) {
              allocatedForSub = [{
                accountId: slot.account.id,
                screenId: slot.screen.id,
                screenName: slot.screen.name,
                accountEmail: slot.account.email,
                accountPassword: slot.account.password || '••••••••',
                screenPin: slot.screen.pin || 'N/A',
                subscriptionId: sub.id,
                subscriptionName: sub.name
              }];
            }
          } else {
            const allocation = allocateSimpleScreen(sub, user.username, whatsapp.trim());
            if (allocation) {
              allocatedForSub = [{
                accountId: allocation.account.id,
                screenId: allocation.screen.id,
                screenName: allocation.screen.name,
                accountEmail: allocation.account.email,
                accountPassword: allocation.account.password || '••••••••',
                screenPin: allocation.screen.pin || 'N/A',
                subscriptionId: sub.id,
                subscriptionName: sub.name
              }];
            }
          }

          if (allocatedForSub.length > 0) {
            allAllocated = allAllocated.concat(allocatedForSub);
            allSubscriptions.push(sub.id);
          } else {
            // No account available for this part of the deal — it still
            // gets recorded so the admin can fulfill it and add the
            // customer's account soon, instead of the customer silently
            // getting less than what the deal promised.
            waitingSubs.push({ id: sub.id, name: sub.name });
          }
        }

        try {
          await incrementPurchase(user.username);
        } catch (err) {
          console.error('Failed to increment purchase count', err);
        }

          onComplete({
            subscriptionId: deal.subscriptionIds?.[0] || 'deal',
            screens: 1,
            months: 1,
            days: totalDays,
            name: user?.name || '',
            username: user.username,
            password: '', // never store the user's login password in purchase records
            whatsapp: whatsapp.trim(),
            allocated: allAllocated,
            expiryDate: expiry.toISOString().split('T')[0],
            paidWithCredits: useCreditsFlag,
            isDeal: true,
            dealTitle: deal.title,
            dealSubscriptionIds: deal.subscriptionIds || [],
            dealSubscriptions: allSubscriptions,
            waitingSubs,
            purchaseId,
            purchasedAt: now.toISOString()
          });
          setLoading(false);
          isSubmittingRef.current = false;
      };

      const handlePayWithCredits = async () => {
        if (isSubmittingRef.current) {
          addToast('Please wait, your purchase is already processing…', 'info');
          return;
        }
        if (!canUseCredits) {
          addToast('Insufficient credits', 'error');
          return;
        }
        if (!whatsapp.trim()) {
          addToast('Please fill all details', 'error');
          return;
        }
        await completePurchase(true);
      };

      if (step === 'plan') {
        return (
          <div className="space-y-6 relative">
            <ProcessingOverlay show={loading} />
            <button onClick={onBack} className="text-red-400 hover:text-red-300 text-sm"><i className="fas fa-arrow-left mr-2"></i> Back</button>
            <div className="bg-red-500/5 rounded-xl p-4 border border-red-500/10">
              <h3 className="text-xl font-bold text-white">{deal.title}</h3>
              <p className="text-white/40 text-sm">{deal.description || ''}</p>
              {dealSubs.length > 0 && (
                <div className="flex flex-wrap gap-2 mt-2">
                  {dealSubs.map(sub => (
                    <span key={sub.id} className="deal-sub-badge">
                      {sub.logo ? (
                        <img src={sub.logo} alt={sub.name} style={{ width: '0.9rem', height: '0.9rem', objectFit: 'contain', borderRadius: '3px', flexShrink: 0 }} />
                      ) : sub.type === 'netflix' ? (
                        <span className="netflix-logo" style={{ fontSize: '0.6rem' }}>N</span>
                      ) : (
                        <i className={`fab ${sub.type === 'netflix' ? 'fa-netflix' : sub.type === 'amazon' ? 'fa-amazon' : sub.type === 'youtube' ? 'fa-youtube' : sub.type === 'spotify' ? 'fa-spotify' : sub.type === 'chatgpt' ? 'fa-robot' : sub.type === 'canva' ? 'fa-paint-brush' : sub.type === 'capcut' ? 'fa-video' : sub.type === 'hbomax' ? 'fa-tv' : sub.type === 'crunchyroll' ? 'fa-play' : sub.type === 'chaupal' ? 'fa-film' : 'fa-crown'}`} style={{ color: sub.type === 'netflix' ? '#e50914' : sub.type === 'amazon' ? '#ff9900' : sub.type === 'youtube' ? '#ff0000' : sub.type === 'spotify' ? '#1db954' : sub.type === 'chatgpt' ? '#10a37f' : sub.type === 'canva' ? '#00c4cc' : sub.type === 'capcut' ? '#00d4ff' : sub.type === 'hbomax' ? '#5822b4' : sub.type === 'crunchyroll' ? '#f47521' : sub.type === 'chaupal' ? '#e74c3c' : 'var(--t-primary-hex)' }}></i>
                      )}
                      {sub.name}
                    </span>
                  ))}
                </div>
              )}
              <div className="flex items-center gap-3 mt-2">
                <span className="text-white/30 line-through">RS {deal.actualPrice}</span>
                <span className="text-2xl font-bold text-green-400">RS {deal.discountPrice}</span>
                <span className="badge badge-yellow text-xs">🔥 Deal</span>
              </div>
            </div>
            <p className="text-white/30 text-xs -mt-2">If any part of this deal is out of stock, it'll still be purchased and added to your portal soon — admin will be notified.</p>
            <div className="space-y-3">
              <div><label className="text-white/50 text-sm font-medium">WhatsApp Number</label>
                <input type="tel" value={whatsapp} onChange={(e) => setWhatsapp(e.target.value)} className="input-neon mt-1" placeholder="+92 300 1234567" readOnly={!!user?.whatsapp} />
                {user?.whatsapp && <p className="text-xs text-white/30 mt-1">(locked to your sign‑up number)</p>}
              </div>
            </div>
            {currentUser ? (
              canUseCredits ? (
                <div className="bg-green-500/10 rounded-xl p-4 border border-green-500/20">
                  <p className="text-white/70 text-sm"><i className="fas fa-coins mr-2 text-green-400"></i> This will cost <span className="text-green-400 font-semibold">{creditsNeeded} credits</span>. You have {currentUser.credits || 0}.</p>
                </div>
              ) : (
                <div className="bg-yellow-500/10 rounded-xl p-4 border border-yellow-500/20">
                  <p className="text-yellow-400 text-sm"><i className="fas fa-exclamation-circle mr-2"></i> You need {creditsNeeded} credits for this purchase but only have {currentUser.credits || 0}. Please top up your credits to continue.</p>
                </div>
              )
            ) : (
              <div className="bg-yellow-500/10 rounded-xl p-4 border border-yellow-500/20">
                <p className="text-yellow-400 text-sm"><i className="fas fa-exclamation-circle mr-2"></i> Please log in to purchase with credits.</p>
              </div>
            )}
            <button onClick={handlePayWithCredits} disabled={loading || !canUseCredits} className="btn-neon w-full py-3 bg-green-600 hover:bg-green-700 disabled:opacity-40 disabled:cursor-not-allowed">
              {loading ? <span className="spinner"></span> : <><i className="fas fa-coins mr-2"></i> Pay with Credits</>}
            </button>
          </div>
        );
      }
      return null;
    }

    // ─── CUSTOM SUBSCRIPTION REQUEST ────────────────────────────
    // For when the customer wants something that isn't listed at all.
    // No payment here — it's just a request. Name/WhatsApp come from
    // their account already; they only type the subscription name and
    // pick how many months. Goes straight to the admin's Waiting
    // Customers list so the admin can follow up with pricing/availability.
    function CustomFlow({ onBack, onComplete, user }) {
      const [subName, setSubName] = useState('');
      const [months, setMonths] = useState(1);
      const [whatsapp, setWhatsapp] = useState(user?.whatsapp || '');
      const [submitting, setSubmitting] = useState(false);
      const { addToast } = useContext(AppContext);
      const isSubmittingRef = useRef(false);

      const handleSubmit = async () => {
        if (isSubmittingRef.current) return;
        if (!subName.trim()) { addToast('Please enter the exact subscription name', 'error'); return; }
        if (!whatsapp.trim()) { addToast('Please fill your WhatsApp number', 'error'); return; }
        if (user && whatsapp.trim() !== user?.whatsapp) {
          addToast('WhatsApp number must match your sign-up number', 'error');
          return;
        }
        isSubmittingRef.current = true;
        const purchaseId = genPurchaseId();
        setSubmitting(true);
        try {
          await onComplete({
            subscriptionName: subName.trim(),
            name: user?.name || '',
            username: user?.username || '',
            whatsapp: whatsapp.trim(),
            months,
            purchaseId
          });
        } finally {
          setSubmitting(false);
          isSubmittingRef.current = false;
        }
      };

      return (
        <div className="space-y-6">
          <button onClick={onBack} className="text-red-400 hover:text-red-300 text-sm"><i className="fas fa-arrow-left mr-2"></i> Back</button>
          <h2 className="text-2xl font-bold text-white"><i className="fas fa-hand-paper text-red-400 mr-3"></i> Request Custom Subscription</h2>
          <p className="text-white/40 text-sm -mt-2">Don't see what you want in our list? Tell us exactly what you need and we'll get back to you with pricing and availability.</p>
          <div><label className="text-white/50 text-sm font-medium">Subscription Name (exact)</label>
            <input type="text" value={subName} onChange={(e) => setSubName(e.target.value)} className="input-neon mt-1" placeholder="e.g. Disney+ Hotstar" />
          </div>
          <div><label className="text-white/50 text-sm font-medium">For how many months</label>
            <select value={months} onChange={(e) => setMonths(Number(e.target.value))} className="input-neon mt-1">
              {[1,2,3,6,12].map(n => <option key={n} value={n}>{n} {n === 1 ? 'month' : 'months'}</option>)}
            </select>
          </div>
          <div className="space-y-3">
            <div><label className="text-white/50 text-sm font-medium">WhatsApp Number</label>
              <input type="tel" value={whatsapp} onChange={(e) => setWhatsapp(e.target.value)} className="input-neon mt-1" placeholder="+92 300 1234567" readOnly={!!user?.whatsapp} />
              {user?.whatsapp && <p className="text-xs text-white/30 mt-1">(locked to your sign‑up number)</p>}
            </div>
          </div>
          <button onClick={handleSubmit} disabled={submitting} className="btn-neon w-full py-3">
            {submitting ? <span className="spinner"></span> : <><i className="fas fa-paper-plane mr-2"></i> Submit Request</>}
          </button>
        </div>
      );
    }

    // ─── AUTH PAGE ─────────────────────────────────────────────
    // Password/username rules for sign-up. Each `test` runs against the
    // current username/password so the checklist can tick off live as the
    // person types, and the same rules gate the submit button itself.
    const USERNAME_CHECKS = [
      { key: 'noSpaces', label: 'No spaces', hint: 'Your username should not contain any spaces.', test: (u) => u.length > 0 && !/\s/.test(u) },
      { key: 'noSpecial', label: 'Letters and numbers only (no special characters)', hint: 'Your username should only use letters and numbers — no special characters.', test: (u) => u.length > 0 && /^[A-Za-z0-9]+$/.test(u) },
      { key: 'hasLetter', label: 'Must include at least one letter (not only numbers)', hint: 'Your username should include at least one letter, not just numbers.', test: (u) => /[A-Za-z]/.test(u) },
    ];
    const PASSWORD_CHECKS = [
      { key: 'len', label: 'At least 8 characters', hint: 'Your password should be at least 8 characters long.', test: (p) => p.length >= 8 },
      { key: 'capital', label: 'Starts with a capital letter', hint: 'Your password should start with a capital letter.', test: (p) => /^[A-Z]/.test(p) },
      { key: 'number', label: 'Contains at least 1 number', hint: 'Your password should include at least 1 number.', test: (p) => /[0-9]/.test(p) },
      { key: 'special', label: 'Contains at least 1 special character', hint: 'Your password should include at least 1 special character.', test: (p) => /[^A-Za-z0-9]/.test(p) },
      { key: 'diffFromUsername', label: 'Different from your username', hint: 'Your password should be different from your username.', test: (p, u) => p.length > 0 && p !== u },
    ];

    function CriteriaChecklist({ title, items }) {
      return (
        <div className="mt-2 mb-1 rounded-lg border border-white/10 bg-white/[0.03] px-3 py-2">
          <p className="text-white/45 text-[11px] font-semibold uppercase tracking-wide mb-1.5">{title}</p>
          <ul className="space-y-1.5">
            {items.map((item) => (
              <li key={item.key} className={`flex items-center gap-2 text-xs transition-colors ${item.met ? 'text-green-400' : 'text-white/55'}`}>
                <i className={`fas ${item.met ? 'fa-check-circle' : 'fa-circle'} w-3 text-center`} style={{ fontSize: item.met ? '0.8rem' : '0.5rem' }}></i>
                {item.label}
              </li>
            ))}
          </ul>
        </div>
      );
    }

    function AuthPage({ onLogin, onSignup, onBack }) {
      const [isSignUp, setIsSignUp] = useState(true);
      const [name, setName] = useState('');
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [whatsapp, setWhatsapp] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [loading, setLoading] = useState(false);
      const { addToast } = useContext(AppContext);

      // Which field (if any) is currently focused — the requirements box
      // for a field only shows while that field is focused, and hides again
      // the moment focus moves elsewhere (blur, or the other field).
      const [focusedField, setFocusedField] = useState(null); // null | 'username' | 'password'

      // Forgot-password flow. mode: null (not active) | 'verify' | 'reset' | 'failed'
      const [forgotMode, setForgotMode] = useState(null);
      const [fpUsername, setFpUsername] = useState('');
      const [fpWhatsapp, setFpWhatsapp] = useState('');
      const [fpNewUsername, setFpNewUsername] = useState('');
      const [fpNewPassword, setFpNewPassword] = useState('');
      const [fpResetToken, setFpResetToken] = useState('');
      const [fpShowNewPassword, setFpShowNewPassword] = useState(false);
      const [fpLoading, setFpLoading] = useState(false);

      // Live checklist state — recomputed on every keystroke so ticks
      // appear the moment a rule is satisfied.
      const usernameChecklist = useMemo(
        () => USERNAME_CHECKS.map(c => ({ ...c, met: c.test(username.trim()) })),
        [username]
      );
      const passwordChecklist = useMemo(
        () => PASSWORD_CHECKS.map(c => ({ ...c, met: c.test(password, username.trim()) })),
        [password, username]
      );

      const handleSubmit = async () => {
        if (!username.trim() || !password.trim()) {
          addToast('Username and password required', 'error');
          return;
        }
        if (isSignUp && !name.trim()) {
          addToast('Name required', 'error');
          return;
        }
        if (isSignUp && !whatsapp.trim()) {
          addToast('WhatsApp number required', 'error');
          return;
        }
        if (isSignUp) {
          const failedUsername = USERNAME_CHECKS.find(c => !c.test(username.trim()));
          if (failedUsername) {
            addToast(failedUsername.hint, 'error');
            return;
          }
          const failedPassword = PASSWORD_CHECKS.find(c => !c.test(password, username.trim()));
          if (failedPassword) {
            addToast(failedPassword.hint, 'error');
            return;
          }
        }
        setLoading(true);
        if (isSignUp) {
          const result = await signUpUser(name.trim(), username.trim(), password.trim(), whatsapp.trim());
          setLoading(false);
          if (result.success) {
            onLogin(result.user);
            addToast('Account created! Welcome!', 'success');
          } else {
            addToast(result.error || 'Sign-up failed', 'error');
          }
        } else {
          const result = await loginUser(username.trim(), password.trim());
          setLoading(false);
          if (result.success) {
            onLogin(result.user);
            addToast('Welcome back!', 'success');
          } else {
            addToast(result.error || 'Login failed', 'error');
          }
        }
      };

      const openForgotPassword = () => {
        setFpUsername(username.trim());
        setFpWhatsapp('');
        setFpNewUsername('');
        setFpNewPassword('');
        setFpResetToken('');
        setForgotMode('verify');
      };

      const closeForgotPassword = () => {
        setForgotMode(null);
      };

      const handleVerifyWhatsapp = async () => {
        if (!fpUsername.trim() || !fpWhatsapp.trim()) {
          addToast('Enter your username and WhatsApp number', 'error');
          return;
        }
        setFpLoading(true);
        try {
          const result = await verifyWhatsapp(fpUsername.trim(), fpWhatsapp.trim());
          if (result.success) {
            setFpNewUsername(fpUsername.trim());
            setFpResetToken(result.resetToken || '');
            setForgotMode('reset');
          } else {
            setForgotMode('failed');
          }
        } catch (err) {
          setForgotMode('failed');
        } finally {
          setFpLoading(false);
        }
      };

      const handleResetPassword = async () => {
        if (!fpNewUsername.trim() || !fpNewPassword.trim()) {
          addToast('Choose a username and new password', 'error');
          return;
        }
        setFpLoading(true);
        try {
          const result = await updateUserAPI(fpUsername.trim(), {
            username: fpNewUsername.trim(),
            password: fpNewPassword.trim(),
            resetToken: fpResetToken
          });
          if (result.error) {
            addToast(result.error, 'error');
          } else {
            addToast('Password updated! You can sign in now.', 'success');
            setUsername(fpNewUsername.trim());
            setPassword('');
            setIsSignUp(false);
            setForgotMode(null);
          }
        } catch (err) {
          addToast(err.message || 'Failed to reset password', 'error');
        } finally {
          setFpLoading(false);
        }
      };

      if (forgotMode) {
        return (
          <div className="glass-panel max-w-md mx-auto">
            <h2 className="text-2xl font-bold text-white mb-2"><i className="fas fa-key text-red-400 mr-3"></i> Forgot Password</h2>

            {forgotMode === 'verify' && (
              <>
                <p className="text-white/40 text-sm mb-6">Enter your username and the WhatsApp number you signed up with, and we'll let you set a new password.</p>
                <div className="space-y-4">
                  <div><label className="text-white/50 text-sm font-medium">Username</label>
                    <input type="text" value={fpUsername} onChange={(e) => setFpUsername(e.target.value)} className="input-neon mt-1" placeholder="Your username" />
                  </div>
                  <div><label className="text-white/50 text-sm font-medium">WhatsApp Number</label>
                    <input type="tel" value={fpWhatsapp} onChange={(e) => setFpWhatsapp(e.target.value)} className="input-neon mt-1" placeholder="+92 300 1234567" />
                  </div>

          <div className="space-y-4">

    // ─── CUSTOMER DASHBOARD ──────────────────────────────────
    // ─── CREDIT HISTORY (customer portal "Credits" button) ─────
    // Shows every time credits were added to the account and every time
    // they were spent — what it was for, and the exact date/time.
    function CreditHistoryModal({ open, onClose, username }) {
      const [history, setHistory] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (open && username) {
          setLoading(true);
          fetchCreditHistory(username)
            .then(data => setHistory(Array.isArray(data) ? data : []))
            .catch(() => setHistory([]))
            .finally(() => setLoading(false));
        }
      }, [open, username]);

      if (!open) return null;

      return (
        <div className="modal-overlay" style={{ alignItems: 'flex-start', overflowY: 'auto' }} onClick={onClose}>
          <div className="modal-content glass-panel" style={{ marginTop: '80px', marginBottom: '40px' }} onClick={(e) => e.stopPropagation()}>
            <button onClick={onClose} className="text-red-400 hover:text-red-300 text-sm mb-4 inline-flex items-center"><i className="fas fa-arrow-left mr-2"></i> Back</button>

            <p className="text-white/40 text-sm mb-5">Every time credits were added or used on your account, with the date and time.</p>

              <div className="text-center py-10"><span className="spinner"></span></div>

              <div className="space-y-2 max-h-96 overflow-y-auto">

                  <div key={h.id || h._id} className={`flex items-center justify-between rounded-xl px-4 py-3 border ${h.type === 'credit' ? 'bg-green-500/5 border-green-500/15' : 'bg-red-500/5 border-red-500/15'}`}>

                    </div>
                    <div className={`text-sm font-bold whitespace-nowrap ${h.type === 'credit' ? 'text-green-400' : 'text-red-400'}`}>
                      {h.type === 'credit' ? '+' : '-'}{h.amount}
                    </div>

    // ─── NOTICE BOARD (customer portal) ────────────────────────
    // Shows two kinds of messages to a signed-in customer: automatic
    // security heads-up notes about an upcoming PIN change on a screen
    // they share with someone else, and admin broadcast announcements.
    // Fetched fresh every time the customer opens their dashboard — see
    // GET /api/my-notes.
    function NotesBoard({ username }) {
      // Deliberately NOT cached like the subscriptions list is. These
      // messages say things like "we'll change your PIN tomorrow" — if a
      // background refresh ever silently failed (flaky connection, etc.)
      // and we kept showing a cached copy, that copy would go stale and
      // start showing the WRONG day, or keep showing a note that's no
      // longer true. A brief loading gap here is a much smaller cost than
      // that, so this always fetches fresh and shows nothing in between.
      const [notes, setNotes] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (!username) { setNotes([]); setLoading(false); return; }
        setLoading(true);
        fetchMyNotes()
          .then(data => setNotes(Array.isArray(data) ? data : []))
          .catch(err => { console.error('Failed to load notes board:', err); setNotes([]); })
          .finally(() => setLoading(false));
      }, [username]);

      if (loading || notes.length === 0) return null;

      return (
        <div className="glass-panel max-w-4xl mx-auto mb-2">
          <h3 className="text-white/70 font-semibold text-sm mb-3 inline-flex items-center gap-2">
            <i className="fas fa-thumbtack text-red-400"></i> Notice Board
          </h3>
          <div className="space-y-2">
            {notes.map(note => (
              <div
                key={note.id}
                className={`rounded-xl px-4 py-3 border text-sm ${note.type === 'security' ? 'bg-yellow-500/10 border-yellow-500/20 text-yellow-300' : 'bg-red-500/5 border-red-500/15 text-white/70'}`}
              >
                <i className={`fas ${note.type === 'security' ? 'fa-shield-alt' : 'fa-bullhorn'} mr-2`}></i>
                {note.message}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function CustomerDashboard({ customerData, onLogout, onBack, deals, onDealPurchase, subscriptions }) {
      const { addToast } = useContext(AppContext);
      const { user, refreshUser } = useContext(UserContext);
      const [userCredits, setUserCredits] = useState(user?.credits || 0);
      const [showCreditHistory, setShowCreditHistory] = useState(false);

      useEffect(() => {
        if (user) {
          refreshUser().then(updated => {
            if (updated) setUserCredits(updated.credits || 0);
          });
        }
      }, []);

      useEffect(() => {
        setUserCredits(user?.credits || 0);
      }, [user]);

      const getStatus = (expiryDate) => {
        if (!expiryDate) return { label: 'N/A', color: 'badge-gray' };
        const now = new Date();
        const exp = new Date(expiryDate);
        const diff = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
        if (diff < 0) return { label: 'Expired', color: 'badge-red' };
        if (diff === 0) return { label: 'Expires Today', color: 'badge-yellow' };
        if (diff === 1) return { label: 'Expires Tomorrow', color: 'badge-yellow' };
        return { label: 'Active', color: 'badge-green' };
      };

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const activeEntries = (customerData || []).filter(entry => {
        if (!entry.expiryDate) return true;
        const exp = new Date(entry.expiryDate);
        exp.setHours(0, 0, 0, 0);
        return exp >= today;
      });

      const expiringSoon = activeEntries.some(entry => {
        const exp = new Date(entry.expiryDate);
        exp.setHours(0, 0, 0, 0);
        const diff = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
        return diff === 0 || diff === 1;
      });

      const displayName = customerData && customerData.length > 0 ? customerData[0].name : user?.username || 'User';
      const displayWhatsapp = customerData && customerData.length > 0 ? customerData[0].whatsapp : user?.whatsapp || 'N/A';

      const activeDeals = (deals || []).filter(d => d.active);

      const renderDealsSection = () => {
        if (activeDeals.length === 0) return null;
        return (
          <div>
            <DealsCarousel deals={activeDeals} subscriptions={subscriptions || []} onPurchaseClick={onDealPurchase} />
          </div>
        );
      };

      if (!customerData || customerData.length === 0) {
        return (
          <div className="space-y-6">
            {renderDealsSection()}
            <button onClick={onBack} className="text-red-400 hover:text-red-300 font-bold text-base inline-flex items-center"><i className="fas fa-arrow-left mr-2"></i> Back</button>
            <NotesBoard username={user?.username} />
            <div className="glass-panel max-w-4xl mx-auto">
              <div className="mb-6">
                <h2 className="text-2xl font-bold text-white"><span className="brand-z brand-z-sm">Z</span> {displayName}</h2>
                <p className="text-white/30 text-sm"><i className="fab fa-whatsapp mr-1"></i> {displayWhatsapp}</p>
                <button onClick={() => setShowCreditHistory(true)} className="text-white/30 text-sm hover:text-red-400 transition inline-flex items-center gap-1">
                  <i className="fas fa-coins mr-1"></i> Credits: {userCredits} <i className="fas fa-chevron-right text-[10px] ml-1 opacity-60"></i>
                </button>
                <CreditHistoryModal open={showCreditHistory} onClose={() => setShowCreditHistory(false)} username={user?.username} />
              </div>
              <div className="text-center py-8 text-white/40">
                <i className="fas fa-inbox text-4xl mb-3 block"></i>
                <p>You have no active subscriptions.</p>
                <p className="text-sm mt-2">Check out the deals above or browse subscriptions!</p>
              </div>
            </div>
          </div>
        );
      }

      if (activeEntries.length === 0) {
        return (
          <div className="space-y-6">
            {renderDealsSection()}
            <button onClick={onBack} className="text-red-400 hover:text-red-300 font-bold text-base inline-flex items-center"><i className="fas fa-arrow-left mr-2"></i> Back</button>
            <NotesBoard username={user?.username} />
            <div className="glass-panel max-w-4xl mx-auto">
              <div className="mb-6">
                <h2 className="text-2xl font-bold text-white"><span className="brand-z brand-z-sm">Z</span> {displayName}</h2>
                <p className="text-white/30 text-sm"><i className="fab fa-whatsapp mr-1"></i> {displayWhatsapp}</p>
                <button onClick={() => setShowCreditHistory(true)} className="text-white/30 text-sm hover:text-red-400 transition inline-flex items-center gap-1">
                  <i className="fas fa-coins mr-1"></i> Credits: {userCredits} <i className="fas fa-chevron-right text-[10px] ml-1 opacity-60"></i>
                </button>
                <CreditHistoryModal open={showCreditHistory} onClose={() => setShowCreditHistory(false)} username={user?.username} />
              </div>
              <div className="text-center py-8 text-white/40">
                <i className="fas fa-exclamation-circle text-4xl text-yellow-400 mb-3 block"></i>
                <p>Your subscriptions have expired. Please renew to regain access.</p>
                <p className="text-sm mt-2">Check out the deals above!</p>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="space-y-6">
          {renderDealsSection()}
          <button onClick={onBack} className="text-red-400 hover:text-red-300 font-bold text-base inline-flex items-center"><i className="fas fa-arrow-left mr-2"></i> Back</button>
          <NotesBoard username={user?.username} />
          <div className="glass-panel max-w-4xl mx-auto">
            <div className="mb-6">
              <h2 className="text-2xl font-bold text-white"><span className="brand-z brand-z-sm">Z</span> {displayName}</h2>
              <p className="text-white/30 text-sm"><i className="fab fa-whatsapp mr-1"></i> {displayWhatsapp}</p>
              <button onClick={() => setShowCreditHistory(true)} className="text-white/30 text-sm hover:text-red-400 transition inline-flex items-center gap-1">
                <i className="fas fa-coins mr-1"></i> Credits: {userCredits} <i className="fas fa-chevron-right text-[10px] ml-1 opacity-60"></i>
              </button>
              <CreditHistoryModal open={showCreditHistory} onClose={() => setShowCreditHistory(false)} username={user?.username} />
            </div>
            {expiringSoon && (
              <div className="mb-4 p-3 rounded-xl bg-yellow-500/10 border border-yellow-500/20">
                <p className="text-yellow-400 text-sm"><i className="fas fa-exclamation-triangle mr-2"></i> ⚠️ One or more of your subscriptions expire today or tomorrow! Please renew.</p>

            <div className="space-y-4">

                  <div key={idx} className="bg-red-500/5 rounded-xl p-4 border border-red-500/10">
                    <div className="flex justify-between items-center mb-2">
                      <h3 className="text-lg font-semibold text-white">{entry.subscriptionName}</h3>
                      <span className={`badge ${status.color === 'badge-green' ? 'badge-green' : status.color === 'badge-yellow' ? 'badge-yellow' : status.color === 'badge-red' ? 'badge-red' : 'badge-gray'}`}>{status.label}</span>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
                      <div className="detail-row"><span className="label">Screens</span><span className="value">{entry.screens}</span></div>
                      <div className="detail-row"><span className="label">Duration</span><span className="value">{entry.months ? entry.months + ' months' : entry.days + ' days'}</span></div>
                      <div className="detail-row"><span className="label">Expiry</span><span className="value text-yellow-400">{entry.expiryDate}</span></div>
                      <div className="detail-row"><span className="label">Account Email</span>

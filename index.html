                  <i className="fas fa-info-circle mr-2"></i> Canva Pro: {creditsNeeded} credits for 1 year
                </p>
              </div>
            )}
            {currentUser && creditsNeeded > 0 && (
              <div className="bg-green-500/10 rounded-xl p-4 border border-green-500/20">
                <div className="flex items-center gap-3">
                  <input type="checkbox" checked={useCredits} onChange={(e) => setUseCredits(e.target.checked)} disabled={!canUseCredits} className="w-4 h-4 accent-green-400" />
                  <label className="text-white/70 text-sm">Pay with Credits ({creditsNeeded} credits needed, you have {currentUser.credits || 0})</label>
                </div>
                {!canUseCredits && useCredits && <p className="text-red-400 text-xs mt-1">Insufficient credits. Please use OTP or add credits.</p>}
              </div>
            )}
            {useCredits && canUseCredits ? (
              <button onClick={handlePayWithCredits} disabled={loading} className="btn-neon w-full py-3 bg-green-600 hover:bg-green-700">
                {loading ? <span className="spinner"></span> : <><i className="fas fa-coins mr-2"></i> Pay with Credits</>}
              </button>
            ) : (
              <button onClick={handleGenerateOTP} className="btn-neon w-full py-3">
                <i className="fas fa-key mr-2"></i> Get OTP
              </button>
            )}
          </div>
        );
      }

      if (step === 'otp') {
        return (
          <div className="space-y-6">
            <button onClick={() => setStep('plan')} className="text-red-400 hover:text-red-300 text-sm"><i className="fas fa-arrow-left mr-2"></i> Back</button>
            <h2 className="text-2xl font-bold text-white">Enter OTP</h2>
            <p className="text-white/40 text-sm">Enter the 4-digit OTP. Expires in {otpTimer}s</p>
            <div className="flex gap-3 justify-center">
              {[0,1,2,3].map(idx => (
                <input key={idx} ref={el => otpRefs.current[idx] = el} type="text" className="otp-input" maxLength="1" value={otp[idx]} onChange={(e) => handleOtpChange(idx, e.target.value)} onKeyDown={(e) => { if (e.key === 'Backspace' && !otp[idx] && idx > 0) otpRefs.current[idx - 1]?.focus(); }} autoFocus={idx === 0} />
              ))}
            </div>
            {otpError && <p className="text-red-400 text-sm text-center">{otpError}</p>}
            <button onClick={handleVerifyOtp} disabled={loading} className="btn-neon w-full py-3">
              {loading ? <span className="spinner"></span> : <><i className="fas fa-check mr-2"></i> Verify & Complete</>}
            </button>
          </div>
        );
      }
      return null;
    }

    // ─── DEAL PURCHASE FLOW ──────────────────────────────────
    function DealPurchaseFlow({ deal, subscriptions, onBack, onComplete, user }) {
      const [step, setStep] = useState('plan');
      const [name, setName] = useState('');
      const [whatsapp, setWhatsapp] = useState(user?.whatsapp || '');
      const [otp, setOtp] = useState(['', '', '', '']);
      const [otpError, setOtpError] = useState('');
      const [otpTimer, setOtpTimer] = useState(0);
      const [loading, setLoading] = useState(false);
      const [useCredits, setUseCredits] = useState(false);
      const { addToast } = useContext(AppContext);
      const { user: currentUser, setUser } = useContext(UserContext);
      const otpRefs = useRef([]);
      const isSubmittingRef = useRef(false);

      const dealSubs = useMemo(() => {
        if (!deal.subscriptionIds) return [];
        return subscriptions.filter(s => deal.subscriptionIds.includes(s.id));
      }, [deal, subscriptions]);

      const creditsNeeded = deal.discountPrice;
      const canUseCredits = (currentUser?.credits || 0) >= creditsNeeded && creditsNeeded > 0;

      const getDescription = () => {
        const subNames = dealSubs.map(s => s.name).join(' + ');
        return `Deal: ${deal.title} - ${subNames}`;
      };

      const { generateOTPAPI, verifyOTPAPI } = useOTPFlow(setStep, setOtpTimer, addToast,
        user?.username || 'Deal User', getDescription());

      const handleGenerateOTP = async () => {
        if (!name.trim()) { addToast('Please enter your full name', 'error'); return; }
        if (!whatsapp.trim()) { addToast('WhatsApp number is required', 'error'); return; }
        if (user && whatsapp.trim() !== user?.whatsapp) {
          addToast('WhatsApp number must match your sign-up number', 'error');
          return;
        }
        await generateOTPAPI();
      };

      useEffect(() => {
        if (otpTimer > 0) {
          const timer = setTimeout(() => setOtpTimer(otpTimer - 1), 1000);
          return () => clearTimeout(timer);
        }
      }, [otpTimer]);

      const handleOtpChange = (idx, val) => {
        if (!/^\d*$/.test(val)) return;
        const newOtp = [...otp];
        newOtp[idx] = val.slice(0, 1);
        setOtp(newOtp);
        if (val && idx < 3) otpRefs.current[idx + 1]?.focus();
      };

      const handleVerifyOtp = async () => {
        const entered = otp.join('');
        if (entered.length !== 4) { setOtpError('Enter all 4 digits'); return; }
        const verified = await verifyOTPAPI(entered);
        if (verified) {
          setOtpError('');
          completePurchase(false);
        } else {
          setOtpError('Invalid OTP');
        }
      };

      const completePurchase = async (useCreditsFlag = false) => {
        if (isSubmittingRef.current) return;
        isSubmittingRef.current = true;

        if (!name.trim() || !whatsapp.trim()) {
          addToast('Please fill all details', 'error');
          isSubmittingRef.current = false;
          return;
        }

        setLoading(true);
        const now = new Date();
        const totalDays = 30;
        const expiry = new Date(now);
        expiry.setDate(expiry.getDate() + totalDays);

        if (useCreditsFlag) {
          try {
            const updatedUser = await deductCredits(user.username, creditsNeeded);
            setUser(updatedUser);
            addToast(`✅ ${creditsNeeded} credits deducted.`, 'success');
          } catch (err) {
            addToast('Failed to deduct credits: ' + (err?.error || 'unknown error'), 'error');
            setLoading(false);
            isSubmittingRef.current = false;
            return;
          }
        }

        let allAllocated = [];
        let allSubscriptions = [];
        let waitingSubs = [];

        for (const sub of dealSubs) {
          const subType = sub.type;
          let allocatedForSub = [];

          if (subType === 'netflix') {
            const availableSlots = [];
            sub.accounts.forEach(acc => {
              if (acc.screens) {
                acc.screens.forEach(screen => {
                  const customerCount = screen.customers?.length || 0;
                  if (customerCount < 3) {
                    availableSlots.push({ account: acc, screen, used: customerCount });
                  }
                });
              }
            });
            const result = allocateScreens(availableSlots, 1, user.username, whatsapp.trim(), null);
            if (result && !result.error) {
              allocatedForSub = result.map(slot => ({
                accountId: slot.account.id,
                screenId: slot.screen.id,
                screenName: slot.screen.name,
                accountEmail: slot.account.email,
                accountPassword: slot.account.password || '••••••••',
                screenPin: slot.screen.pin || 'N/A',
                subscriptionId: sub.id,
                subscriptionName: sub.name
              }));
            }
          } else if (subType === 'amazon') {
            const availableSlots = [];
            sub.accounts.forEach(acc => {
              if (acc.screens) {
                acc.screens.forEach(screen => {
                  availableSlots.push({ account: acc, screen, used: 0 });
                });
              }
            });
            const purchaseCount = user.purchaseCount || 0;
            const slot = allocateAmazonScreen(availableSlots, user.username, whatsapp.trim(), purchaseCount);
            if (slot) {
              allocatedForSub = [{
                accountId: slot.account.id,
                screenId: slot.screen.id,
                screenName: slot.screen.name,
                accountEmail: slot.account.email,
                accountPassword: slot.account.password || '••••••••',
                screenPin: slot.screen.pin || 'N/A',
                subscriptionId: sub.id,
                subscriptionName: sub.name
              }];
            }
          } else {
            const allocation = allocateSimpleScreen(sub, user.username, whatsapp.trim());
            if (allocation) {
              allocatedForSub = [{
                accountId: allocation.account.id,
                screenId: allocation.screen.id,
                screenName: allocation.screen.name,
                accountEmail: allocation.account.email,
                accountPassword: allocation.account.password || '••••••••',
                screenPin: allocation.screen.pin || 'N/A',
                subscriptionId: sub.id,
                subscriptionName: sub.name
              }];
            }
          }

          if (allocatedForSub.length > 0) {
            allAllocated = allAllocated.concat(allocatedForSub);
            allSubscriptions.push(sub.id);
          } else {
            // No account available for this part of the deal — it still
            // gets recorded so the admin can fulfill it and add the
            // customer's account soon, instead of the customer silently
            // getting less than what the deal promised.
            waitingSubs.push({ id: sub.id, name: sub.name });
          }
        }

        try {
          await incrementPurchase(user.username);
        } catch (err) {
          console.error('Failed to increment purchase count', err);
        }

        setTimeout(() => {
          onComplete({
            subscriptionId: deal.subscriptionIds?.[0] || 'deal',
            screens: 1,
            months: 1,
            days: totalDays,
            name: name.trim(),
            username: user.username,
            password: user.password,
            whatsapp: whatsapp.trim(),
            allocated: allAllocated,
            expiryDate: expiry.toISOString().split('T')[0],
            paidWithCredits: useCreditsFlag,
            isDeal: true,
            dealTitle: deal.title,
            dealSubscriptionIds: deal.subscriptionIds || [],
            dealSubscriptions: allSubscriptions,
            waitingSubs,
            purchasedAt: now.toISOString()
          });
          setLoading(false);
          isSubmittingRef.current = false;
        }, 1200);
      };

      const handlePayWithCredits = async () => {
        if (isSubmittingRef.current) {
          addToast('Please wait, your purchase is already processing…', 'info');
          return;
        }
        if (!canUseCredits) {
          addToast('Insufficient credits', 'error');
          return;
        }
        if (!name.trim() || !whatsapp.trim()) {
          addToast('Please fill all details', 'error');
          return;
        }
        await completePurchase(true);
      };

      if (step === 'plan') {
        return (
          <div className="space-y-6">
            <button onClick={onBack} className="text-red-400 hover:text-red-300 text-sm"><i className="fas fa-arrow-left mr-2"></i> Back</button>
            <div className="bg-red-500/5 rounded-xl p-4 border border-red-500/10">
              <h3 className="text-xl font-bold text-white">{deal.title}</h3>
              <p className="text-white/40 text-sm">{deal.description || ''}</p>
              {dealSubs.length > 0 && (
                <div className="flex flex-wrap gap-2 mt-2">
                  {dealSubs.map(sub => (
                    <span key={sub.id} className="deal-sub-badge">
                      {sub.type === 'netflix' ? (
                        <span className="netflix-logo" style={{ fontSize: '0.6rem' }}>N</span>
                      ) : (
                        <i className={`fab ${sub.type === 'netflix' ? 'fa-netflix' : sub.type === 'amazon' ? 'fa-amazon' : sub.type === 'youtube' ? 'fa-youtube' : sub.type === 'spotify' ? 'fa-spotify' : sub.type === 'chatgpt' ? 'fa-robot' : sub.type === 'canva' ? 'fa-paint-brush' : sub.type === 'capcut' ? 'fa-video' : sub.type === 'hbomax' ? 'fa-tv' : sub.type === 'crunchyroll' ? 'fa-play' : sub.type === 'chaupal' ? 'fa-film' : 'fa-crown'}`} style={{ color: sub.type === 'netflix' ? '#e50914' : sub.type === 'amazon' ? '#ff9900' : sub.type === 'youtube' ? '#ff0000' : sub.type === 'spotify' ? '#1db954' : sub.type === 'chatgpt' ? '#10a37f' : sub.type === 'canva' ? '#00c4cc' : sub.type === 'capcut' ? '#00d4ff' : sub.type === 'hbomax' ? '#5822b4' : sub.type === 'crunchyroll' ? '#f47521' : sub.type === 'chaupal' ? '#e74c3c' : '#ef4444' }}></i>
                      )}
                      {sub.name}
                    </span>
                  ))}
                </div>
              )}
              <div className="flex items-center gap-3 mt-2">
                <span className="text-white/30 line-through">RS {deal.actualPrice}</span>
                <span className="text-2xl font-bold text-green-400">RS {deal.discountPrice}</span>
                <span className="badge badge-yellow text-xs">🔥 Deal</span>
              </div>
            </div>
            <p className="text-white/30 text-xs -mt-2">If any part of this deal is out of stock, it'll still be purchased and added to your portal soon — admin will be notified.</p>
            <div className="space-y-3">
              <div><label className="text-white/50 text-sm font-medium">Full Name</label>
                <input type="text" value={name} onChange={(e) => setName(e.target.value)} className="input-neon mt-1" placeholder="Your full name" />
              </div>
              <div><label className="text-white/50 text-sm font-medium">WhatsApp Number</label>
                <input type="tel" value={whatsapp} onChange={(e) => setWhatsapp(e.target.value)} className="input-neon mt-1" placeholder="+92 300 1234567" readOnly={!!user?.whatsapp} />
                {user?.whatsapp && <p className="text-xs text-white/30 mt-1">(locked to your sign‑up number)</p>}
              </div>
            </div>
            {currentUser && (
              <div className="bg-green-500/10 rounded-xl p-4 border border-green-500/20">
                <div className="flex items-center gap-3">
                  <input type="checkbox" checked={useCredits} onChange={(e) => setUseCredits(e.target.checked)} disabled={!canUseCredits} className="w-4 h-4 accent-green-400" />
                  <label className="text-white/70 text-sm">Pay with Credits ({creditsNeeded} credits needed, you have {currentUser.credits || 0})</label>
                </div>
                {!canUseCredits && useCredits && <p className="text-red-400 text-xs mt-1">Insufficient credits. Please use OTP or add credits.</p>}
              </div>
            )}
            {useCredits && canUseCredits ? (
              <button onClick={handlePayWithCredits} disabled={loading} className="btn-neon w-full py-3 bg-green-600 hover:bg-green-700">
                {loading ? <span className="spinner"></span> : <><i className="fas fa-coins mr-2"></i> Pay with Credits</>}
              </button>
            ) : (
              <button onClick={handleGenerateOTP} className="btn-neon w-full py-3">
                <i className="fas fa-key mr-2"></i> Get OTP
              </button>
            )}
          </div>
        );
      }

      if (step === 'otp') {
        return (
          <div className="space-y-6">
            <button onClick={() => setStep('plan')} className="text-red-400 hover:text-red-300 text-sm"><i className="fas fa-arrow-left mr-2"></i> Back</button>
            <h2 className="text-2xl font-bold text-white">Enter OTP</h2>
            <p className="text-white/40 text-sm">Enter the 4-digit OTP. Expires in {otpTimer}s</p>
            <div className="flex gap-3 justify-center">
              {[0,1,2,3].map(idx => (
                <input key={idx} ref={el => otpRefs.current[idx] = el} type="text" className="otp-input" maxLength="1" value={otp[idx]} onChange={(e) => handleOtpChange(idx, e.target.value)} onKeyDown={(e) => { if (e.key === 'Backspace' && !otp[idx] && idx > 0) otpRefs.current[idx - 1]?.focus(); }} autoFocus={idx === 0} />
              ))}
            </div>
            {otpError && <p className="text-red-400 text-sm text-center">{otpError}</p>}
            <button onClick={handleVerifyOtp} disabled={loading} className="btn-neon w-full py-3">
              {loading ? <span className="spinner"></span> : <><i className="fas fa-check mr-2"></i> Verify & Complete</>}
            </button>
          </div>
        );
      }
      return null;
    }

    // ─── CUSTOM SUBSCRIPTION REQUEST ────────────────────────────
    // For when the customer wants something that isn't listed at all.
    // No payment here — it's just a request. Name/WhatsApp come from
    // their account already; they only type the subscription name and
    // pick how many months. Goes straight to the admin's Waiting
    // Customers list so the admin can follow up with pricing/availability.
    function CustomFlow({ onBack, onComplete, user }) {
      const [subName, setSubName] = useState('');
      const [months, setMonths] = useState(1);
      const [name, setName] = useState('');
      const [whatsapp, setWhatsapp] = useState(user?.whatsapp || '');
      const [submitting, setSubmitting] = useState(false);
      const { addToast } = useContext(AppContext);
      const isSubmittingRef = useRef(false);

      const handleSubmit = async () => {
        if (isSubmittingRef.current) return;
        if (!subName.trim()) { addToast('Please enter the exact subscription name', 'error'); return; }
        if (!name.trim() || !whatsapp.trim()) { addToast('Please fill your name and WhatsApp number', 'error'); return; }
        if (user && whatsapp.trim() !== user?.whatsapp) {
          addToast('WhatsApp number must match your sign-up number', 'error');
          return;
        }
        isSubmittingRef.current = true;
        setSubmitting(true);
        try {
          await onComplete({
            subscriptionName: subName.trim(),
            name: name.trim(),
            username: user?.username || '',
            whatsapp: whatsapp.trim(),
            months
          });
        } finally {
          setSubmitting(false);
          isSubmittingRef.current = false;
        }
      };

      return (
        <div className="space-y-6">
          <button onClick={onBack} className="text-red-400 hover:text-red-300 text-sm"><i className="fas fa-arrow-left mr-2"></i> Back</button>
          <h2 className="text-2xl font-bold text-white"><i className="fas fa-hand-paper text-red-400 mr-3"></i> Request Custom Subscription</h2>
          <p className="text-white/40 text-sm -mt-2">Don't see what you want in our list? Tell us exactly what you need and we'll get back to you with pricing and availability.</p>
          <div><label className="text-white/50 text-sm font-medium">Subscription Name (exact)</label>
            <input type="text" value={subName} onChange={(e) => setSubName(e.target.value)} className="input-neon mt-1" placeholder="e.g. Disney+ Hotstar" />
          </div>
          <div><label className="text-white/50 text-sm font-medium">For how many months</label>
            <select value={months} onChange={(e) => setMonths(Number(e.target.value))} className="input-neon mt-1">
              {[1,2,3,6,12].map(n => <option key={n} value={n}>{n} {n === 1 ? 'month' : 'months'}</option>)}
            </select>
          </div>
          <div className="space-y-3">
            <div><label className="text-white/50 text-sm font-medium">Full Name</label>
              <input type="text" value={name} onChange={(e) => setName(e.target.value)} className="input-neon mt-1" placeholder="Your full name" />
            </div>
            <div><label className="text-white/50 text-sm font-medium">WhatsApp Number</label>
              <input type="tel" value={whatsapp} onChange={(e) => setWhatsapp(e.target.value)} className="input-neon mt-1" placeholder="+92 300 1234567" readOnly={!!user?.whatsapp} />
              {user?.whatsapp && <p className="text-xs text-white/30 mt-1">(locked to your sign‑up number)</p>}
            </div>
          </div>
          <button onClick={handleSubmit} disabled={submitting} className="btn-neon w-full py-3">
            {submitting ? <span className="spinner"></span> : <><i className="fas fa-paper-plane mr-2"></i> Submit Request</>}
          </button>
        </div>
      );
    }

    // ─── AUTH PAGE ─────────────────────────────────────────────
    function AuthPage({ onLogin, onSignup, onBack }) {
      const [isSignUp, setIsSignUp] = useState(false);
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [whatsapp, setWhatsapp] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [loading, setLoading] = useState(false);
      const { addToast } = useContext(AppContext);

      // Forgot-password flow. mode: null (not active) | 'verify' | 'reset' | 'failed'
      const [forgotMode, setForgotMode] = useState(null);
      const [fpUsername, setFpUsername] = useState('');
      const [fpWhatsapp, setFpWhatsapp] = useState('');
      const [fpNewUsername, setFpNewUsername] = useState('');
      const [fpNewPassword, setFpNewPassword] = useState('');
      const [fpShowNewPassword, setFpShowNewPassword] = useState(false);
      const [fpLoading, setFpLoading] = useState(false);

      const handleSubmit = async () => {
        if (!username.trim() || !password.trim()) {
          addToast('Username and password required', 'error');
          return;
        }
        if (isSignUp && !whatsapp.trim()) {
          addToast('WhatsApp number required', 'error');
          return;
        }
        setLoading(true);
        if (isSignUp) {
          const result = await signUpUser(username.trim(), password.trim(), whatsapp.trim());
          setLoading(false);
          if (result.success) {
            onLogin(result.user);
            addToast('Account created! Welcome!', 'success');
          } else {
            addToast(result.error || 'Sign-up failed', 'error');
          }
        } else {
          const result = await loginUser(username.trim(), password.trim());
          setLoading(false);
          if (result.success) {
            onLogin(result.user);
            addToast('Welcome back!', 'success');
          } else {
            addToast(result.error || 'Login failed', 'error');
          }
        }
      };

      const openForgotPassword = () => {
        setFpUsername(username.trim());
        setFpWhatsapp('');
        setFpNewUsername('');
        setFpNewPassword('');
        setForgotMode('verify');
      };

      const closeForgotPassword = () => {
        setForgotMode(null);
      };

      const handleVerifyWhatsapp = async () => {
        if (!fpUsername.trim() || !fpWhatsapp.trim()) {
          addToast('Enter your username and WhatsApp number', 'error');
          return;
        }
        setFpLoading(true);
        try {
          const result = await verifyWhatsapp(fpUsername.trim(), fpWhatsapp.trim());
          if (result.success) {
            setFpNewUsername(fpUsername.trim());
            setForgotMode('reset');
          } else {
            setForgotMode('failed');
          }
        } catch (err) {
          setForgotMode('failed');
        } finally {
          setFpLoading(false);
        }
      };

      const handleResetPassword = async () => {
        if (!fpNewUsername.trim() || !fpNewPassword.trim()) {
          addToast('Choose a username and new password', 'error');
          return;
        }
        setFpLoading(true);
        try {
          const result = await updateUserAPI(fpUsername.trim(), {
            username: fpNewUsername.trim(),
            password: fpNewPassword.trim()
          });
          if (result.error) {
            addToast(result.error, 'error');
          } else {
            addToast('Password updated! You can sign in now.', 'success');
            setUsername(fpNewUsername.trim());
            setPassword('');
            setIsSignUp(false);
            setForgotMode(null);
          }
        } catch (err) {
          addToast(err.message || 'Failed to reset password', 'error');
        } finally {
          setFpLoading(false);
        }
      };

      if (forgotMode) {
        return (
          <div className="glass-panel max-w-md mx-auto">
            <h2 className="text-2xl font-bold text-white mb-2"><i className="fas fa-key text-red-400 mr-3"></i> Forgot Password</h2>

            {forgotMode === 'verify' && (
              <>
                <p className="text-white/40 text-sm mb-6">Enter your username and the WhatsApp number you signed up with, and we'll let you set a new password.</p>
                <div className="space-y-4">
                  <div><label className="text-white/50 text-sm font-medium">Username</label>
                    <input type="text" value={fpUsername} onChange={(e) => setFpUsername(e.target.value)} className="input-neon mt-1" placeholder="Your username" />
                  </div>
                  <div><label className="text-white/50 text-sm font-medium">WhatsApp Number</label>
                    <input type="tel" value={fpWhatsapp} onChange={(e) => setFpWhatsapp(e.target.value)} className="input-neon mt-1" placeholder="+92 300 1234567" />
                  </div>
                  <button onClick={handleVerifyWhatsapp} disabled={fpLoading} className="btn-neon w-full py-3">
                    {fpLoading ? <span className="spinner"></span> : <><i className="fas fa-check mr-2"></i> Verify</>}
                  </button>
                </div>
              </>

    // ─── CUSTOMER DASHBOARD ──────────────────────────────────
    function CustomerDashboard({ customerData, onLogout, onBack, deals, onDealPurchase, subscriptions }) {
      const { addToast } = useContext(AppContext);
      const { user, refreshUser } = useContext(UserContext);
      const [userCredits, setUserCredits] = useState(user?.credits || 0);

      useEffect(() => {
        if (user) {
          refreshUser().then(updated => {
            if (updated) setUserCredits(updated.credits || 0);
          });
        }
      }, []);

      useEffect(() => {
        setUserCredits(user?.credits || 0);
      }, [user]);

      const getStatus = (expiryDate) => {
        if (!expiryDate) return { label: 'N/A', color: 'badge-gray' };
        const now = new Date();
        const exp = new Date(expiryDate);
        const diff = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
        if (diff < 0) return { label: 'Expired', color: 'badge-red' };
        if (diff === 0) return { label: 'Expires Today', color: 'badge-yellow' };
        if (diff === 1) return { label: 'Expires Tomorrow', color: 'badge-yellow' };
        return { label: 'Active', color: 'badge-green' };
      };

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const activeEntries = (customerData || []).filter(entry => {
        if (!entry.expiryDate) return true;
        const exp = new Date(entry.expiryDate);
        exp.setHours(0, 0, 0, 0);
        return exp >= today;
      });

      const expiringSoon = activeEntries.some(entry => {
        const exp = new Date(entry.expiryDate);
        exp.setHours(0, 0, 0, 0);
        const diff = Math.ceil((exp - today) / (1000 * 60 * 60 * 24));
        return diff === 0 || diff === 1;
      });

      const displayName = customerData && customerData.length > 0 ? customerData[0].name : user?.username || 'User';
      const displayWhatsapp = customerData && customerData.length > 0 ? customerData[0].whatsapp : user?.whatsapp || 'N/A';

      const activeDeals = (deals || []).filter(d => d.active);

      const renderDealsSection = () => {
        if (activeDeals.length === 0) return null;
        return (
          <div>
            <DealsCarousel deals={activeDeals} subscriptions={subscriptions || []} onPurchaseClick={onDealPurchase} />
          </div>
        );
      };

      if (!customerData || customerData.length === 0) {
        return (
          <div className="space-y-6">
            <button onClick={onBack} className="text-red-400 hover:text-red-300 font-bold text-base inline-flex items-center"><i className="fas fa-arrow-left mr-2"></i> Back</button>

                <p className="text-white/30 text-sm"><i className="fab fa-whatsapp mr-1"></i> {displayWhatsapp}</p>
                <p className="text-white/30 text-sm"><i className="fas fa-coins mr-1"></i> Credits: {userCredits}</p>
              </div>
              <div className="text-center py-8 text-white/40">
                <i className="fas fa-inbox text-4xl mb-3 block"></i>
                <p>You have no active subscriptions.</p>
                <p className="text-sm mt-2">Check out the deals above or browse subscriptions!</p>
              </div>
            </div>
          </div>
        );
      }

      if (activeEntries.length === 0) {
        return (
          <div className="space-y-6">
            <button onClick={onBack} className="text-red-400 hover:text-red-300 font-bold text-base inline-flex items-center"><i className="fas fa-arrow-left mr-2"></i> Back</button>
            {renderDealsSection()}
            <div className="glass-panel max-w-4xl mx-auto">
              <div className="mb-6">
                <h2 className="text-2xl font-bold text-white"><span className="brand-z brand-z-sm">Z</span> {displayName}</h2>
                <p className="text-white/30 text-sm"><i className="fab fa-whatsapp mr-1"></i> {displayWhatsapp}</p>
                <p className="text-white/30 text-sm"><i className="fas fa-coins mr-1"></i> Credits: {userCredits}</p>
              </div>
              <div className="text-center py-8 text-white/40">
                <i className="fas fa-exclamation-circle text-4xl text-yellow-400 mb-3 block"></i>
                <p>Your subscriptions have expired. Please renew to regain access.</p>
                <p className="text-sm mt-2">Check out the deals above!</p>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="space-y-6">
          <button onClick={onBack} className="text-red-400 hover:text-red-300 font-bold text-base inline-flex items-center"><i className="fas fa-arrow-left mr-2"></i> Back</button>
          {renderDealsSection()}
          <div className="glass-panel max-w-4xl mx-auto">
            <div className="mb-6">
              <h2 className="text-2xl font-bold text-white"><span className="brand-z brand-z-sm">Z</span> {displayName}</h2>
              <p className="text-white/30 text-sm"><i className="fab fa-whatsapp mr-1"></i> {displayWhatsapp}</p>
              <p className="text-white/30 text-sm"><i className="fas fa-coins mr-1"></i> Credits: {userCredits}</p>
            </div>
            {expiringSoon && (
              <div className="mb-4 p-3 rounded-xl bg-yellow-500/10 border border-yellow-500/20">
                <p className="text-yellow-400 text-sm"><i className="fas fa-exclamation-triangle mr-2"></i> ⚠️ One or more of your subscriptions expire today or tomorrow! Please renew.</p>
              </div>
            )}
            <div className="space-y-4">
              {activeEntries.map((entry, idx) => {
                const status = getStatus(entry.expiryDate);
                const isExpiring = status.label === 'Expires Today' || status.label === 'Expires Tomorrow';
                return (
                  <div key={idx} className="bg-red-500/5 rounded-xl p-4 border border-red-500/10">
                    <div className="flex justify-between items-center mb-2">
                      <h3 className="text-lg font-semibold text-white">{entry.subscriptionName}</h3>
                      <span className={`badge ${status.color === 'badge-green' ? 'badge-green' : status.color === 'badge-yellow' ? 'badge-yellow' : status.color === 'badge-red' ? 'badge-red' : 'badge-gray'}`}>{status.label}</span>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
                      <div className="detail-row"><span className="label">Screens</span><span className="value">{entry.screens}</span></div>
                      <div className="detail-row"><span className="label">Duration</span><span className="value">{entry.months ? entry.months + ' months' : entry.days + ' days'}</span></div>
                      <div className="detail-row"><span className="label">Expiry</span><span className="value text-yellow-400">{entry.expiryDate}</span></div>
                      <div className="detail-row"><span className="label">Account Email</span>
                        <span className="value">{entry.accountEmail}
                          <button className="copy-btn" onClick={() => { navigator?.clipboard?.writeText(entry.accountEmail); addToast('Copied!', 'success'); }}><i className="fas fa-copy"></i></button>
                        </span>
                      </div>
                      <div className="detail-row"><span className="label">Account Password</span>
                        <span className="value">{entry.accountPassword || '••••••••'}
                          <button className="copy-btn" onClick={() => { navigator?.clipboard?.writeText(entry.accountPassword || ''); addToast('Copied!', 'success'); }}><i className="fas fa-copy"></i></button>
                        </span>
                      </div>
                      <div className="detail-row"><span className="label">Screen Name</span>
                        <span className="value">{entry.screenName}
                          <button className="copy-btn" onClick={() => { navigator?.clipboard?.writeText(entry.screenName); addToast('Copied!', 'success'); }}><i className="fas fa-copy"></i></button>
                        </span>
                      </div>
                      <div className="detail-row"><span className="label">Screen PIN</span>
                        <span className="value">{entry.screenPin || 'N/A'}
                          <button className="copy-btn" onClick={() => { navigator?.clipboard?.writeText(entry.screenPin || ''); addToast('Copied!', 'success'); }}><i className="fas fa-copy"></i></button>

                    {isExpiring && (

    // ─── PROMOTIONS CAROUSEL ──────────────────────────────────
    function PromotionsCarousel({ promotions }) {
      const [itemsPerView, setItemsPerView] = useState(5);
      const [offset, setOffset] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const [containerWidth, setContainerWidth] = useState(0);
      const containerRef = useRef(null);
      const trackRef = useRef(null);
      const animationRef = useRef(null);
      const speed = 35;

      const [isDragging, setIsDragging] = useState(false);
      const [dragStartX, setDragStartX] = useState(0);
      const [dragOffsetStart, setDragOffsetStart] = useState(0);
      const [dragVelocity, setDragVelocity] = useState(0);
      const lastMoveTime = useRef(0);
      const lastMoveX = useRef(0);
      const momentumId = useRef(null);

      const activePromos = useMemo(() => {
        return promotions.filter(p => p.active !== false);
      }, [promotions]);

      const totalItems = activePromos.length;
      const repeatedItems = useMemo(() => {
        if (totalItems === 0) return [];
        const reps = 3;
        const arr = [];
        for (let i = 0; i < reps; i++) arr.push(...activePromos);
        return arr;
      }, [activePromos, totalItems]);

      const getItemsPerView = () => {
        if (typeof window === 'undefined') return 5;
        const w = window.innerWidth;
        if (w >= 1200) return 5;
        if (w >= 992) return 4;
        if (w >= 768) return 3;
        if (w >= 576) return 2;
        return 1;
      };

      useEffect(() => {
        const handleResize = () => { setItemsPerView(getItemsPerView()); };
        window.addEventListener('resize', handleResize);
        handleResize();
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        if (!containerRef.current) return;
        const measure = () => {
          const width = containerRef.current.getBoundingClientRect().width;
          setContainerWidth(width);
        };
        measure();
        const ro = new ResizeObserver(measure);
        ro.observe(containerRef.current);
        return () => ro.disconnect();
      }, [itemsPerView]);

      const gap = 12;
      const slideWidth = containerWidth > 0 ? (containerWidth / itemsPerView) - gap : 0;
      const oneSetWidth = slideWidth * totalItems + gap * (totalItems - 1);

      useEffect(() => {
        if (isPaused || totalItems === 0 || oneSetWidth === 0 || slideWidth === 0 || isDragging) {
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
            animationRef.current = null;
          }
          return;
        }
        let lastTimestamp = performance.now();
        const animate = (timestamp) => {
          const delta = (timestamp - lastTimestamp) / 1000;
          lastTimestamp = timestamp;
          setOffset(prev => {
            let newOffset = prev + speed * delta;
            if (newOffset >= oneSetWidth) {
              newOffset = newOffset - oneSetWidth;
            }
            return newOffset;
          });
          animationRef.current = requestAnimationFrame(animate);
        };
        animationRef.current = requestAnimationFrame(animate);
        return () => {
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
            animationRef.current = null;
          }
        };
      }, [isPaused, totalItems, oneSetWidth, slideWidth, speed, isDragging]);

      const handleDragStart = (clientX) => {
        setIsDragging(true);
        setIsPaused(true);
        setDragStartX(clientX);
        setDragOffsetStart(offset);
        setDragVelocity(0);
        lastMoveTime.current = Date.now();
        lastMoveX.current = clientX;
        if (momentumId.current) {
          cancelAnimationFrame(momentumId.current);
          momentumId.current = null;
        }
        if (animationRef.current) {
          cancelAnimationFrame(animationRef.current);
          animationRef.current = null;
        }
      };

      const handleDragMove = (clientX) => {
        if (!isDragging) return;
        const diff = clientX - dragStartX;
        let newOffset = dragOffsetStart - diff;
        if (newOffset < 0) newOffset = 0;
        if (newOffset > oneSetWidth) newOffset = oneSetWidth;
        setOffset(newOffset);
        const now = Date.now();
        const dt = now - lastMoveTime.current;
        if (dt > 0) {
          const dx = clientX - lastMoveX.current;
          const vel = dx / dt;
          setDragVelocity(vel);
        }
        lastMoveTime.current = now;
        lastMoveX.current = clientX;
      };

      const handleDragEnd = () => {
        if (!isDragging) return;
        setIsDragging(false);
        const vel = dragVelocity;
        if (Math.abs(vel) > 0.2) {
          let momentumOffset = offset;
          const momentumStep = () => {
            const dt = 16;
            const decay = 0.97;
            let velDecay = vel * decay;
            momentumOffset = momentumOffset - velDecay * dt;
            if (momentumOffset < 0) {
              momentumOffset = 0;
              velDecay = 0;
            } else if (momentumOffset > oneSetWidth) {
              momentumOffset = oneSetWidth;
              velDecay = 0;
            }
            setOffset(momentumOffset);
            if (Math.abs(velDecay) > 0.1 && momentumOffset > 0 && momentumOffset < oneSetWidth) {
              momentumId.current = requestAnimationFrame(momentumStep);
            } else {
              setTimeout(() => { setIsPaused(false); }, 2000);
            }
          };
          momentumId.current = requestAnimationFrame(momentumStep);
        } else {
          setTimeout(() => { setIsPaused(false); }, 2000);
        }
        setDragVelocity(0);
      };

      const onTouchStart = (e) => {
        const touch = e.touches[0];
        handleDragStart(touch.clientX);
      };
      const onTouchMove = (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        handleDragMove(touch.clientX);
      };
      const onTouchEnd = () => { handleDragEnd(); };

      const onMouseDown = (e) => {
        if (e.button !== 0) return;
        handleDragStart(e.clientX);
        const onMouseMove = (ev) => handleDragMove(ev.clientX);
        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          handleDragEnd();
        };
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      };

      const handlePause = () => { setIsPaused(true); };
      const handleResume = () => {
        if (!isDragging) {
          setTimeout(() => setIsPaused(false), 3000);
        }
      };

      const goToPrev = () => {
        if (slideWidth === 0) return;
        setIsPaused(true);
        setOffset(prev => Math.max(prev - slideWidth, 0));
        setTimeout(() => setIsPaused(false), 3000);
      };
      const goToNext = () => {
        if (slideWidth === 0) return;
        setIsPaused(true);
        setOffset(prev => {
          let newOffset = prev + slideWidth;
          if (newOffset >= oneSetWidth) newOffset = newOffset - oneSetWidth;
          return newOffset;
        });
        setTimeout(() => setIsPaused(false), 3000);
      };

      if (activePromos.length === 0) return null;

      return (
        <div className="max-w-7xl mx-auto px-4 py-4 relative">
          <div className="flex items-center gap-3 mb-4">
            <span className="brand-z brand-z-sm">Z</span>
            <h2 className="text-xl font-bold text-white">📺 Trending Now</h2>
            <span className="text-white/30 text-xs ml-2">What's hot</span>
          </div>
          <div className={`carousel-container ${isPaused ? 'paused' : ''}`} ref={containerRef} onMouseEnter={handlePause} onMouseLeave={handleResume} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} onMouseDown={onMouseDown} style={{ touchAction: 'none' }}>
            <div className="carousel-track" ref={trackRef} style={{ transform: `translateX(-${offset}px)`, transition: isDragging ? 'none' : 'none', gap: `${gap}px` }}>
              {repeatedItems.map((promo, idx) => (
                <div key={promo.id + '-' + idx} className="carousel-slide" style={{ width: slideWidth }}>
                  <div className="promo-card">
                    <div className="promo-corner">Z</div>
                    <div className="promo-badge"><i className="fas fa-bolt mr-1"></i> Trending</div>
                    <div className="promo-icon-top"><i className="fas fa-film"></i></div>
                    <div className="promo-image-wrapper">
                      {promo.image ? (
                        <img src={promo.image} alt={promo.heading || 'Promotion'} className="promo-image" />
                      ) : (
                        <div className="promo-empty">
                          <i className="fas fa-image"></i>
                          <span>No image</span>
                        </div>
                      )}
                    </div>
                    <div className="promo-heading">{promo.heading || 'Promotion'}</div>
                  </div>
                </div>
              ))}
            </div>
            {totalItems > itemsPerView && (
              <>
                <button className="carousel-btn prev" onClick={goToPrev}><i className="fas fa-chevron-left"></i></button>
                <button className="carousel-btn next" onClick={goToNext}><i className="fas fa-chevron-right"></i></button>
                <div className="carousel-dots">
                  {Array.from({ length: Math.ceil(totalItems / itemsPerView) }).map((_, idx) => (
                    <button key={idx} className={`carousel-dot ${idx === Math.floor(offset / slideWidth) ? 'active' : ''}`} onClick={() => {
                      setIsPaused(true);
                      setOffset(idx * slideWidth);
                      setTimeout(() => setIsPaused(false), 3000);
                    }} />
                  ))}
                </div>
              </>
            )}
          </div>

    function HelpSection({ customFaqs, onAction }) {
      const [search, setSearch] = useState('');
      const [openId, setOpenId] = useState(null);

      const allFaqs = useMemo(() => {
        return [...DEFAULT_FAQS, ...(customFaqs || []).map(f => ({ ...f, isCustom: true }))];
      }, [customFaqs]);

      const filtered = useMemo(() => {
        const term = search.trim().toLowerCase();
        if (!term) return allFaqs;
        return allFaqs.filter(f =>
          f.question.toLowerCase().includes(term) || f.answer.toLowerCase().includes(term)
        );
      }, [allFaqs, search]);

      const grouped = useMemo(() => {
        const g = {};
        filtered.forEach(f => {
          const cat = f.category || 'General';
          if (!g[cat]) g[cat] = [];
          g[cat].push(f);
        });
        return g;
      }, [filtered]);

      const toggle = (id) => setOpenId(prev => prev === id ? null : id);

      return (
        <div className="max-w-3xl mx-auto">
          <div className="mb-8">
            <input
              type="text"
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              className="input-neon w-full"
              placeholder="Search for a question... (e.g. password, OTP, credits)"
            />
          </div>
          {Object.keys(grouped).length === 0 ? (
            <div className="text-center py-8 text-white/30"><i className="fas fa-question-circle text-4xl mb-3 block"></i> No questions match "{search}".</div>
          ) : (
            Object.entries(grouped).map(([category, items]) => (
              <div key={category} className="mb-8">
                <h3 className="text-white/40 text-xs font-semibold tracking-wider uppercase mb-3">{category}</h3>
                <div className="space-y-3">
                  {items.map(item => (
                    <div key={item.id} className="rounded-2xl border border-white/10 bg-white/5 overflow-hidden">
                      <button onClick={() => toggle(item.id)} className="w-full flex items-center justify-between text-left px-5 py-4 hover:bg-white/5 transition">
                        <span className="text-white font-medium pr-4">{item.question}</span>
                        <i className={`fas fa-chevron-down text-red-400 flex-shrink-0 transition-transform ${openId === item.id ? 'rotate-180' : ''}`}></i>
                      </button>
                      {openId === item.id && (
                        <div className="px-5 pb-5 pt-1 border-t border-white/5">
                          <p className="text-white/60 text-sm leading-relaxed">{item.answer}</p>
                          {item.action && (
                            <button onClick={() => onAction(item.action.type)} className="btn-neon-outline text-xs mt-4">
                              {item.action.label} <i className="fas fa-arrow-right ml-2"></i>
                            </button>
                          )}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            ))
          )}
        </div>

    // ─── ADMIN DASHBOARD ──────────────────────────────────────
    function AdminDashboard({ subscriptions, setSubscriptions, onLogout, onBack, deals, setDeals, promotions, setPromotions }) {
      const [activeTab, setActiveTab] = useState('overview');
      const [showAddSub, setShowAddSub] = useState(false);
      const [showEditSub, setShowEditSub] = useState(null);
      const [showAddAccount, setShowAddAccount] = useState(null);

      const [newSubSelling, setNewSubSelling] = useState(0);
      const [newSubSlots, setNewSubSlots] = useState(1);
      const [newSubAskFor, setNewSubAskFor] = useState(['name', 'number']);
      const [newSubDescription, setNewSubDescription] = useState('');
      const [newSubImportantNote, setNewSubImportantNote] = useState('');
      const [newSubLogo, setNewSubLogo] = useState('');
      const [editingCustomer, setEditingCustomer] = useState(null);
      const [editForm, setEditForm] = useState({ name: '', username: '', password: '', whatsapp: '', expiryDate: '' });
      const [showAdminSettings, setShowAdminSettings] = useState(false);
      const [newAdminPassword, setNewAdminPassword] = useState('');
      const [confirmAdminPassword, setConfirmAdminPassword] = useState('');
      const [otpList, setOtpList] = useState([]);
      const [usersList, setUsersList] = useState([]);
      const [waitingList, setWaitingList] = useState([]);
      const [faqsList, setFaqsList] = useState([]);
      const [newFaqQuestion, setNewFaqQuestion] = useState('');
      const [newFaqAnswer, setNewFaqAnswer] = useState('');
      const [newFaqCategory, setNewFaqCategory] = useState('General');
      // Section-specific search (filters the already-loaded Customers /
      // Users tables). Search only applies once the button is clicked or
      // Enter is pressed — typing alone doesn't filter, to match a real
      // "search" action rather than live-filtering as you type.
      const [customerSearchInput, setCustomerSearchInput] = useState('');
      const [customerSearch, setCustomerSearch] = useState('');
      const [userSearchInput, setUserSearchInput] = useState('');
      const [userSearch, setUserSearch] = useState('');
      // General search: looks across registered users, every subscription's
      // customer records, and the waiting-customers list all at once — for
      // when you only know a little about the customer (e.g. just a number).
      const [globalSearchInput, setGlobalSearchInput] = useState('');
      const [globalSearchTerm, setGlobalSearchTerm] = useState('');
      const [globalSearchResults, setGlobalSearchResults] = useState(null);
      const [globalSearching, setGlobalSearching] = useState(false);
      const [addCreditsAmount, setAddCreditsAmount] = useState(0);
      const [deductCreditsAmount, setDeductCreditsAmount] = useState(0);
      const [selectedUserForCredits, setSelectedUserForCredits] = useState(null);
      const [editingUser, setEditingUser] = useState(null);
      const [userEditForm, setUserEditForm] = useState({ username: '', password: '', whatsapp: '' });
      const [showAddUserModal, setShowAddUserModal] = useState(false);
      const [addUserForm, setAddUserForm] = useState({ username: '', password: '', whatsapp: '', credits: 50 });
      const [addUserLoading, setAddUserLoading] = useState(false);
      const [viewingCreds, setViewingCreds] = useState(null);
      const [credsLoading, setCredsLoading] = useState(false);
      const [grantModalUser, setGrantModalUser] = useState(null);
      const [grantForm, setGrantForm] = useState({ subscriptionId: '', name: '', whatsapp: '', screens: 1, durationType: 'months', months: 1, days: 30 });
      const [grantLoading, setGrantLoading] = useState(false);
      const [showDealModal, setShowDealModal] = useState(false);
      const [editingDeal, setEditingDeal] = useState(null);
      const [dealForm, setDealForm] = useState({ id: '', subscriptionIds: [], title: '', description: '', actualPrice: '', discountPrice: '', active: true });
      const [incomeData, setIncomeData] = useState(null);
      const [incomePeriod, setIncomePeriod] = useState('all');
      const [incomeCustomStart, setIncomeCustomStart] = useState('');
      const [incomeCustomEnd, setIncomeCustomEnd] = useState('');
      const [incomeLoading, setIncomeLoading] = useState(false);
      const { addToast, adminPassword, setAdminPassword } = useContext(AppContext);
      const { user, setUser, refreshUser } = useContext(UserContext);

      // ─── Promotions state ────────────────────────────────────────
      const [showPromoModal, setShowPromoModal] = useState(false);
      const [editingPromo, setEditingPromo] = useState(null);
      const [promoForm, setPromoForm] = useState({ id: '', heading: '', image: '', active: true });
      const [promoImageFile, setPromoImageFile] = useState(null);
      const [promoImagePreview, setPromoImagePreview] = useState('');

      const [editingAccount, setEditingAccount] = useState(null);
      const [editingScreen, setEditingScreen] = useState(null);
      const [editAccountForm, setEditAccountForm] = useState({ email: '', password: '' });
      const [editScreenForm, setEditScreenForm] = useState({ name: '', pin: '' });
      const [newAccount, setNewAccount] = useState({ email: '', password: '', screens: [{ name: 'Screen 1', pin: '' }], subscriptionId: '' });

      // ─── Notification badges (new registrations / new purchases) ──
      // "Seen" timestamps are stored in localStorage so the badge only
      // counts things that happened since the admin last opened that tab.
      // First time ever running, we start the clock from "now" so old,
      // already-known users/customers don't all show up as unseen.
      const [seenUsersAt, setSeenUsersAt] = useState(() => {
        let v = localStorage.getItem('adminSeenUsersAt');
        if (!v) { v = new Date().toISOString(); localStorage.setItem('adminSeenUsersAt', v); }
        return v;
      });
      const [seenCustomersAt, setSeenCustomersAt] = useState(() => {
        let v = localStorage.getItem('adminSeenCustomersAt');
        if (!v) { v = new Date().toISOString(); localStorage.setItem('adminSeenCustomersAt', v); }
        return v;
      });

      const markUsersSeen = () => {
        const now = new Date().toISOString();
        localStorage.setItem('adminSeenUsersAt', now);
        setSeenUsersAt(now);
      };
      const markCustomersSeen = () => {
        const now = new Date().toISOString();
        localStorage.setItem('adminSeenCustomersAt', now);
        setSeenCustomersAt(now);
      };

      // Keep the registered-users list live (not just when the Users tab is
      // open) so the notification count updates automatically in the
      // background, in step with the rest of the app's live refresh.
      useEffect(() => {
        loadUsers();
        const t = setInterval(loadUsers, 8000);
        return () => clearInterval(t);
      }, []);

      const unseenUsersCount = useMemo(() => {
        return (usersList || []).filter(u => u.createdAt && new Date(u.createdAt) > new Date(seenUsersAt)).length;
      }, [usersList, seenUsersAt]);

      // Customer purchase records live inside `subscriptions` (already kept
      // live by the app's background polling), so no extra fetching is
      // needed to know about new purchases.
      const allCustomerRecords = useMemo(() => {
        const list = [];
        (subscriptions || []).forEach(sub => (sub.accounts || []).forEach(acc => (acc.screens || []).forEach(scr => (scr.customers || []).forEach(c => list.push(c)))));
        return list;
      }, [subscriptions]);

      const unseenCustomersCount = useMemo(() => {
        return allCustomerRecords.filter(c => c.purchasedAt && new Date(c.purchasedAt) > new Date(seenCustomersAt)).length;
      }, [allCustomerRecords, seenCustomersAt]);

      // ─── Load functions ──────────────────────────────────────────
      const loadOTPs = async () => {
        try {
          const data = await fetchOTPList();
          setOtpList(data);
        } catch (err) { console.error(err); }
      };

      const loadUsers = async () => {
        try {
          const data = await fetchAllUsers();
          setUsersList(data);
        } catch (err) { console.error(err); }
      };

      const loadWaiting = async () => {
        try {
          const data = await fetchWaitingList();
          setWaitingList(data);
        } catch (err) { console.error(err); }
      };

      const handleFulfillWaiting = async (id) => {
        try {
          await removeWaitingCustomer(id);
          setWaitingList(prev => prev.filter(w => w.id !== id));
          addToast('Marked as fulfilled and removed from the waiting list.', 'success');
        } catch (err) {
          addToast('Failed to update waiting list', 'error');
        }
      };

      const loadFaqs = async () => {
        try {
          const data = await fetchFaqs();
          setFaqsList(data);
        } catch (err) { console.error(err); }
      };

      const handleAddFaq = async () => {
        if (!newFaqQuestion.trim() || !newFaqAnswer.trim()) {
          addToast('Please fill in both the question and the answer', 'error');
          return;
        }
        try {
          const entry = await addFaq({
            question: newFaqQuestion.trim(),
            answer: newFaqAnswer.trim(),
            category: newFaqCategory.trim() || 'General'
          });
          setFaqsList(prev => [...prev, entry]);
          setNewFaqQuestion('');
          setNewFaqAnswer('');
          setNewFaqCategory('General');
          addToast('Question added to Help & FAQs.', 'success');
        } catch (err) {
          addToast('Failed to add question: ' + (err?.error || 'unknown error'), 'error');
        }
      };

      const handleDeleteFaq = async (id) => {
        try {
          await deleteFaq(id);
          setFaqsList(prev => prev.filter(f => f.id !== id));
          addToast('Question removed.', 'success');
        } catch (err) {
          addToast('Failed to remove question', 'error');
        }
      };

      // Searches everything at once: registered accounts, every
      // subscription's active customer records, and the waiting-customers
      // list — so admin only needs one piece of info (name, username, or
      // number) to find out everything about a customer.
      const handleGlobalSearch = async () => {
        const term = globalSearchInput.trim();
        if (!term) {
          addToast('Enter a name, username, or WhatsApp number to search', 'error');
          return;
        }
        setGlobalSearchTerm(term);
        setGlobalSearching(true);
        try {
          const [freshUsers, freshWaiting] = await Promise.all([
            fetchAllUsers().catch(() => usersList),
            fetchWaitingList().catch(() => waitingList)
          ]);
          setUsersList(freshUsers);
          setWaitingList(freshWaiting);

          const userMatches = freshUsers.filter(u =>
            matchesSearch([u.username, u.whatsapp], term)
          );

          const subscriptionMatches = [];
          subscriptions.forEach(sub => {
            getCustomerRecords(sub).forEach(r => {
              if (matchesSearch([r.customer?.name, r.customer?.username, r.customer?.whatsapp, r.customer?.email], term)) {
                subscriptionMatches.push({ sub, record: r });
              }
            });
          });

          const waitingMatches = freshWaiting.filter(w =>
            matchesSearch([w.name, w.username, w.whatsapp, w.subscriptionName], term)
          );

          setGlobalSearchResults({ userMatches, subscriptionMatches, waitingMatches });
        } catch (err) {
          console.error('Global search failed:', err);
          addToast('Search failed. Please try again.', 'error');
        } finally {
          setGlobalSearching(false);
        }
      };

      const loadIncome = async (period = 'all', customStart, customEnd) => {
        setIncomeLoading(true);
        try {
          const data = await fetchIncome(period, customStart, customEnd);
          setIncomeData(data);
        } catch (err) {
          addToast('Failed to load income data', 'error');
        } finally {
          setIncomeLoading(false);
        }
      };

      const loadPromotions = async () => {
        try {
          const data = await fetchPromotions();
          setPromotions(data);
        } catch (err) { console.error(err); }
      };

      const loadDeals = async () => {
        try {
          const data = await fetchDeals();
          setDeals(data);
        } catch (err) { console.error(err); }
      };

      useEffect(() => {
        if (activeTab === 'otp') {
          loadOTPs();
          const interval = setInterval(loadOTPs, 10000);
          return () => clearInterval(interval);
        }
        if (activeTab === 'users') loadUsers();
        if (activeTab === 'deals') loadDeals();
        if (activeTab === 'promotions') loadPromotions();
        if (activeTab === 'waiting') loadWaiting();
        if (activeTab === 'faqs') loadFaqs();
        if (activeTab === 'overview' || activeTab === 'income') {
          if (incomePeriod !== 'custom') loadIncome(incomePeriod);
        }
      }, [activeTab, incomePeriod]);

      useEffect(() => {
        loadWaiting();
      }, []);

      const refreshData = async () => {
        try {
          const fresh = await fetchSubscriptions();
          setSubscriptions(fresh);
          await loadUsers();
          await loadDeals();
          await loadIncome(incomePeriod, incomeCustomStart, incomeCustomEnd);
          await loadPromotions();
          addToast('Data refreshed!', 'success');
        } catch (err) {
          addToast('Failed to refresh data', 'error');
        }
      };

      // ─── Subscription CRUD ──────────────────────────────────────
      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          setNewSubLogo(ev.target.result);
        };
        reader.readAsDataURL(file);
      };

      const resetAddForm = () => {
        setNewSubName('');
        setNewSubCost(0);
        setNewSubSelling(0);
        setNewSubSlots(1);
        setNewSubAskFor(['name', 'number']);
        setNewSubDescription('');
        setNewSubImportantNote('');
        setNewSubLogo('');
        setShowAddSub(false);
        setShowEditSub(null);
      };

      const handleAddSubscription = async () => {
        if (!newSubName.trim()) { addToast('Enter subscription name', 'error'); return; }
        const newSub = {
          id: Date.now().toString(),
          name: newSubName.trim(),
          type: newSubType,
          costPerMonth: newSubCost || 0,
          sellingPrice: newSubSelling || 0,
          slots: newSubSlots || 0,
          askFor: newSubAskFor,
          description: newSubDescription.trim(),
          importantNote: newSubImportantNote.trim(),
          logo: newSubLogo || '',
          accounts: [],
          createdAt: new Date().toISOString()
        };
        try {
          const result = await createSubscription(newSub);
          setSubscriptions(prev => [...prev, result]);
          resetAddForm();
          await refreshData();
          addToast(`Added ${newSub.name}!`, 'success');
        } catch (err) {
          addToast('Failed to add subscription', 'error');
        }
      };

      const openEditSub = (sub) => {
        setShowEditSub(sub);
        setNewSubName(sub.name);
        setNewSubType(sub.type);
        setNewSubCost(sub.costPerMonth || 0);
        setNewSubSelling(sub.sellingPrice || 0);
        setNewSubSlots(sub.slots || 1);
        setNewSubAskFor(sub.askFor || ['name', 'number']);
        setNewSubDescription(sub.description || '');
        setNewSubImportantNote(sub.importantNote || '');
        setNewSubLogo(sub.logo || '');
        setShowAddSub(true);
      };

      const handleUpdateSubscription = async () => {
        if (!showEditSub) return;
        const updated = {
          name: newSubName.trim(),
          type: newSubType,
          costPerMonth: newSubCost || 0,
          sellingPrice: newSubSelling || 0,
          slots: newSubSlots || 0,
          askFor: newSubAskFor,
          description: newSubDescription.trim(),
          importantNote: newSubImportantNote.trim(),
          logo: newSubLogo || '',
        };
        try {
          const result = await updateSubscription(showEditSub.id, updated);
          setSubscriptions(prev => prev.map(s => s.id === showEditSub.id ? result : s));
          resetAddForm();
          setShowEditSub(null);
          await refreshData();
          addToast('Subscription updated!', 'success');
        } catch (err) {
          addToast('Failed to update subscription', 'error');
        }
      };

      // ─── Admin helpers ──────────────────────────────────────────
      const handleAddCredits = async (username) => {
        if (!addCreditsAmount || addCreditsAmount <= 0) {
          addToast('Enter a valid amount', 'error');
          return;
        }
        try {
          const updated = await addCredits(username, addCreditsAmount);
          if (updated) {
            addToast(`Added ${addCreditsAmount} credits to ${username}`, 'success');
            setAddCreditsAmount(0);
            setSelectedUserForCredits(null);
            await loadUsers();
            if (user && user.username === username) {
              await refreshUser();
            }
          }
        } catch (err) {
          addToast('Failed to add credits', 'error');
        }
      };

      const handleDeductCredits = async (username) => {
        if (!deductCreditsAmount || deductCreditsAmount <= 0) {
          addToast('Enter a valid amount', 'error');
          return;
        }
        try {
          const updated = await deductCredits(username, deductCreditsAmount);
          if (updated) {
            addToast(`Deducted ${deductCreditsAmount} credits from ${username}`, 'success');
            setDeductCreditsAmount(0);
            setSelectedUserForCredits(null);
            await loadUsers();
            if (user && user.username === username) {
              await refreshUser();
            }
          }
        } catch (err) {
          addToast('Failed to deduct credits: ' + err.error, 'error');
        }
      };

      const handleDeleteUser = async (username) => {
        if (!window.confirm(`Delete the account "${username}"? This only removes their login — any subscriptions already granted to them stay untouched.`)) return;
        try {

      // Manually grants a subscription to a user's portal — picks the best available
      // screen the same way the customer-facing purchase flows do, then saves it with
      // the same atomic allocate endpoint (so it can't clobber anyone else's data).
      const saveGrant = async () => {
        if (!grantModalUser) return;
        const sub = subscriptions.find(s => s.id === grantForm.subscriptionId);
        if (!sub) { addToast('Pick a subscription', 'error'); return; }
        if (!grantForm.whatsapp.trim()) { addToast('WhatsApp number is required', 'error'); return; }

        setGrantLoading(true);
        try {
          let allocations = [];
          if (sub.type === 'netflix') {
            const availableSlots = [];
            sub.accounts.forEach(acc => (acc.screens || []).forEach(screen => {
              const used = screen.customers?.length || 0;
              if (used < 3) availableSlots.push({ account: acc, screen, used });
            }));
            const result = allocateScreens(availableSlots, grantForm.screens || 1, grantModalUser, grantForm.whatsapp.trim(), null);
            if (!result || result.error) { addToast('No screens available for this subscription right now.', 'error'); setGrantLoading(false); return; }
            allocations = result;
          } else if (sub.type === 'amazon') {
            const availableSlots = [];
            sub.accounts.forEach(acc => (acc.screens || []).forEach(screen => availableSlots.push({ account: acc, screen, used: 0 })));
            const slot = allocateAmazonScreen(availableSlots, grantModalUser, grantForm.whatsapp.trim(), 0);
            if (!slot) { addToast('No slots available for this subscription right now.', 'error'); setGrantLoading(false); return; }
            allocations = [slot];
          } else {
            const allocation = allocateSimpleScreen(sub, grantModalUser, grantForm.whatsapp.trim());
            if (!allocation) { addToast('No slots available for this subscription right now.', 'error'); setGrantLoading(false); return; }
            allocations = [allocation];
          }

          const now = new Date();
          const totalDays = grantForm.durationType === 'months' ? (grantForm.months || 1) * 30 : (grantForm.days || 30);
          const expiry = new Date(now);
          expiry.setDate(expiry.getDate() + totalDays);
          const customerPayload = {
            name: grantForm.name.trim(),
            username: grantModalUser,
            password: '',
            whatsapp: grantForm.whatsapp.trim(),
            expiryDate: expiry.toISOString().split('T')[0],
            months: grantForm.durationType === 'months' ? (grantForm.months || 1) : 0,
            days: totalDays,
            screens: grantForm.screens || 1,
            email: '',
            purchasedAt: now.toISOString()
          };

          for (const slot of allocations) {
            await allocateCustomer(sub.id, slot.account.id, slot.screen.id, customerPayload);
          }

          await refreshData();
          addToast(`Subscription granted to ${grantModalUser}.`, 'success');
          closeGrantModal();
        } catch (err) {
          console.error(err);
          addToast(err.message || 'Failed to grant subscription', 'error');
        } finally {
          setGrantLoading(false);
        }
      };

      const matchesSearch = (fields, term) => {

                  accountId: acc.id,
                  screenId: screen.id,
                  customerIdx: idx,
                  months: c.months || 0,
                  days: c.days || 0,
                  name: c.name || c.username,
                  whatsapp: c.whatsapp,
                  purchasedAt: c.purchasedAt || null
                });

          });

        return records;

      const checkExpiry = (dateStr) => {

        const now = new Date();
        const expiry = new Date(dateStr);
        const diff = Math.ceil((expiry - now) / (1000 * 60 * 60 * 24));
        if (diff < 0) return 'expired';
        if (diff === 0) return 'today';
        if (diff === 1) return 'tomorrow';
        if (diff <= 3) return 'soon';
        return 'active';
      };

      const getExpiringSoon = () => {

        today.setHours(0, 0, 0, 0);
        const results = [];
        subscriptions.forEach(sub => {
          sub.accounts.forEach(acc => {
            acc.screens.forEach(screen => {

                  if (c.expiryDate) {
                    const exp = new Date(c.expiryDate);
                    exp.setHours(0, 0, 0, 0);

                        username: c.username,

    // ─── MAIN APP ──────────────────────────────────────────────
    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [showSubscriptions, setShowSubscriptions] = useState(false);
      const [selectedSubscription, setSelectedSubscription] = useState(null);
      const [subscriptions, setSubscriptions] = useState([]);
      const [deals, setDeals] = useState([]);
      const [promotions, setPromotions] = useState([]);
      const [customFaqs, setCustomFaqs] = useState([]);
      const [isAdmin, setIsAdmin] = useState(false);
      const [customerData, setCustomerData] = useState(null);
      const [flowStep, setFlowStep] = useState('welcome');
      const [flowType, setFlowType] = useState(null);
      const [showAuth, setShowAuth] = useState(false);
      const [selectedDeal, setSelectedDeal] = useState(null);
      const [loadingData, setLoadingData] = useState(true);
      const { addToast } = useContext(AppContext);
      const { user, setUser, refreshUser } = useContext(UserContext);

      useEffect(() => {
        const loadData = async (silent = false) => {
          try {
            const [subs, dealsData, promos, faqsData] = await Promise.all([fetchSubscriptions(), fetchDeals(), fetchPromotions(), fetchFaqs().catch(() => [])]);
            setSubscriptions(subs);
            setDeals(dealsData);
            setPromotions(promos);
            setCustomFaqs(faqsData);
          } catch (err) {
            console.error('Failed to load data', err);
            if (!silent) addToast('Could not load data. Is the backend running?', 'error');
          } finally {
            if (!silent) setLoadingData(false);
          }
        };
        loadData();

        // Poll quietly in the background so changes made in the admin
        // portal (even from a different browser/device) appear here
        // automatically, without the customer needing to refresh the page.
        const pollInterval = setInterval(() => loadData(true), 8000);

        // Also refresh immediately whenever the tab regains focus, so
        // switching back to it feels instant rather than waiting for the
        // next poll tick.
        const onVisible = () => { if (document.visibilityState === 'visible') loadData(true); };
        document.addEventListener('visibilitychange', onVisible);

        return () => {
          clearInterval(pollInterval);
          document.removeEventListener('visibilitychange', onVisible);
        };
      }, []);

      // ─── URL ROUTING ──────────────────────────────────────────
      // Maps a browser path (e.g. /subscriptions, /admin) to the app's internal tab state.
      const applyRouteFromPath = (pathname) => {
        const path = (pathname || '/').replace(/\/+$/, '').toLowerCase() || '/';
        if (path === '/' ) {
          setActiveTab('home');
          setShowSubscriptions(false);
        } else if (path === '/subscriptions' || path === '/subscription') {
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
        } else if (path === '/help') {
          setActiveTab('help');
          setShowSubscriptions(false);
        } else if (path === '/contact') {
          setActiveTab('contact');
          setShowSubscriptions(false);
        } else if (path === '/social') {
          setActiveTab('social');
          setShowSubscriptions(false);

                for (let c of screen.customers) {
                  if (c.username === username) {

                      password: c.password,
                      whatsapp: c.whatsapp,
                      expiryDate: c.expiryDate,
                      screens: c.screens || 1,

                      days: c.days || 0,
                      subscriptionName: sub.name,
                      accountEmail: acc.email,
                      accountPassword: acc.password || '••••••••',

                      screenPin: screen.pin || 'N/A',
                      subscriptionId: sub.id,
                      accountId: acc.id,
                      screenId: screen.id,
                      email: c.email || '',
                      purchasedAt: c.purchasedAt || null

      const handleSubComplete = async (data) => {
        const customerPayload = {
          name: data.name || '',
          username: data.username,
          password: data.password,
          whatsapp: data.whatsapp,
          expiryDate: data.expiryDate,
          months: data.months || 0,
          days: data.days || 0,
          screens: data.screens || 1,
          email: data.email || '',
          purchasedAt: data.purchasedAt || new Date().toISOString()
        };

        // Build the list of things that need to go to the admin's Waiting
        // Customers list: either the whole purchase (data.isWaiting, from
        // Netflix/Amazon/Simple flows with no account available) or just
        // part of a deal (data.waitingSubs, when some — not all — of the
        // deal's subscriptions had no account available).
        const waitingEntries = [];
        if (data.isWaiting) {
          waitingEntries.push({
            subscriptionId: data.subscriptionId || null,
            subscriptionName: data.subscriptionName || data.customName || 'Subscription',
            months: data.months || 1
          });
        }
        if (data.waitingSubs && data.waitingSubs.length > 0) {
          data.waitingSubs.forEach(ws => {
            waitingEntries.push({ subscriptionId: ws.id, subscriptionName: ws.name, months: 1 });
          });
        }

        try {
          const allocations = (data.allocated && data.allocated.length > 0) ? data.allocated : [];

          if (allocations.length === 0 && waitingEntries.length === 0) {
            throw new Error('No screen was allocated for this purchase.');
          }

          // Each allocation is saved with a targeted, atomic update (only touches that
          // exact account/screen) instead of overwriting the whole subscription document.
          // This is what used to cause other customers' purchase details to vanish.
          for (const allot of allocations) {
            const subIdForAllot = allot.subscriptionId || data.subscriptionId;
            await allocateCustomer(subIdForAllot, allot.accountId, allot.screenId, customerPayload);
          }

          for (const entry of waitingEntries) {

              subscriptionId: entry.subscriptionId,
              subscriptionName: entry.subscriptionName,
              isCustomRequest: false,
              name: data.name || '',
              username: data.username,
              whatsapp: data.whatsapp,
              months: entry.months,
              email: data.email || '',
              paidWithCredits: !!data.paidWithCredits,
              purchasedAt: data.purchasedAt || new Date().toISOString()

          const fresh = await fetchSubscriptions();

          if (waitingEntries.length > 0) {
            addToast('✅ Payment received! This subscription will be added to your portal soon — contact admin for updates.', 'success');

          if (user && allocations.length > 0) {

            setCustomerData(found);
            setFlowStep('customer-dash');
            navigateTo('/subscriptions');
          }

                <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" className="social-link-card"><span className="social-icon"><i className="fab fa-twitter text-blue-400"></i></span><div><div className="social-name">Twitter</div><div className="social-handle">Latest news</div></div><span className="social-arrow"><i className="fas fa-arrow-right"></i></span></a>
                <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" className="social-link-card"><span className="social-icon"><i className="fab fa-linkedin-in text-blue-600"></i></span><div><div className="social-name">LinkedIn</div><div className="social-handle">Professional network</div></div><span className="social-arrow"><i className="fas fa-arrow-right"></i></span></a>
                <a href="https://wa.me/923079163485" target="_blank" rel="noopener noreferrer" className="social-link-card"><span className="social-icon"><i className="fab fa-whatsapp text-green-500"></i></span><div><div className="social-name">WhatsApp</div><div className="social-handle">Chat with us directly</div></div><span className="social-arrow"><i className="fas fa-arrow-right"></i></span></a>
              </div>
            </section>
          )}

          {activeTab === 'admin' && (
            <section id="admin-section" className="px-4 max-w-7xl mx-auto py-12">
              {!isAdmin ? <AdminLogin onLogin={() => setIsAdmin(true)} /> : <AdminDashboard subscriptions={subscriptions} setSubscriptions={setSubscriptions} onLogout={() => { setIsAdmin(false); navigateTo('/'); }} onBack={() => navigateTo('/')} deals={deals} setDeals={setDeals} promotions={promotions} setPromotions={setPromotions} />}
            </section>
          )}

          {activeTab !== 'home' && activeTab !== 'subscriptions' && activeTab !== 'contact' && activeTab !== 'social' && activeTab !== 'admin' && <Footer />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AppProvider>
        <App />
      </AppProvider>
    );
  </script>
</body>
</html>

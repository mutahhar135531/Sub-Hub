    // ─── ADMIN LOGIN ─────────────────────────────────────
    function AdminLogin({ onLogin }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const { addToast } = useContext(AppContext);

      // "Forgot password" recovery flow — verified entirely server-side
      // against the stored recovery number, so it works even if this
      // browser's password got out of sync or was never known.
      const [showRecover, setShowRecover] = useState(false);
      const [recoverNumber, setRecoverNumber] = useState('');
      const [recoverNewPassword, setRecoverNewPassword] = useState('');
      const [recoverConfirmPassword, setRecoverConfirmPassword] = useState('');
      const [recoverLoading, setRecoverLoading] = useState(false);

      // The password is checked on the server (POST /api/admin/login) and
      // only a yes/no comes back — the real admin password is never sent to
      // the browser, so it can't be read from the Network tab.
      const handleSubmit = async () => {
        if (!password) { setError('Enter password'); return; }
        setLoading(true);
        try {
          const result = await loginAdmin(password);
          if (result.success) {
            setError('');
            onLogin();
            addToast('Welcome Admin!', 'success');
          } else {
            setError('Invalid password');
            addToast('Invalid password', 'error');
          }
        } catch (err) {
          setError('Login failed. Please try again.');
          addToast('Login failed. Please try again.', 'error');
        } finally {
          setLoading(false);
        }
      };

      const handleRecover = async () => {
        if (!/^\d{4,8}$/.test(recoverNumber.trim())) {
          addToast('Enter your recovery number', 'error');
          return;
        }
        if (!recoverNewPassword.trim() || recoverNewPassword.trim().length < 4) {
          addToast('New password must be at least 4 characters', 'error');
          return;
        }
        if (recoverNewPassword !== recoverConfirmPassword) {
          addToast('Passwords do not match', 'error');
          return;
        }
        setRecoverLoading(true);
        try {
          await recoverAdminPassword(recoverNumber.trim(), recoverNewPassword.trim());
          addToast('Password reset! You can log in now.', 'success');
          setShowRecover(false);
          setRecoverNumber('');
          setRecoverNewPassword('');
          setRecoverConfirmPassword('');
          setPassword('');
        } catch (err) {
          addToast(err?.error || 'Recovery failed', 'error');
        } finally {
          setRecoverLoading(false);
        }
      };

      if (showRecover) {
        return (
          <div className="glass-panel max-w-sm mx-auto">
            <div className="text-center mb-6">
              <i className="fas fa-key text-5xl text-yellow-400 neon-text"></i>
              <h2 className="text-2xl font-bold text-white mt-3">Recover Password</h2>
              <p className="text-white/40 text-sm">Enter your recovery number to set a new password.</p>
            </div>
            <div className="space-y-3">
              <div><label className="text-white/50 text-sm">Recovery Number</label>
                <input type="text" inputMode="numeric" value={recoverNumber} onChange={(e) => setRecoverNumber(e.target.value.replace(/\D/g, ''))} maxLength={8} className="input-neon mt-1" placeholder="6-digit recovery number" />
              </div>
              <div><label className="text-white/50 text-sm">New Password</label>

    // ─── PROMOTIONS CAROUSEL ──────────────────────────────────
    function PromotionsCarousel({ promotions }) {
      const [itemsPerView, setItemsPerView] = useState(5);
      const [offset, setOffset] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const [containerWidth, setContainerWidth] = useState(0);
      const containerRef = useRef(null);
      const trackRef = useRef(null);
      const animationRef = useRef(null);
      const speed = 35;

      const [isDragging, setIsDragging] = useState(false);
      const [dragStartX, setDragStartX] = useState(0);
      const [dragOffsetStart, setDragOffsetStart] = useState(0);
      const [dragVelocity, setDragVelocity] = useState(0);
      const lastMoveTime = useRef(0);
      const lastMoveX = useRef(0);
      const momentumId = useRef(null);
      // Tracks the very first touch point and, once enough movement has
      // happened, whether the gesture is a horizontal carousel swipe or a
      // vertical page scroll — so a swipe that starts on the carousel but
      // moves mostly up/down is handed straight to the browser instead of
      // being swallowed by the drag handler.
      const touchStartX = useRef(0);
      const touchStartY = useRef(0);
      const touchIntent = useRef(null); // null | 'horizontal' | 'vertical'

      const activePromos = useMemo(() => {
        return promotions.filter(p => p.active !== false);
      }, [promotions]);

      const totalItems = activePromos.length;
      const repeatedItems = useMemo(() => {
        if (totalItems === 0) return [];
        const reps = 3;
        const arr = [];
        for (let i = 0; i < reps; i++) arr.push(...activePromos);
        return arr;
      }, [activePromos, totalItems]);

      const getItemsPerView = () => {
        if (typeof window === 'undefined') return 5;
        const w = window.innerWidth;
        if (w >= 1200) return 5;
        if (w >= 992) return 4;
        if (w >= 768) return 3;
        if (w >= 576) return 2;
        return 1;
      };

      useEffect(() => {
        const handleResize = () => { setItemsPerView(getItemsPerView()); };
        window.addEventListener('resize', handleResize);
        handleResize();
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        if (!containerRef.current) return;
        const measure = () => {
          const width = containerRef.current.getBoundingClientRect().width;
          setContainerWidth(width);
        };
        measure();
        const ro = new ResizeObserver(measure);
        ro.observe(containerRef.current);
        return () => ro.disconnect();
      }, [itemsPerView]);

      const gap = 12;
      const slideWidth = containerWidth > 0 ? (containerWidth / itemsPerView) - gap : 0;
      const oneSetWidth = slideWidth * totalItems + gap * (totalItems - 1);

      useEffect(() => {
        if (isPaused || totalItems === 0 || oneSetWidth === 0 || slideWidth === 0 || isDragging) {
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
            animationRef.current = null;
          }
          return;
        }
        let lastTimestamp = performance.now();
        const animate = (timestamp) => {
          const delta = (timestamp - lastTimestamp) / 1000;
          lastTimestamp = timestamp;
          setOffset(prev => {
            let newOffset = prev + speed * delta;
            if (newOffset >= oneSetWidth) {
              newOffset = newOffset - oneSetWidth;
            }
            return newOffset;
          });
          animationRef.current = requestAnimationFrame(animate);
        };
        animationRef.current = requestAnimationFrame(animate);
        return () => {
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
            animationRef.current = null;
          }
        };
      }, [isPaused, totalItems, oneSetWidth, slideWidth, speed, isDragging]);

      const handleDragStart = (clientX) => {
        setIsDragging(true);
        setIsPaused(true);
        setDragStartX(clientX);
        setDragOffsetStart(offset);
        setDragVelocity(0);
        lastMoveTime.current = Date.now();
        lastMoveX.current = clientX;
        if (momentumId.current) {
          cancelAnimationFrame(momentumId.current);
          momentumId.current = null;
        }
        if (animationRef.current) {
          cancelAnimationFrame(animationRef.current);
          animationRef.current = null;
        }
      };

      const handleDragMove = (clientX) => {
        if (!isDragging) return;
        const diff = clientX - dragStartX;
        let newOffset = dragOffsetStart - diff;
        if (newOffset < 0) newOffset = 0;
        if (newOffset > oneSetWidth) newOffset = oneSetWidth;
        setOffset(newOffset);
        const now = Date.now();
        const dt = now - lastMoveTime.current;
        if (dt > 0) {
          const dx = clientX - lastMoveX.current;
          const vel = dx / dt;
          setDragVelocity(vel);
        }
        lastMoveTime.current = now;
        lastMoveX.current = clientX;
      };

      const handleDragEnd = () => {
        if (!isDragging) return;
        setIsDragging(false);
        const vel = dragVelocity;
        if (Math.abs(vel) > 0.2) {
          let momentumOffset = offset;
          const momentumStep = () => {
            const dt = 16;
            const decay = 0.97;
            let velDecay = vel * decay;
            momentumOffset = momentumOffset - velDecay * dt;
            if (momentumOffset < 0) {
              momentumOffset = 0;
              velDecay = 0;
            } else if (momentumOffset > oneSetWidth) {
              momentumOffset = oneSetWidth;
              velDecay = 0;
            }
            setOffset(momentumOffset);
            if (Math.abs(velDecay) > 0.1 && momentumOffset > 0 && momentumOffset < oneSetWidth) {
              momentumId.current = requestAnimationFrame(momentumStep);
            } else {
              setTimeout(() => { setIsPaused(false); }, 2000);
            }
          };
          momentumId.current = requestAnimationFrame(momentumStep);
        } else {
          setTimeout(() => { setIsPaused(false); }, 2000);
        }
        setDragVelocity(0);
      };

      const onTouchStart = (e) => {
        const touch = e.touches[0];
        touchStartX.current = touch.clientX;
        touchStartY.current = touch.clientY;
        touchIntent.current = null;
      };
      const onTouchMove = (e) => {
        const touch = e.touches[0];
        if (touchIntent.current === null) {
          const dx = touch.clientX - touchStartX.current;
          const dy = touch.clientY - touchStartY.current;
          if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return; // too small to tell yet
          if (Math.abs(dy) > Math.abs(dx)) {
            // Mostly vertical — this is a page scroll, not a carousel swipe.
            // Leave it alone (no preventDefault, no drag) so the browser's
            // native vertical scroll takes over immediately, first try.
            touchIntent.current = 'vertical';
            return;
          }
          // Mostly horizontal — this is a carousel swipe, start dragging from
          // the original touch point (not the current one) so there's no jump.
          touchIntent.current = 'horizontal';
          handleDragStart(touchStartX.current);
        }
        if (touchIntent.current !== 'horizontal') return;
        e.preventDefault();
        handleDragMove(touch.clientX);
      };
      const onTouchEnd = () => {
        if (touchIntent.current === 'horizontal') handleDragEnd();
        touchIntent.current = null;
      };

      const onMouseDown = (e) => {
        if (e.button !== 0) return;
        handleDragStart(e.clientX);
        const onMouseMove = (ev) => handleDragMove(ev.clientX);
        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          handleDragEnd();
        };
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      };

      const handlePause = () => { setIsPaused(true); };
      const handleResume = () => {
        if (!isDragging) {
          setTimeout(() => setIsPaused(false), 3000);
        }
      };

      const goToPrev = () => {
        if (slideWidth === 0) return;
        setIsPaused(true);
        setOffset(prev => Math.max(prev - slideWidth, 0));
        setTimeout(() => setIsPaused(false), 3000);
      };
      const goToNext = () => {
        if (slideWidth === 0) return;
        setIsPaused(true);
        setOffset(prev => {
          let newOffset = prev + slideWidth;
          if (newOffset >= oneSetWidth) newOffset = newOffset - oneSetWidth;
          return newOffset;
        });
        setTimeout(() => setIsPaused(false), 3000);
      };

      if (activePromos.length === 0) return null;

      return (
        <div className="max-w-7xl mx-auto px-4 py-4 relative">
          <div className="flex items-center gap-3 mb-4">
            <span className="brand-z brand-z-sm">Z</span>
            <h2 className="text-xl font-bold text-white">📺 Trending Now</h2>
            <span className="text-white/30 text-xs ml-2">What's hot</span>
          </div>
          <div className={`carousel-container ${isPaused ? 'paused' : ''}`} ref={containerRef} onMouseEnter={handlePause} onMouseLeave={handleResume} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} onMouseDown={onMouseDown} style={{ touchAction: 'pan-y' }}>
            <div className="carousel-track" ref={trackRef} style={{ transform: `translateX(-${offset}px)`, transition: isDragging ? 'none' : 'none', gap: `${gap}px` }}>
              {repeatedItems.map((promo, idx) => (
                <div key={promo.id + '-' + idx} className="carousel-slide" style={{ width: slideWidth }}>
                  <div className="promo-card">
                    <div className="promo-corner">Z</div>
                    <div className="promo-badge"><i className="fas fa-bolt mr-1"></i> Trending</div>
                    <div className="promo-icon-top"><i className="fas fa-film"></i></div>
                    <div className="promo-image-wrapper">
                      {promo.image ? (
                        <img src={promo.image} alt={promo.heading || 'Promotion'} className="promo-image" />
                      ) : (
                        <div className="promo-empty">
                          <i className="fas fa-image"></i>
                          <span>No image</span>
                        </div>
                      )}
                    </div>
                    <div className="promo-heading">{promo.heading || 'Promotion'}</div>
                  </div>
                </div>
              ))}
            </div>
            {totalItems > itemsPerView && (
              <>
                <button className="carousel-btn prev" onClick={goToPrev}><i className="fas fa-chevron-left"></i></button>
                <button className="carousel-btn next" onClick={goToNext}><i className="fas fa-chevron-right"></i></button>
                <div className="carousel-dots">
                  {Array.from({ length: Math.ceil(totalItems / itemsPerView) }).map((_, idx) => (
                    <button key={idx} className={`carousel-dot ${idx === Math.floor(offset / slideWidth) ? 'active' : ''}`} onClick={() => {
                      setIsPaused(true);
                      setOffset(idx * slideWidth);
                      setTimeout(() => setIsPaused(false), 3000);
                    }} />
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

      // How many screens have an expired customer whose PIN hasn't been

      // Uses the same local-midnight, whole-day comparison as
      // screenNeedsReset / the customer portal's activeEntries filter —
      // see the comment on screenNeedsReset for why that matters.
      const expiredScreensCount = useMemo(() => {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        let count = 0;
        (subscriptions || []).forEach(sub => (sub.accounts || []).forEach(acc => (acc.screens || []).forEach(screen => {
          const needsReset = (screen.customers || []).some(c => {
            if (!c.expiryDate) return false;
            const exp = new Date(c.expiryDate);
            if (isNaN(exp.getTime())) return false;
            exp.setHours(0, 0, 0, 0);
            if (exp >= today) return false;
            if (screen.pinResetAt) {
              const resetAt = new Date(screen.pinResetAt);
              resetAt.setHours(0, 0, 0, 0);
              if (resetAt > exp) return false;
            }
            return true;

      const refreshData = async (silent = false) => {

      // Manually grants a subscription to a user's portal — picks the best available
      // screen the same way the customer-facing purchase flows do, then saves it with
      // the same atomic allocate endpoint (so it can't clobber anyone else's data).
      const saveGrant = async () => {
        if (!grantModalUser) return;
        const sub = subscriptions.find(s => s.id === grantForm.subscriptionId);
        if (!sub) { addToast('Pick a subscription', 'error'); return; }
        if (!grantForm.whatsapp.trim()) { addToast('WhatsApp number is required', 'error'); return; }

        setGrantLoading(true);
        try {
          let allocations = [];
          if (sub.type === 'netflix') {
            const availableSlots = [];
            sub.accounts.forEach(acc => (acc.screens || []).forEach(screen => {
              const used = screen.customers?.length || 0;
              if (used < 3) availableSlots.push({ account: acc, screen, used });
            }));
            let result = allocateScreens(availableSlots, grantForm.screens || 1, grantModalUser, grantForm.whatsapp.trim(), null, grantForm.sameAccount);
            if (result.error === 'no_single_account') {
              result = allocateScreens(availableSlots, grantForm.screens || 1, grantModalUser, grantForm.whatsapp.trim(), null, false);
              if (!result.error) addToast('No single account had room for all screens — split across accounts instead.', 'warning');
            }
            if (!result || result.error) { addToast('No screens available for this subscription right now.', 'error'); setGrantLoading(false); return; }
            allocations = result;
          } else if (sub.type === 'amazon') {
            const availableSlots = [];
            sub.accounts.forEach(acc => (acc.screens || []).forEach(screen => availableSlots.push({ account: acc, screen, used: 0 })));
            const slot = allocateAmazonScreen(availableSlots, grantModalUser, grantForm.whatsapp.trim(), 0);
            if (!slot) { addToast('No slots available for this subscription right now.', 'error'); setGrantLoading(false); return; }
            allocations = [slot];
          } else {
            const allocation = allocateSimpleScreen(sub, grantModalUser, grantForm.whatsapp.trim());
            if (!allocation) { addToast('No slots available for this subscription right now.', 'error'); setGrantLoading(false); return; }
            allocations = [allocation];
          }

          const now = new Date();
          const totalDays = grantForm.durationType === 'months' ? (grantForm.months || 1) * 30 : (grantForm.days || 30);
          const expiry = new Date(now);
          expiry.setDate(expiry.getDate() + totalDays);
          const customerPayload = {

      // pinResetAt moves to "now", which is after the expiry, so it stops

      //
      // IMPORTANT: this must use the SAME local-midnight, whole-day
      // comparison as the customer portal's own "activeEntries" filter
      // (see getStatus/activeEntries above). Previously this compared
      // against the exact current timestamp instead of local midnight,
      // which — combined with dates being stored as UTC-midnight strings —
      // caused the blink to fire several hours *before* the customer's
      // expiry day was actually over in local time (Pakistan is UTC+5).
      // That meant admins would see the reminder and regenerate the PIN
      // while the customer was still legitimately shown as active in
      // their own portal, making the fix look like it "didn't work."
      // Zeroing both sides to local midnight keeps this in sync: the
      // screen only blinks once that customer has genuinely disappeared
      // from their own dashboard (the day after expiry).
      const screenNeedsReset = (screen) => {
        if (!screen.customers || screen.customers.length === 0) return false;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        return screen.customers.some(c => {
          if (!c.expiryDate) return false;
          const exp = new Date(c.expiryDate);
          if (isNaN(exp.getTime())) return false;
          exp.setHours(0, 0, 0, 0);
          if (exp >= today) return false;
          if (screen.pinResetAt) {
            const resetAt = new Date(screen.pinResetAt);
            resetAt.setHours(0, 0, 0, 0);
            if (resetAt > exp) return false;

          return true;

      const generatePassword = () => {
        const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
        const specials = '!@#$%&';
        const digits = '0123456789';
        const pick = (str) => str.charAt(Math.floor(Math.random() * str.length));

        let pass = pick(upper); // first letter always capital
        for (let i = 0; i < 4; i++) pass += pick(letters); // remaining 4 of the 5 letters
        pass += pick(specials);
        for (let i = 0; i < 3; i++) pass += pick(digits);
        pass += pick(specials);
        for (let i = 0; i < 3; i++) pass += pick(digits);
        return pass;
      };

    const readCache = (key) => {
      try {
        const raw = localStorage.getItem('cache_' + key);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    };
    const writeCache = (key, value) => {
      try { localStorage.setItem('cache_' + key, JSON.stringify(value)); } catch (e) { /* storage full/unavailable - skip */ }

          <div className="splash-glow" />

    // ─── MAIN APP ──────────────────────────────────────────────
    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [showSubscriptions, setShowSubscriptions] = useState(false);
      const [selectedSubscription, setSelectedSubscription] = useState(null);
      const [subscriptions, setSubscriptions] = useState(() => readCache('subscriptions'));
      const [deals, setDeals] = useState(() => readCache('deals'));
      const [promotions, setPromotions] = useState(() => readCache('promotions'));
      const [customFaqs, setCustomFaqs] = useState(() => readCache('faqs'));
      const [isAdmin, setIsAdmin] = useState(false);
      const [customerData, setCustomerData] = useState(null);
      const [flowStep, setFlowStep] = useState('welcome');
      const [flowType, setFlowType] = useState(null);
      const [showAuth, setShowAuth] = useState(false);
      const [showComplaintModal, setShowComplaintModal] = useState(false);
      const [selectedDeal, setSelectedDeal] = useState(null);
      // Only block the page with a spinner when we truly have nothing to
      // show yet (first-ever visit, empty cache). Once anything is
      // cached, later visits render instantly and refresh quietly.
      const [loadingData, setLoadingData] = useState(() => readCache('subscriptions').length === 0);
      const [showIntro, setShowIntro] = useState(true);
      const [introFading, setIntroFading] = useState(false);
      const { addToast, syncAdminSettings } = useContext(AppContext);
      const { user, setUser, refreshUser } = useContext(UserContext);

      // The polling effect below only runs its setup once (empty dependency
      // array), so a plain `user` variable inside it would always see
      // whatever it was at that first render — stuck on "logged out" even
      // after someone signs in. This ref always holds the latest value
      // instead, so the poll can correctly check "is anyone logged in
      // *right now*" on every tick.
      const userRef = useRef(user);
      useEffect(() => { userRef.current = user; }, [user]);

      useEffect(() => {
        const fadeTimer = setTimeout(() => setIntroFading(true), 2600);
        const hideTimer = setTimeout(() => setShowIntro(false), 3000);
        return () => { clearTimeout(fadeTimer); clearTimeout(hideTimer); };
      }, []);

      useEffect(() => {
        const loadData = async (silent = false) => {
          try {
            // Subscriptions/deals/promotions are what the home page and
            // subscription flow actually need, so they're the only things
            // the (rare, cache-empty) loading screen waits on. FAQs are
            // fetched separately below so a slow Help-content fetch never
            // holds up the parts of the page people see first.
            const [subs, dealsData, promos] = await Promise.all([fetchSubscriptions(), fetchDeals(), fetchPromotions()]);
            setSubscriptions(prev => mergeSubscriptions(subs, prev));
            setDeals(dealsData);
            setPromotions(promos);
            writeCache('subscriptions', subs);
            writeCache('deals', dealsData);
            writeCache('promotions', promos);
          } catch (err) {
            console.error('Failed to load data', err);
            if (!silent) addToast('Could not load data. Is the backend running?', 'error');
          } finally {
            if (!silent) setLoadingData(false);
          }

          fetchFaqs().then(faqsData => {
            setCustomFaqs(faqsData);
            writeCache('faqs', faqsData);
          }).catch(() => {});

          // Keep the logged-in customer's own record (credits, credit
          // history, purchase count) in sync too — this is what makes
          // credits added from the admin panel show up for the customer
          // immediately, wherever they currently are in the app, without
          // needing to reopen their portal or refresh the page.
          if (userRef.current) {
            refreshUser().catch(err => console.error('Background user refresh failed:', err));
          }

          // Same idea for the admin password/recovery number — if it was
          // changed on another device, this picks it up here within a few
          // seconds instead of only on next page load.
          syncAdminSettings();
        };
        loadData();

        // Poll quietly in the background so changes made in the admin
        // portal (even from a different browser/device) appear here
        // automatically, without the customer needing to refresh the page.
        const pollInterval = setInterval(() => loadData(true), 8000);

        // Also refresh immediately whenever the tab regains focus, so
        // switching back to it feels instant rather than waiting for the
        // next poll tick.
        const onVisible = () => { if (document.visibilityState === 'visible') loadData(true); };
        document.addEventListener('visibilitychange', onVisible);

        return () => {
          clearInterval(pollInterval);
          document.removeEventListener('visibilitychange', onVisible);
        };
      }, []);

      // ─── URL ROUTING ──────────────────────────────────────────
      // Maps a browser path (e.g. /subscriptions, /admin) to the app's internal tab state.
      const applyRouteFromPath = (pathname) => {
        const path = (pathname || '/').replace(/\/+$/, '').toLowerCase() || '/';
        if (path === '/' ) {
          setActiveTab('home');
          setShowSubscriptions(false);
        } else if (path === '/subscriptions' || path === '/subscription') {
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
        } else if (path === '/help') {
          setActiveTab('help');
          setShowSubscriptions(false);
        } else if (path === '/contact') {
          setActiveTab('contact');
          setShowSubscriptions(false);
        } else if (path === '/social') {
          setActiveTab('social');
          setShowSubscriptions(false);
        } else if (path === '/admin') {
          // Hidden route: only reachable by typing the URL directly, never shown in the nav.
          setActiveTab('admin');
          setShowSubscriptions(false);
        } else {
          setActiveTab('home');
          setShowSubscriptions(false);
        }
      };

      useEffect(() => {
        applyRouteFromPath(window.location.pathname);
        const onPopState = () => applyRouteFromPath(window.location.pathname);
        window.addEventListener('popstate', onPopState);
        return () => window.removeEventListener('popstate', onPopState);
      }, []);

      const navigateTo = (path) => {
        if (window.location.pathname !== path) {
          window.history.pushState({}, '', path);
        }
        applyRouteFromPath(path);
      };

      const resetFlow = () => {
        setFlowStep('welcome');
        setFlowType(null);
        setSelectedSubscription(null);
        setCustomerData(null);
        setShowAuth(false);
        setSelectedDeal(null);
      };

      const handleSubSelect = (sub) => {
        setSelectedSubscription(sub);
        setFlowStep('flow');
      };

      const findCustomers = (username, subsList) => {
        const results = [];
        for (let sub of (subsList || subscriptions)) {
          for (let acc of sub.accounts) {
            for (let screen of acc.screens) {
              if (screen.customers) {
                for (let c of screen.customers) {
                  if (c.username === username) {
                    results.push({
                      name: c.name || '',
                      username: c.username,
                      password: c.password,
                      whatsapp: c.whatsapp,
                      expiryDate: c.expiryDate,
                      screens: c.screens || 1,
                      months: c.months || 0,
                      days: c.days || 0,
                      subscriptionName: sub.name,
                      accountEmail: acc.email,
                      accountPassword: acc.password || '••••••••',
                      screenName: screen.name,
                      screenPin: screen.pin || 'N/A',
                      subscriptionId: sub.id,
                      accountId: acc.id,
                      screenId: screen.id,
                      email: c.email || '',
                      purchasedAt: c.purchasedAt || null
                    });
                  }
                }
              }
            }
          }
        }
        return results;
      };

      const handleCustomRequestComplete = async (data) => {
        try {
          await addWaitingCustomer({
            subscriptionId: null,
            subscriptionName: data.subscriptionName,
            isCustomRequest: true,
            name: data.name,
            username: data.username,
            whatsapp: data.whatsapp,
            months: data.months,
            paidWithCredits: false,
            purchaseId: data.purchaseId,
            purchasedAt: new Date().toISOString()
          });
          addToast('✅ Request submitted! Admin will contact you soon with pricing & availability.', 'success');
          setFlowStep('welcome');
          navigateTo('/');
        } catch (err) {
          console.error('Failed to submit custom request:', err);
          addToast('Failed to submit your request. Please try again or contact support.', 'error');
        }
      };

      // Builds the exact same shape findCustomers() would return, straight
      // from the purchase result we already have in memory — no need to
      // wait for a fresh full subscriptions fetch just to show the
      // customer their own new purchase.
      const buildLocalCustomerData = (data, allocations) => {
        return allocations.map(allot => {
          const subId = allot.subscriptionId || data.subscriptionId;
          const sub = subscriptions.find(s => s.id === subId);
          return {
            name: data.name || '',
            username: data.username,
            password: data.password,
            whatsapp: data.whatsapp,
            expiryDate: data.expiryDate,
            screens: data.screens || 1,
            months: data.months || 0,
            days: data.days || 0,
            subscriptionName: allot.subscriptionName || data.subscriptionName || (sub && sub.name) || 'Subscription',
            accountEmail: allot.accountEmail,
            accountPassword: allot.accountPassword,
            screenName: allot.screenName,
            screenPin: allot.screenPin,
            subscriptionId: subId,
            accountId: allot.accountId,
            screenId: allot.screenId,
            email: data.email || '',
            purchasedAt: data.purchasedAt || null
          };
        });
      };

      const handleSubComplete = async (data) => {
        const customerPayload = {
          name: data.name || '',
          username: data.username,
          password: data.password,
          whatsapp: data.whatsapp,
          expiryDate: data.expiryDate,
          months: data.months || 0,
          days: data.days || 0,
          screens: data.screens || 1,
          email: data.email || '',
          purchasedAt: data.purchasedAt || new Date().toISOString()
        };

        // Build the list of things that need to go to the admin's Waiting
        // Customers list: either the whole purchase (data.isWaiting, from
        // Netflix/Amazon/Simple flows with no account available) or just
        // part of a deal (data.waitingSubs, when some — not all — of the
        // deal's subscriptions had no account available).

        if (data.isWaiting) {
          waitingEntries.push({
            subscriptionId: data.subscriptionId || null,
            subscriptionName: data.subscriptionName || data.customName || 'Subscription',
            months: data.months || 1
          });
        }
        if (data.waitingSubs && data.waitingSubs.length > 0) {
          data.waitingSubs.forEach(ws => {
            waitingEntries.push({ subscriptionId: ws.id, subscriptionName: ws.name, months: 1 });
          });
        }

        try {
          const allocations = (data.allocated && data.allocated.length > 0) ? data.allocated : [];

          if (allocations.length === 0 && waitingEntries.length === 0) {
            throw new Error('No screen was allocated for this purchase.');
          }

          // Each allocation is saved with a targeted, atomic update (only touches that
          // exact account/screen) instead of overwriting the whole subscription document.
          // This is what used to cause other customers' purchase details to vanish.
          // They touch different accounts/screens, so it's safe to save them all at
          // once instead of one-by-one — this is the only step the customer actually
          // has to wait on, so keeping it fast matters most here.
          await Promise.all(allocations.map(async (allot) => {
            const subIdForAllot = allot.subscriptionId || data.subscriptionId;
            const resp = await allocateCustomer(subIdForAllot, allot.accountId, allot.screenId, customerPayload, data.purchaseId);
            // The server returns the real credentials for the slot we just
            // purchased. Use them so the confirmation screen shows the actual
            // email/password/PIN — the full master list is now hidden from
            // the browser, so we can't read them from there anymore.
            const creds = resp && resp.claimedCredentials;
            if (creds) {
              if (creds.email) allot.accountEmail = creds.email;
              if (creds.password) allot.accountPassword = creds.password;
              if (creds.pin) allot.screenPin = creds.pin;
            }
          }));

          await Promise.all(waitingEntries.map(entry => addWaitingCustomer({
            subscriptionId: entry.subscriptionId,
            subscriptionName: entry.subscriptionName,
            isCustomRequest: false,
            name: data.name || '',
            username: data.username,
            whatsapp: data.whatsapp,
            months: entry.months,
            email: data.email || '',
            paidWithCredits: !!data.paidWithCredits,
            purchaseId: data.purchaseId,
            purchasedAt: data.purchasedAt || new Date().toISOString()
          })));

          resetFlow();

          if (allocations.length > 0) {
            addToast('🎉 Subscription confirmed! Check your details.', 'success');
            addToast('Your subscription details is added to your portal, go and check it.', 'success');

            user ? refreshUser() : Promise.resolve()
          ]).catch(err => console.error('Background refresh after purchase failed:', err));

          {activeTab !== 'home' && activeTab !== 'subscriptions' && activeTab !== 'contact' && activeTab !== 'social' && activeTab !== 'admin' && <Footer />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AppProvider>
        <App />
      </AppProvider>
    );
  </script>

  <script>
    // ─── FAST BOOT: cache the compiled app so repeat visits skip Babel ──
    // The app above is ~7000 lines of JSX. Normally the browser has to
    // re-run Babel's JIT compiler on all of it on *every single visit*,
    // which is one of the biggest costs to "opening the site" feeling
    // slow. Since the source only changes when we ship an update, we
    // compile it once, cache the plain-JS result in localStorage keyed
    // by a hash of the source, and on every later visit (same version)
    // just run the cached JS directly — no compilation needed at all.
    (async function bootApp() {
      const sourceEl = document.getElementById('app-source');
      const source = sourceEl.textContent;
      const CACHE_PREFIX = 'compiledApp_v2_';
      let code = null;

      try {
        const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(source));
        const hash = Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
        const cacheKey = CACHE_PREFIX + hash;
        code = localStorage.getItem(cacheKey);

        if (!code) {
          // IMPORTANT: runtime must be 'classic'. Babel's default/"automatic"
          // JSX runtime injects `import { jsx as _jsx } from "react/jsx-runtime"`
          // at the top of the compiled output, which breaks immediately when
          // run as a plain (non-module) <script> — "classic" instead compiles
          // JSX to plain React.createElement(...) calls using the global
          // `React` this app already relies on, with no import statements.
          code = Babel.transform(source, { presets: [['react', { runtime: 'classic' }]] }).code;
          try {
            // Drop any older cached build first so we don't accumulate
            // stale compiled bundles (and their storage space) forever.
            for (let i = localStorage.length - 1; i >= 0; i--) {
              const k = localStorage.key(i);
              if (k && k.indexOf(CACHE_PREFIX) === 0 && k !== cacheKey) localStorage.removeItem(k);
            }
            localStorage.setItem(cacheKey, code);
          } catch (e) {
            // Storage full/unavailable - not a problem, we just recompile next time.
          }
        }
      } catch (e) {
        // SubtleCrypto unavailable (e.g. very old browser) - fall back to
        // compiling without caching. The app still works, just without
        // the repeat-visit speed-up.
        code = Babel.transform(source, { presets: [['react', { runtime: 'classic' }]] }).code;
      }

      const runScript = document.createElement('script');
      runScript.textContent = code;
      document.body.appendChild(runScript);
    })();
  </script>
</body>
</html>

      };
      const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

        if (!user?.username) return null;
        try {
          const fresh = await fetchUser(user.username);

            setUser(fresh);
            return fresh;
          }
          return user;
        } catch (err) {
          console.error('Failed to refresh user:', err);
          return user;
        }
      };

      useEffect(() => { localStorage.setItem('adminPassword', adminPassword); }, [adminPassword]);
      useEffect(() => { localStorage.setItem('user', JSON.stringify(user)); }, [user]);

      return (

    // ─── DEALS CAROUSEL ────────────────────────────────────────
    function DealsCarousel({ deals, subscriptions, onPurchaseClick }) {
      const [itemsPerView, setItemsPerView] = useState(4);
      const [offset, setOffset] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const [containerWidth, setContainerWidth] = useState(0);
      const containerRef = useRef(null);
      const trackRef = useRef(null);
      const animationRef = useRef(null);
      const speed = 30;

      const [isDragging, setIsDragging] = useState(false);
      const [dragStartX, setDragStartX] = useState(0);
      const [dragOffsetStart, setDragOffsetStart] = useState(0);
      const [dragVelocity, setDragVelocity] = useState(0);
      const lastMoveTime = useRef(0);
      const lastMoveX = useRef(0);
      const momentumId = useRef(null);

      const icons = { netflix: 'fa-netflix', amazon: 'fa-amazon', youtube: 'fa-youtube', spotify: 'fa-spotify',
        chatgpt: 'fa-robot', canva: 'fa-paint-brush', capcut: 'fa-video', hbomax: 'fa-tv', crunchyroll: 'fa-play',
        chaupal: 'fa-film', custom: 'fa-plus-circle' };
      const colors = { netflix: '#e50914', amazon: '#ff9900', youtube: '#ff0000', spotify: '#1db954', chatgpt: '#10a37f',
        canva: '#00c4cc', capcut: '#00d4ff', hbomax: '#5822b4', crunchyroll: '#f47521', chaupal: '#e74c3c',
        custom: '#ef4444' };

      const activeDeals = useMemo(() => {
        return deals
          .map(deal => {
            const subs = deal.subscriptionIds ? deal.subscriptionIds.map(id => subscriptions.find(s => s.id === id))
              .filter(Boolean) : [];
            return { ...deal, subscriptions: subs };
          })
          .filter(d => d.subscriptions.length > 0);
      }, [deals, subscriptions]);

      const totalItems = activeDeals.length;
      const repeatedDeals = useMemo(() => {
        if (totalItems === 0) return [];
        const reps = 3;
        const arr = [];
        for (let i = 0; i < reps; i++) arr.push(...activeDeals);
        return arr;
      }, [activeDeals, totalItems]);

      const getItemsPerView = () => {
        if (typeof window === 'undefined') return 4;
        const w = window.innerWidth;
        if (w >= 1200) return 4;
        if (w >= 992) return 3;
        if (w >= 640) return 2;
        return 1;
      };

      useEffect(() => {
        const handleResize = () => { setItemsPerView(getItemsPerView()); };
        window.addEventListener('resize', handleResize);
        handleResize();
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        if (!containerRef.current) return;
        const measure = () => {
          const width = containerRef.current.getBoundingClientRect().width;
          setContainerWidth(width);
        };
        measure();
        const ro = new ResizeObserver(measure);
        ro.observe(containerRef.current);
        return () => ro.disconnect();
      }, [itemsPerView]);

      const gap = 8;
      const slideWidth = containerWidth > 0 ? (containerWidth / itemsPerView) - gap : 0;
      const oneSetWidth = slideWidth * totalItems + gap * (totalItems - 1);

      useEffect(() => {
        if (isPaused || totalItems === 0 || oneSetWidth === 0 || slideWidth === 0 || isDragging) {
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
            animationRef.current = null;
          }
          return;
        }
        let lastTimestamp = performance.now();
        const animate = (timestamp) => {
          const delta = (timestamp - lastTimestamp) / 1000;
          lastTimestamp = timestamp;
          setOffset(prev => {
            let newOffset = prev + speed * delta;
            if (newOffset >= oneSetWidth) {
              newOffset = newOffset - oneSetWidth;
            }
            return newOffset;
          });
          animationRef.current = requestAnimationFrame(animate);
        };
        animationRef.current = requestAnimationFrame(animate);
        return () => {
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
            animationRef.current = null;
          }
        };
      }, [isPaused, totalItems, oneSetWidth, slideWidth, speed, isDragging]);

      const handleDragStart = (clientX) => {
        setIsDragging(true);
        setIsPaused(true);
        setDragStartX(clientX);
        setDragOffsetStart(offset);
        setDragVelocity(0);
        lastMoveTime.current = Date.now();
        lastMoveX.current = clientX;
        if (momentumId.current) {
          cancelAnimationFrame(momentumId.current);
          momentumId.current = null;
        }
        if (animationRef.current) {
          cancelAnimationFrame(animationRef.current);
          animationRef.current = null;
        }
      };

      const handleDragMove = (clientX) => {
        if (!isDragging) return;
        const diff = clientX - dragStartX;
        let newOffset = dragOffsetStart - diff;
        if (newOffset < 0) newOffset = 0;
        if (newOffset > oneSetWidth) newOffset = oneSetWidth;
        setOffset(newOffset);
        const now = Date.now();
        const dt = now - lastMoveTime.current;
        if (dt > 0) {
          const dx = clientX - lastMoveX.current;
          const vel = dx / dt;
          setDragVelocity(vel);
        }
        lastMoveTime.current = now;
        lastMoveX.current = clientX;
      };

      const handleDragEnd = () => {
        if (!isDragging) return;
        setIsDragging(false);
        const vel = dragVelocity;
        if (Math.abs(vel) > 0.2) {
          let momentumOffset = offset;
          const momentumStep = () => {
            const dt = 16;
            const decay = 0.97;
            let velDecay = vel * decay;
            momentumOffset = momentumOffset - velDecay * dt;
            if (momentumOffset < 0) {
              momentumOffset = 0;
              velDecay = 0;
            } else if (momentumOffset > oneSetWidth) {
              momentumOffset = oneSetWidth;
              velDecay = 0;
            }
            setOffset(momentumOffset);
            if (Math.abs(velDecay) > 0.1 && momentumOffset > 0 && momentumOffset < oneSetWidth) {
              momentumId.current = requestAnimationFrame(momentumStep);
            } else {
              setTimeout(() => { setIsPaused(false); }, 2000);
            }
          };
          momentumId.current = requestAnimationFrame(momentumStep);
        } else {
          setTimeout(() => { setIsPaused(false); }, 2000);
        }
        setDragVelocity(0);
      };

      const onTouchStart = (e) => {
        const touch = e.touches[0];
        handleDragStart(touch.clientX);
      };
      const onTouchMove = (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        handleDragMove(touch.clientX);
      };
      const onTouchEnd = () => { handleDragEnd(); };

      const onMouseDown = (e) => {
        if (e.button !== 0) return;
        handleDragStart(e.clientX);
        const onMouseMove = (ev) => handleDragMove(ev.clientX);
        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          handleDragEnd();
        };
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      };

      const handlePause = () => { setIsPaused(true); };
      const handleResume = () => {
        if (!isDragging) {
          setTimeout(() => setIsPaused(false), 3000);
        }
      };

      const goToPrev = () => {
        if (slideWidth === 0) return;
        setIsPaused(true);

      const [selectedCard, setSelectedCard] = useState(null);

      const totalItems = subscriptions.length;
      const repeatedItems = useMemo(() => {
        if (totalItems === 0) return [];
        const reps = 3;
        const arr = [];
        for (let i = 0; i < reps; i++) arr.push(...subscriptions);
        return arr;
      }, [subscriptions, totalItems]);

      const getItemsPerView = () => {
        if (typeof window === 'undefined') return 4;
        const w = window.innerWidth;
        if (w >= 1200) return 4;
        if (w >= 992) return 3;
        if (w >= 640) return 2;
        return 1;
      };

      useEffect(() => {
        const handleResize = () => { setItemsPerView(getItemsPerView()); };
        window.addEventListener('resize', handleResize);
        handleResize();
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        if (!containerRef.current) return;
        const measure = () => {
          const width = containerRef.current.getBoundingClientRect().width;
          setContainerWidth(width);
        };
        measure();
        const ro = new ResizeObserver(measure);
        ro.observe(containerRef.current);
        return () => ro.disconnect();
      }, [itemsPerView]);

      const gap = 8;
      const slideWidth = containerWidth > 0 ? (containerWidth / itemsPerView) - gap : 0;
      const oneSetWidth = slideWidth * totalItems + gap * (totalItems - 1);

      useEffect(() => {
        if (isPaused || totalItems === 0 || oneSetWidth === 0 || slideWidth === 0 || isDragging) {
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
            animationRef.current = null;
          }
          return;
        }
        let lastTimestamp = performance.now();
        const animate = (timestamp) => {
          const delta = (timestamp - lastTimestamp) / 1000;
          lastTimestamp = timestamp;
          setOffset(prev => {
            let newOffset = prev + speed * delta;
            if (newOffset >= oneSetWidth) {
              newOffset = newOffset - oneSetWidth;
            }
            return newOffset;
          });
          animationRef.current = requestAnimationFrame(animate);
        };
        animationRef.current = requestAnimationFrame(animate);
        return () => {
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
            animationRef.current = null;
          }
        };
      }, [isPaused, totalItems, oneSetWidth, slideWidth, speed, isDragging]);

      const handleDragStart = (clientX) => {
        setIsDragging(true);
        setIsPaused(true);
        setDragStartX(clientX);
        setDragOffsetStart(offset);
        setDragVelocity(0);
        lastMoveTime.current = Date.now();
        lastMoveX.current = clientX;
        if (momentumId.current) {
          cancelAnimationFrame(momentumId.current);
          momentumId.current = null;
        }
        if (animationRef.current) {
          cancelAnimationFrame(animationRef.current);
          animationRef.current = null;
        }
      };

      const handleDragMove = (clientX) => {
        if (!isDragging) return;
        const diff = clientX - dragStartX;
        let newOffset = dragOffsetStart - diff;
        if (newOffset < 0) newOffset = 0;
        if (newOffset > oneSetWidth) newOffset = oneSetWidth;
        setOffset(newOffset);
        const now = Date.now();
        const dt = now - lastMoveTime.current;
        if (dt > 0) {
          const dx = clientX - lastMoveX.current;
          const vel = dx / dt;
          setDragVelocity(vel);
        }
        lastMoveTime.current = now;
        lastMoveX.current = clientX;
      };

      const handleDragEnd = () => {
        if (!isDragging) return;
        setIsDragging(false);
        const vel = dragVelocity;
        if (Math.abs(vel) > 0.2) {
          let momentumOffset = offset;
          const momentumStep = () => {
            const dt = 16;
            const decay = 0.97;
            let velDecay = vel * decay;
            momentumOffset = momentumOffset - velDecay * dt;
            if (momentumOffset < 0) {
              momentumOffset = 0;
              velDecay = 0;
            } else if (momentumOffset > oneSetWidth) {
              momentumOffset = oneSetWidth;
              velDecay = 0;
            }
            setOffset(momentumOffset);
            if (Math.abs(velDecay) > 0.1 && momentumOffset > 0 && momentumOffset < oneSetWidth) {
              momentumId.current = requestAnimationFrame(momentumStep);
            } else {
              setTimeout(() => { setIsPaused(false); }, 2000);
            }
          };
          momentumId.current = requestAnimationFrame(momentumStep);
        } else {
          setTimeout(() => { setIsPaused(false); }, 2000);
        }
        setDragVelocity(0);
      };

      const onTouchStart = (e) => {
        const touch = e.touches[0];
        handleDragStart(touch.clientX);
      };
      const onTouchMove = (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        handleDragMove(touch.clientX);
      };
      const onTouchEnd = () => { handleDragEnd(); };

      const onMouseDown = (e) => {
        if (e.button !== 0) return;
        handleDragStart(e.clientX);
        const onMouseMove = (ev) => handleDragMove(ev.clientX);
        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          handleDragEnd();
        };

          setTimeout(() => setIsPaused(false), 3000);

      };
      const goToNext = () => {
        if (slideWidth === 0) return;
        setIsPaused(true);
        setOffset(prev => {
          let newOffset = prev + slideWidth;
          if (newOffset >= oneSetWidth) newOffset = newOffset - oneSetWidth;
          return newOffset;
        });
        setTimeout(() => setIsPaused(false), 3000);

    // ─── PROMOTIONS CAROUSEL ──────────────────────────────────
    function PromotionsCarousel({ promotions }) {
      const [itemsPerView, setItemsPerView] = useState(5);
      const [offset, setOffset] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const [containerWidth, setContainerWidth] = useState(0);
      const containerRef = useRef(null);
      const trackRef = useRef(null);
      const animationRef = useRef(null);
      const speed = 35;

      const [isDragging, setIsDragging] = useState(false);
      const [dragStartX, setDragStartX] = useState(0);
      const [dragOffsetStart, setDragOffsetStart] = useState(0);
      const [dragVelocity, setDragVelocity] = useState(0);
      const lastMoveTime = useRef(0);
      const lastMoveX = useRef(0);
      const momentumId = useRef(null);

      const activePromos = useMemo(() => {
        return promotions.filter(p => p.active !== false);
      }, [promotions]);

      const totalItems = activePromos.length;
      const repeatedItems = useMemo(() => {
        if (totalItems === 0) return [];
        const reps = 3;
        const arr = [];
        for (let i = 0; i < reps; i++) arr.push(...activePromos);
        return arr;
      }, [activePromos, totalItems]);

      const getItemsPerView = () => {
        if (typeof window === 'undefined') return 5;
        const w = window.innerWidth;
        if (w >= 1200) return 5;
        if (w >= 992) return 4;
        if (w >= 768) return 3;
        if (w >= 576) return 2;
        return 1;
      };

      useEffect(() => {
        const handleResize = () => { setItemsPerView(getItemsPerView()); };
        window.addEventListener('resize', handleResize);
        handleResize();
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        if (!containerRef.current) return;
        const measure = () => {
          const width = containerRef.current.getBoundingClientRect().width;
          setContainerWidth(width);
        };
        measure();
        const ro = new ResizeObserver(measure);
        ro.observe(containerRef.current);
        return () => ro.disconnect();
      }, [itemsPerView]);

      const gap = 12;
      const slideWidth = containerWidth > 0 ? (containerWidth / itemsPerView) - gap : 0;
      const oneSetWidth = slideWidth * totalItems + gap * (totalItems - 1);

      useEffect(() => {
        if (isPaused || totalItems === 0 || oneSetWidth === 0 || slideWidth === 0 || isDragging) {
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
            animationRef.current = null;
          }
          return;
        }
        let lastTimestamp = performance.now();
        const animate = (timestamp) => {
          const delta = (timestamp - lastTimestamp) / 1000;
          lastTimestamp = timestamp;
          setOffset(prev => {
            let newOffset = prev + speed * delta;
            if (newOffset >= oneSetWidth) {
              newOffset = newOffset - oneSetWidth;
            }
            return newOffset;
          });
          animationRef.current = requestAnimationFrame(animate);
        };
        animationRef.current = requestAnimationFrame(animate);
        return () => {
          if (animationRef.current) {
            cancelAnimationFrame(animationRef.current);
            animationRef.current = null;
          }
        };
      }, [isPaused, totalItems, oneSetWidth, slideWidth, speed, isDragging]);

      const handleDragStart = (clientX) => {
        setIsDragging(true);
        setIsPaused(true);
        setDragStartX(clientX);
        setDragOffsetStart(offset);
        setDragVelocity(0);
        lastMoveTime.current = Date.now();
        lastMoveX.current = clientX;
        if (momentumId.current) {
          cancelAnimationFrame(momentumId.current);
          momentumId.current = null;
        }
        if (animationRef.current) {
          cancelAnimationFrame(animationRef.current);
          animationRef.current = null;
        }
      };

      const handleDragMove = (clientX) => {
        if (!isDragging) return;
        const diff = clientX - dragStartX;
        let newOffset = dragOffsetStart - diff;
        if (newOffset < 0) newOffset = 0;
        if (newOffset > oneSetWidth) newOffset = oneSetWidth;
        setOffset(newOffset);
        const now = Date.now();
        const dt = now - lastMoveTime.current;
        if (dt > 0) {
          const dx = clientX - lastMoveX.current;
          const vel = dx / dt;
          setDragVelocity(vel);
        }
        lastMoveTime.current = now;
        lastMoveX.current = clientX;
      };

      const handleDragEnd = () => {
        if (!isDragging) return;
        setIsDragging(false);
        const vel = dragVelocity;
        if (Math.abs(vel) > 0.2) {
          let momentumOffset = offset;
          const momentumStep = () => {
            const dt = 16;
            const decay = 0.97;
            let velDecay = vel * decay;
            momentumOffset = momentumOffset - velDecay * dt;
            if (momentumOffset < 0) {
              momentumOffset = 0;
              velDecay = 0;
            } else if (momentumOffset > oneSetWidth) {
              momentumOffset = oneSetWidth;
              velDecay = 0;
            }
            setOffset(momentumOffset);
            if (Math.abs(velDecay) > 0.1 && momentumOffset > 0 && momentumOffset < oneSetWidth) {
              momentumId.current = requestAnimationFrame(momentumStep);
            } else {
              setTimeout(() => { setIsPaused(false); }, 2000);
            }
          };
          momentumId.current = requestAnimationFrame(momentumStep);
        } else {
          setTimeout(() => { setIsPaused(false); }, 2000);
        }
        setDragVelocity(0);
      };

      const onTouchStart = (e) => {
        const touch = e.touches[0];
        handleDragStart(touch.clientX);
      };
      const onTouchMove = (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        handleDragMove(touch.clientX);
      };
      const onTouchEnd = () => { handleDragEnd(); };

      const onMouseDown = (e) => {
        if (e.button !== 0) return;
        handleDragStart(e.clientX);
        const onMouseMove = (ev) => handleDragMove(ev.clientX);
        const onMouseUp = () => {
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          handleDragEnd();
        };
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      };

      const handlePause = () => { setIsPaused(true); };
      const handleResume = () => {
        if (!isDragging) {
          setTimeout(() => setIsPaused(false), 3000);
        }
      };

      const goToPrev = () => {
        if (slideWidth === 0) return;
        setIsPaused(true);
        setOffset(prev => Math.max(prev - slideWidth, 0));
        setTimeout(() => setIsPaused(false), 3000);
      };
      const goToNext = () => {
        if (slideWidth === 0) return;
        setIsPaused(true);
        setOffset(prev => {
          let newOffset = prev + slideWidth;
          if (newOffset >= oneSetWidth) newOffset = newOffset - oneSetWidth;
          return newOffset;
        });
        setTimeout(() => setIsPaused(false), 3000);
      };

      if (activePromos.length === 0) return null;

      return (
        <div className="max-w-7xl mx-auto px-4 py-4 relative">
          <div className="flex items-center gap-3 mb-4">
            <span className="brand-z brand-z-sm">Z</span>
            <h2 className="text-xl font-bold text-white">📺 Trending Now</h2>
            <span className="text-white/30 text-xs ml-2">What's hot</span>
          </div>
          <div className={`carousel-container ${isPaused ? 'paused' : ''}`} ref={containerRef} onMouseEnter={handlePause} onMouseLeave={handleResume} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} onMouseDown={onMouseDown} style={{ touchAction: 'none' }}>
            <div className="carousel-track" ref={trackRef} style={{ transform: `translateX(-${offset}px)`, transition: isDragging ? 'none' : 'none', gap: `${gap}px` }}>
              {repeatedItems.map((promo, idx) => (
                <div key={promo.id + '-' + idx} className="carousel-slide" style={{ width: slideWidth }}>
                  <div className="promo-card">
                    <div className="promo-corner">Z</div>
                    <div className="promo-badge"><i className="fas fa-bolt mr-1"></i> Trending</div>
                    <div className="promo-icon-top"><i className="fas fa-film"></i></div>
                    <div className="promo-image-wrapper">
                      {promo.image ? (
                        <img src={promo.image} alt={promo.heading || 'Promotion'} className="promo-image" />
                      ) : (
                        <div className="promo-empty">
                          <i className="fas fa-image"></i>
                          <span>No image</span>
                        </div>
                      )}
                    </div>
                    <div className="promo-heading">{promo.heading || 'Promotion'}</div>
                  </div>
                </div>
              ))}
            </div>
            {totalItems > itemsPerView && (
              <>
                <button className="carousel-btn prev" onClick={goToPrev}><i className="fas fa-chevron-left"></i></button>
                <button className="carousel-btn next" onClick={goToNext}><i className="fas fa-chevron-right"></i></button>
                <div className="carousel-dots">
                  {Array.from({ length: Math.ceil(totalItems / itemsPerView) }).map((_, idx) => (
                    <button key={idx} className={`carousel-dot ${idx === Math.floor(offset / slideWidth) ? 'active' : ''}`} onClick={() => {
                      setIsPaused(true);
                      setOffset(idx * slideWidth);
                      setTimeout(() => setIsPaused(false), 3000);
                    }} />
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ─── NETFLIX FLOW ──────────────────────────────────────────
    function NetflixFlow({ subscription, onBack, onComplete, user }) {
      const [screens, setScreens] = useState(1);
      const [months, setMonths] = useState(1);
      const [name, setName] = useState(user?.username || '');
      const [number, setNumber] = useState('');
      const [loading, setLoading] = useState(false);
      const { addToast } = useContext(AppContext);

      const totalCredits = getNetflixCredits(screens, months);

      const handlePurchase = async () => {
        if (!name || !number) { addToast('Please fill all fields', 'error'); return; }
        setLoading(true);
        try {
          const sub = subscription;
          let allocated = [];
          let accountId = null, screenId = null;
          for (const acc of sub.accounts) {
            for (const screen of acc.screens) {
              const available = !screen.customers || screen.customers.every(c => new Date(c.expiryDate) < new Date());
              if (available) {
                accountId = acc.id;
                screenId = screen.id;
                allocated.push({ accountId, screenId, subscriptionId: sub.id });
                break;
              }
            }
            if (accountId) break;
          }
          if (!accountId) {
            addToast('No screens available for Netflix', 'error');
            setLoading(false);
            return;
          }
          const userRes = await deductCredits(user.username, totalCredits);
          if (userRes.error) { addToast(userRes.error, 'error'); setLoading(false); return; }
          const expiry = new Date();
          expiry.setMonth(expiry.getMonth() + months);
          const data = {
            subscriptionId: sub.id,
            name,
            username: user.username,
            password: user.password || 'N/A',
            whatsapp: number,
            screens,
            months,
            expiryDate: expiry.toISOString().split('T')[0],
            allocated,
            purchasedAt: new Date().toISOString(),
          };
          onComplete(data);
        } catch (err) {
          addToast('Purchase failed', 'error');
        }
        setLoading(false);
      };

      return (
        <div className="glass-panel">

    function AmazonFlow({ subscription, onBack, onComplete, user }) {
      const [months, setMonths] = useState(1);
      const [name, setName] = useState(user?.username || '');
      const [number, setNumber] = useState('');
      const [loading, setLoading] = useState(false);

      const totalCredits = getAmazonCredits(months);

      const handlePurchase = async () => {
        if (!name || !number) { addToast('Fill all fields', 'error'); return; }
        setLoading(true);
        try {
          const sub = subscription;
          let allocated = [];
          let accountId = null, screenId = null;
          for (const acc of sub.accounts) {
            for (const screen of acc.screens) {
              const available = !screen.customers || screen.customers.every(c => new Date(c.expiryDate) < new Date());
              if (available) {
                accountId = acc.id;
                screenId = screen.id;
                allocated.push({ accountId, screenId, subscriptionId: sub.id });
                break;
              }
            }
            if (accountId) break;
          }
          if (!accountId) { addToast('No slots available', 'error'); setLoading(false); return; }
          const userRes = await deductCredits(user.username, totalCredits);
          if (userRes.error) { addToast(userRes.error, 'error'); setLoading(false); return; }
          const expiry = new Date();
          expiry.setMonth(expiry.getMonth() + months);
          const data = {
            subscriptionId: sub.id,
            name,
            username: user.username,
            password: user.password || 'N/A',
            whatsapp: number,
            screens: 1,
            months,
            expiryDate: expiry.toISOString().split('T')[0],
            allocated,
            purchasedAt: new Date().toISOString(),
          };
          onComplete(data);

        setLoading(false);

    // ─── DEAL PURCHASE FLOW ───────────────────────────────────
    function DealPurchaseFlow({ deal, subscriptions, onBack, onComplete, user }) {
      const [name, setName] = useState(user?.username || '');
      const [number, setNumber] = useState('');
      const [loading, setLoading] = useState(false);
      const { addToast } = useContext(AppContext);

      const handlePurchase = async () => {
        if (!name || !number) { addToast('Fill all fields', 'error'); return; }
        setLoading(true);
        try {
          const allocations = [];
          for (const subId of deal.subscriptionIds) {
            const sub = subscriptions.find(s => s.id === subId);
            if (!sub) continue;
            let allocated = false;
            for (const acc of sub.accounts) {
              for (const screen of acc.screens) {
                const available = !screen.customers || screen.customers.every(c => new Date(c.expiryDate) < new Date());
                if (available) {
                  allocations.push({ subscriptionId: sub.id, accountId: acc.id, screenId: screen.id });
                  allocated = true;
                  break;
                }
              }
              if (allocated) break;
            }
            if (!allocated) {
              addToast(`No slots available for ${sub.name}`, 'error');
              setLoading(false);
              return;
            }
          }
          const userRes = await deductCredits(user.username, deal.discountPrice);
          if (userRes.error) { addToast(userRes.error, 'error'); setLoading(false); return; }
          const expiry = new Date();
          expiry.setMonth(expiry.getMonth() + 1);
          const data = {
            isDeal: true,
            dealSubscriptionIds: deal.subscriptionIds,
            name,
            username: user.username,
            password: user.password || 'N/A',
            whatsapp: number,
            screens: 1,
            months: 1,
            expiryDate: expiry.toISOString().split('T')[0],
            allocated: allocations,
            purchasedAt: new Date().toISOString(),
          };
          onComplete(data);
        } catch (err) { addToast('Purchase failed', 'error'); }
        setLoading(false);
      };

      return (
        <div className="glass-panel">
          <h3 className="text-xl font-bold text-white mb-2">{deal.title}</h3>
          <p className="text-white/40 text-sm mb-4">{deal.description}</p>
          <p className="text-green-400 text-lg font-bold">Price: {deal.discountPrice} Credits</p>
          <div className="space-y-4 mt-4">
            <input className="input-neon" placeholder="Your Name" value={name} onChange={e => setName(e.target.value)} />
            <input className="input-neon" placeholder="WhatsApp Number" value={number} onChange={e => setNumber(e.target.value)} />
            <div className="flex gap-3">
              <button onClick={onBack} className="btn-neon-outline flex-1">Back</button>
              <button onClick={handlePurchase} disabled={loading} className="btn-neon flex-1">{loading ? <span className="spinner"></span> : 'Buy Now'}</button>
            </div>
          </div>
        </div>
      );
    }

      const loadOTPs = async () => {
        try {
          const data = await fetchOTPList();
          setOtps(data);
        } catch (err) { console.error(err); }
      };
      const loadUsers = async () => {
        try {
          const data = await fetchAllUsers();
          setUsers(data);
        } catch (err) { console.error(err); }
      };
      const loadIncome = async (period = 'all') => {
        try {
          const data = await fetchIncome(period);
          setIncomeData(data);
        } catch (err) { console.error(err); }
      };

      useEffect(() => {
        loadOTPs();
        loadUsers();
        loadIncome('all');
      }, []);

      const handleAddSubscription = async () => {
        const id = prompt('Enter ID (e.g., "11")');
        if (!id) return;
        const name = prompt('Name');
        const type = prompt('Type (netflix/amazon/youtube/...)');
        const cost = Number(prompt('Cost per month (0 if free)'));
        const newSub = { id, name, type, accounts: [], costPerMonth: cost, sellingPrice: 0, slots: 0, askFor: ['name','number'], description: '', importantNote: '', logo: '' };
        try {
          const result = await createSubscription(newSub);
          setSubscriptions([...subscriptions, result]);
          addToast('Subscription added', 'success');
        } catch (err) { addToast('Error adding subscription', 'error'); }
      };

      const handleDeleteSubscription = async (id) => {
        if (!confirm('Delete this subscription?')) return;
        try {
          await deleteSubscriptionAPI(id);
          setSubscriptions(subscriptions.filter(s => s.id !== id));
          addToast('Deleted', 'success');
        } catch (err) { addToast('Error deleting', 'error'); }
      };

      const handleUpdateSubscription = async (sub) => {
        const newName = prompt('Name', sub.name);

        try {
          const updated = await updateSubscription(sub.id, { name: newName });
          setSubscriptions(subscriptions.map(s => s.id === sub.id ? updated : s));
          addToast('Updated', 'success');

          const newDeal = { id, subscriptionIds: subIds, title, description: desc, actualPrice: actual, discountPrice: discount, active: true };

          setDeals([...deals, result]);
          addToast('Deal added', 'success');

          setDeals(deals.filter(d => d.id !== id));
          addToast('Deleted', 'success');
        } catch (err) { addToast('Error deleting', 'error'); }
      };

      const handleToggleDeal = async (deal) => {
        try {
          const updated = await updateDeal(deal.id, { active: !deal.active });
          setDeals(deals.map(d => d.id === deal.id ? updated : d));
          addToast('Toggled', 'success');

          setPromotions([...promotions, result]);
          addToast('Promotion added', 'success');

                  <button className="btn-neon text-sm px-4 py-2 whitespace-nowrap">Subscribe</button>
                </div>
              </div>
            </div>
            <div className="footer-bottom">
              <p>© 2026 Zetlify. All rights reserved. Built with <i className="fas fa-heart text-red-400"></i> for premium entertainment.</p>
            </div>
          </div>
        </footer>
      );
    }

    // ─── MAIN APP ──────────────────────────────────────────────
    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [showSubscriptions, setShowSubscriptions] = useState(false);
      const [selectedSubscription, setSelectedSubscription] = useState(null);
      const [subscriptions, setSubscriptions] = useState([]);
      const [deals, setDeals] = useState([]);
      const [promotions, setPromotions] = useState([]);
      const [isAdmin, setIsAdmin] = useState(false);
      const [customerData, setCustomerData] = useState(null);
      const [flowStep, setFlowStep] = useState('welcome');
      const [flowType, setFlowType] = useState(null);
      const [showAuth, setShowAuth] = useState(false);
      const [selectedDeal, setSelectedDeal] = useState(null);
      const [loadingData, setLoadingData] = useState(true);
      const [currentRoute, setCurrentRoute] = useState('/');
      const { addToast } = useContext(AppContext);
      const { user, setUser, refreshUser } = useContext(UserContext);

      const navigate = (path) => {
        window.history.pushState({}, '', path);
        setCurrentRoute(path);
        if (path === '/') setActiveTab('home');
        else if (path === '/subscriptions') setActiveTab('subscriptions');
        else if (path === '/contact') setActiveTab('contact');
        else if (path === '/social') setActiveTab('social');
        else if (path === '/admin') setActiveTab('admin');
      };

      useEffect(() => {
        const handlePopState = () => {
          const path = window.location.pathname;
          setCurrentRoute(path);
          if (path === '/') setActiveTab('home');
          else if (path === '/subscriptions') setActiveTab('subscriptions');
          else if (path === '/contact') setActiveTab('contact');
          else if (path === '/social') setActiveTab('social');
          else if (path === '/admin') setActiveTab('admin');
        };
        window.addEventListener('popstate', handlePopState);
        const initialPath = window.location.pathname;
        setCurrentRoute(initialPath);
        if (initialPath === '/') setActiveTab('home');
        else if (initialPath === '/subscriptions') setActiveTab('subscriptions');
        else if (initialPath === '/contact') setActiveTab('contact');
        else if (initialPath === '/social') setActiveTab('social');
        else if (initialPath === '/admin') setActiveTab('admin');
        return () => window.removeEventListener('popstate', handlePopState);
      }, []);

      useEffect(() => {
        const loadData = async () => {
          try {
            const [subs, dealsData, promos] = await Promise.all([fetchSubscriptions(), fetchDeals(), fetchPromotions()]);
            setSubscriptions(subs);
            setDeals(dealsData);
            setPromotions(promos);
          } catch (err) {
            console.error('Failed to load data', err);
            addToast('Could not load data. Is the backend running?', 'error');
          } finally {
            setLoadingData(false);
          }
        };
        loadData();
      }, []);

      const resetFlow = () => {
        setFlowStep('welcome');
        setFlowType(null);
        setSelectedSubscription(null);
        setCustomerData(null);
        setShowAuth(false);
        setSelectedDeal(null);
      };

      const handleSubSelect = (sub) => {
        setSelectedSubscription(sub);
        setFlowStep('flow');
      };

      const findCustomers = (username) => {
        const results = [];
        for (let sub of subscriptions) {
          for (let acc of sub.accounts) {
            for (let screen of acc.screens) {
              if (screen.customers) {
                for (let c of screen.customers) {
                  if (c.username === username) {
                    results.push({
                      name: c.name || '',
                      username: c.username,
                      password: c.password,
                      whatsapp: c.whatsapp,
                      expiryDate: c.expiryDate,
                      screens: c.screens || 1,
                      months: c.months || 0,
                      days: c.days || 0,
                      subscriptionName: sub.name,
                      accountEmail: acc.email,
                      accountPassword: acc.password || '••••••••',
                      screenName: screen.name,
                      screenPin: screen.pin || 'N/A',
                      subscriptionId: sub.id,
                      accountId: acc.id,
                      screenId: screen.id,
                      email: c.email || '',
                      purchasedAt: c.purchasedAt || null
                    });
                  }
                }
              }
            }
          }
        }
        return results;
      };

      const handleSubComplete = async (data) => {
        addToast('🎉 Subscription activated! Check your Customer Portal for details.', 'success');
        console.log('Subscription data:', data);

        let updatedSubs = subscriptions.map(sub => {
          if (data.isDeal) {
            const dealSubIds = data.dealSubscriptionIds || [];
            if (dealSubIds.includes(sub.id)) {
              const updated = { ...sub };
              const allocatedForSub = (data.allocated || []).filter(a => a.subscriptionId === sub.id);
              if (allocatedForSub.length > 0) {
                allocatedForSub.forEach(allot => {
                  updated.accounts = updated.accounts.map(acc => {
                    if (acc.id === allot.accountId) {
                      acc.screens = acc.screens.map(screen => {
                        if (screen.id === allot.screenId) {
                          if (!screen.customers) screen.customers = [];
                          screen.customers.push({
                            name: data.name || '',
                            username: data.username,
                            password: data.password,
                            whatsapp: data.whatsapp,
                            expiryDate: data.expiryDate,
                            months: data.months || 0,
                            days: data.days || 0,
                            screens: data.screens || 1,
                            email: data.email || '',
                            purchasedAt: data.purchasedAt || new Date().toISOString()
                          });
                        }
                        return screen;
                      });
                    }
                    return acc;
                  });
                });
              } else {
                if (updated.accounts.length > 0) {
                  const firstAcc = updated.accounts[0];
                  if (firstAcc.screens && firstAcc.screens.length > 0) {
                    const screen = firstAcc.screens[0];
                    if (!screen.customers) screen.customers = [];
                    screen.customers.push({
                      name: data.name || '',
                      username: data.username,
                      password: data.password,
                      whatsapp: data.whatsapp,
                      expiryDate: data.expiryDate,
                      months: data.months || 0,
                      days: data.days || 0,
                      screens: data.screens || 1,
                      email: data.email || '',
                      purchasedAt: data.purchasedAt || new Date().toISOString()
                    });
                  }
                }
              }
              return updated;
            }
            return sub;
          } else {
            if (sub.id === data.subscriptionId) {
              const updated = { ...sub };
              if (data.allocated && data.allocated.length > 0) {
                data.allocated.forEach(allot => {
                  updated.accounts = updated.accounts.map(acc => {
                    if (acc.id === allot.accountId) {
                      acc.screens = acc.screens.map(screen => {
                        if (screen.id === allot.screenId) {
                          if (!screen.customers) screen.customers = [];
                          screen.customers.push({
                            name: data.name || '',
                            username: data.username,
                            password: data.password,
                            whatsapp: data.whatsapp,
                            expiryDate: data.expiryDate,
                            months: data.months || 0,
                            days: data.days || 0,
                            screens: data.screens,
                            email: data.email || '',
                            purchasedAt: data.purchasedAt || new Date().toISOString()
                          });
                        }
                        return screen;
                      });
                    }
                    return acc;
                  });
                });
              } else {
                if (updated.accounts.length > 0) {
                  const firstAcc = updated.accounts[0];
                  if (firstAcc.screens && firstAcc.screens.length > 0) {
                    const screen = firstAcc.screens[0];
                    if (!screen.customers) screen.customers = [];
                    screen.customers.push({
                      name: data.name || '',
                      username: data.username,
                      password: data.password,
                      whatsapp: data.whatsapp,
                      expiryDate: data.expiryDate,
                      months: data.months || 0,
                      days: data.days || 0,
                      screens: data.screens || 1,
                      email: data.email || '',
                      purchasedAt: data.purchasedAt || new Date().toISOString()
                    });
                  }
                }
              }
              return updated;
            }
            return sub;
          }
        });

        setSubscriptions(updatedSubs);
        for (const sub of updatedSubs) {
          if (data.isDeal) {
            const dealSubIds = data.dealSubscriptionIds || [];
            if (dealSubIds.includes(sub.id)) {
              await updateSubscription(sub.id, sub);
            }
          } else if (sub.id === data.subscriptionId) {
            await updateSubscription(sub.id, sub);
          }
        }

        const fresh = await fetchSubscriptions();
        setSubscriptions(fresh);
        const dealsData = await fetchDeals();
        setDeals(dealsData);
        resetFlow();
        setActiveTab('home');
        setShowSubscriptions(false);
        navigate('/');
        addToast('🎉 Subscription confirmed! Check your details.', 'success');

        if (user) {
          const found = findCustomers(user.username);
          setCustomerData(found);
          setFlowStep('customer-dash');
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
          navigate('/subscriptions');
        }
      };

      const handleLogin = async (userData) => {
        setUser(userData);
        setShowAuth(false);
        await refreshUser();
        setFlowStep('select');
        setActiveTab('subscriptions');
        setShowSubscriptions(true);
        navigate('/subscriptions');
      };

      const handleLogout = () => {
        setUser(null);
        setCustomerData(null);
        resetFlow();
        setActiveTab('home');
        setShowSubscriptions(false);
        navigate('/');
        addToast('Logged out.', 'info');
      };

      const renderFlow = () => {
        if (selectedDeal && flowStep === 'deal-purchase') {
          return <DealPurchaseFlow deal={selectedDeal} subscriptions={subscriptions} onBack={() => { setFlowStep('select'); setSelectedDeal(null); }} onComplete={handleSubComplete} user={user} />;
        }
        if (!selectedSubscription) return null;
        const type = selectedSubscription.type;
        const commonProps = { subscription: selectedSubscription, onBack: () => { setFlowStep('select'); setSelectedSubscription(null); }, onComplete: handleSubComplete, user: user };
        switch (type) {
          case 'netflix': return <NetflixFlow {...commonProps} />;
          case 'amazon': return <AmazonFlow {...commonProps} />;
          default: return <SimpleSubscriptionFlow {...commonProps} />;
        }
      };

      const handleGetStarted = () => {
        if (user) {
          setFlowStep('select');
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
          navigate('/subscriptions');
        } else {
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
          setFlowStep('auth');
          navigate('/subscriptions');
        }
      };

      const handleCustomerPortal = async () => {
        if (user) {
          await refreshUser();
          const found = findCustomers(user.username);
          setCustomerData(found);
          setFlowStep('customer-dash');
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
          navigate('/subscriptions');
        } else {
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
          setFlowStep('auth');
          navigate('/subscriptions');
        }
      };

      const handleDealPurchase = (deal) => {
        if (!user) {
          setActiveTab('subscriptions');
          setShowSubscriptions(true);
          setFlowStep('auth');
          navigate('/subscriptions');
          addToast('Please login first to purchase this deal.', 'info');
          return;
        }
        setSelectedDeal(deal);
        setFlowStep('deal-purchase');
        setActiveTab('subscriptions');
        setShowSubscriptions(true);
        navigate('/subscriptions');
      };

      const dealsWithSub = deals.filter(d => d.active).map(deal => {
        const subs = (deal.subscriptionIds || []).map(id => subscriptions.find(s => s.id === id)).filter(Boolean);
        return { ...deal, subscriptions: subs };
      }).filter(d => d.subscriptions.length > 0);

      if (loadingData) {
        return (
          <div className="min-h-screen pt-16 flex items-center justify-center">
            <div className="glass-panel text-center">
              <div className="spinner mx-auto mb-4"></div>
              <p className="text-white/40">Loading deals & subscriptions...</p>
            </div>
          </div>
        );
      }

      // ─── ADMIN ROUTE ────────────────────────────────────────
      if (currentRoute === '/admin') {
        return (
          <div className="min-h-screen pt-16">
            <Navbar activeTab="admin" setActiveTab={setActiveTab} showSubscriptions={showSubscriptions} setShowSubscriptions={setShowSubscriptions} onCustomerPortal={handleCustomerPortal} onLogout={handleLogout} />
            <ToastContainer />
            <section id="admin-section" className="px-4 max-w-7xl mx-auto py-12">
              {!isAdmin ? <AdminLogin onLogin={() => setIsAdmin(true)} /> : <AdminDashboard subscriptions={subscriptions} setSubscriptions={setSubscriptions} onLogout={() => { setIsAdmin(false); navigate('/'); }} deals={deals} setDeals={setDeals} promotions={promotions} setPromotions={setPromotions} />}
            </section>
          </div>
        );
      }

      // ─── MAIN RENDER ────────────────────────────────────────
      return (
        <div className="min-h-screen pt-16">
          <Navbar activeTab={activeTab} setActiveTab={setActiveTab} showSubscriptions={showSubscriptions} setShowSubscriptions={setShowSubscriptions} onCustomerPortal={handleCustomerPortal} onLogout={handleLogout} />
          <ToastContainer />

          {activeTab === 'home' && !showSubscriptions && (
            <>
              {dealsWithSub.length > 0 && (
                <div className="max-w-7xl mx-auto px-4 pt-4 pb-2">
                  <DealsCarousel deals={dealsWithSub} subscriptions={subscriptions} onPurchaseClick={handleDealPurchase} />
                </div>
              )}
              <Hero setActiveTab={setActiveTab} setShowSubscriptions={setShowSubscriptions} onGetStarted={handleGetStarted} />
              <TrendingSubscriptions />
              {promotions.length > 0 && (
                <div className="max-w-7xl mx-auto px-4 pt-4 pb-2">
                  <PromotionsCarousel promotions={promotions} />
                </div>
              )}
              <WhatsAppButton />
              <Footer />
            </>
          )}

          {(activeTab === 'subscriptions' || showSubscriptions) && (
            <section id="subscription-section" className="px-4 max-w-7xl mx-auto pb-20">
              <div className="pt-6">
                {flowStep === 'welcome' && (
                  <div className="text-center">
                    <h2 className="text-3xl font-bold text-white mb-4"><span className="brand-z brand-z-sm">Z</span> Get Subscription</h2>
                    <p className="text-white/40 mb-8">Choose an option to continue.</p>
                    <div className="flex flex-wrap justify-center gap-4">
                      <button onClick={handleGetStarted} className="btn-neon px-10 py-4 text-lg"><i className="fas fa-plus-circle mr-3"></i> New Subscription</button>
                      {user ? (
                        <button onClick={() => { const found = findCustomers(user.username); setCustomerData(found); setFlowStep('customer-dash'); }} className="btn-neon-outline px-10 py-4 text-lg"><i className="fas fa-user-circle mr-3"></i> My Dashboard</button>
                      ) : (
                        <button onClick={() => { setShowAuth(true); setFlowStep('auth'); }} className="btn-neon-outline px-10 py-4 text-lg"><i className="fas fa-sign-in-alt mr-3"></i> Customer Portal</button>
                      )}
                    </div>
                  </div>
                )}
                {flowStep === 'auth' && <AuthPage onLogin={handleLogin} onSignup={handleLogin} />}
                {flowStep === 'select' && (
                  <div>
                    <button onClick={() => { setFlowStep('welcome'); setFlowType(null); }} className="text-red-400 hover:text-red-300 text-sm mb-6 inline-flex items-center"><i className="fas fa-arrow-left mr-2"></i> Back</button>
                    <h2 className="text-2xl font-bold text-white mb-6"><span className="brand-z brand-z-sm">Z</span> Choose Subscription</h2>
                    {dealsWithSub.length > 0 && (
                      <div className="mb-8">
                        <h3 className="text-xl font-bold text-white mb-4"><span className="brand-z brand-z-sm">Z</span> Hot Deals</h3>
                        <DealsCarousel deals={dealsWithSub} subscriptions={subscriptions} onPurchaseClick={handleDealPurchase} />
                      </div>
                    )}
                    <SubscriptionSelection subscriptions={subscriptions} onSelect={handleSubSelect} selected={selectedSubscription} />
                  </div>
                )}
                {flowStep === 'flow' && <div className="max-w-lg mx-auto">{renderFlow()}</div>}
                {flowStep === 'deal-purchase' && <div className="max-w-lg mx-auto">{renderFlow()}</div>}
                {flowStep === 'customer-dash' && customerData !== null && (
                  <>
                    <CustomerDashboard customerData={customerData} onLogout={() => { resetFlow(); setActiveTab('home'); setShowSubscriptions(false); navigate('/'); }} deals={dealsWithSub} onDealPurchase={handleDealPurchase} subscriptions={subscriptions} />
                    <WhatsAppButton />
                    <Footer />
                  </>
                )}
              </div>
            </section>
          )}

          {activeTab === 'contact' && (
            <section id="contact-section" className="px-4 max-w-4xl mx-auto py-16">
              <div className="text-center mb-12">
                <span className="inline-block px-4 py-1 rounded-full bg-red-500/10 border border-red-500/20 text-red-400 text-xs font-medium tracking-wider uppercase mb-3">Get in Touch</span>
                <h2 className="text-4xl md:text-5xl font-bold text-white neon-text">Contact Us</h2>
                <p className="text-white/30 mt-3 max-w-2xl mx-auto">Have questions or need help? We're here for you.</p>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div className="contact-icon-box"><span className="icon"><i className="fas fa-phone-alt text-red-400"></i></span><div className="label">Phone</div><div className="value"><a href="tel:+923079163485">+92 307 9163485</a></div></div>
                <div className="contact-icon-box"><span className="icon"><i className="fab fa-whatsapp text-green-400"></i></span><div className="label">WhatsApp</div><div className="value"><a href="https://wa.me/923079163485" target="_blank" rel="noopener noreferrer">Chat Now</a></div></div>
                <div className="contact-icon-box"><span className="icon"><i className="fas fa-envelope text-red-400"></i></span><div className="label">Email</div><div className="value"><a href="mailto:support@zetlify.com">support@zetlify.com</a></div></div>
                <div className="contact-icon-box"><span className="icon"><i className="fas fa-map-marker-alt text-red-400"></i></span><div className="label">Location</div><div className="value">Lahore, Pakistan</div></div>
                <div className="contact-icon-box"><span className="icon"><i className="fas fa-clock text-yellow-400"></i></span><div className="label">Support Hours</div><div className="value">24/7</div></div>
                <div className="contact-icon-box"><span className="icon"><i className="fas fa-globe text-blue-400"></i></span><div className="label">Website</div><div className="value">zetlify.com</div></div>
              </div>
            </section>
          )}

          {activeTab === 'social' && (
            <section id="social-section" className="px-4 max-w-4xl mx-auto py-16">
              <div className="text-center mb-12">
                <span className="inline-block px-4 py-1 rounded-full bg-red-500/10 border border-red-500/20 text-red-400 text-xs font-medium tracking-wider uppercase mb-3">Follow Us</span>
                <h2 className="text-4xl md:text-5xl font-bold text-white neon-text">Social Media</h2>
                <p className="text-white/30 mt-3 max-w-2xl mx-auto">Connect with us on social media for the latest updates and offers.</p>
              </div>
              <div className="space-y-4 max-w-xl mx-auto">
                <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" className="social-link-card"><span className="social-icon"><i className="fab fa-facebook-f text-blue-500"></i></span><div><div className="social-name">Facebook</div><div className="social-handle">Follow us for updates</div></div><span className="social-arrow"><i className="fas fa-arrow-right"></i></span></a>
                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" className="social-link-card"><span className="social-icon"><i className="fab fa-instagram text-pink-500"></i></span><div><div className="social-name">Instagram</div><div className="social-handle">See our stories</div></div><span className="social-arrow"><i className="fas fa-arrow-right"></i></span></a>
                <a href="https://youtube.com" target="_blank" rel="noopener noreferrer" className="social-link-card"><span className="social-icon"><i className="fab fa-youtube text-red-500"></i></span><div><div className="social-name">YouTube</div><div className="social-handle">Watch our videos</div></div><span className="social-arrow"><i className="fas fa-arrow-right"></i></span></a>
                <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" className="social-link-card"><span className="social-icon"><i className="fab fa-twitter text-blue-400"></i></span><div><div className="social-name">Twitter</div><div className="social-handle">Latest news</div></div><span className="social-arrow"><i className="fas fa-arrow-right"></i></span></a>
                <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" className="social-link-card"><span className="social-icon"><i className="fab fa-linkedin-in text-blue-600"></i></span><div><div className="social-name">LinkedIn</div><div className="social-handle">Professional network</div></div><span className="social-arrow"><i className="fas fa-arrow-right"></i></span></a>
                <a href="https://wa.me/923079163485" target="_blank" rel="noopener noreferrer" className="social-link-card"><span className="social-icon"><i className="fab fa-whatsapp text-green-500"></i></span><div><div className="social-name">WhatsApp</div><div className="social-handle">Chat with us directly</div></div><span className="social-arrow"><i className="fas fa-arrow-right"></i></span></a>
              </div>
            </section>
          )}

          {activeTab !== 'home' && activeTab !== 'subscriptions' && activeTab !== 'contact' && activeTab !== 'social' && <Footer />}
        </div>
      );
    }

    // ─── MOUNT ──────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AppProvider>
        <App />
      </AppProvider>
    );
  </script>
</body>
</html>
